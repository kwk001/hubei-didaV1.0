<script>
// 菜单展开/收起功能 - 符合可访问性标准
function toggleMenu(element) {
    const menuItems = element.nextElementSibling;
    const isExpanded = element.getAttribute('aria-expanded') === 'true';
    
    // 更新 aria-expanded 状态
    element.setAttribute('aria-expanded', !isExpanded);
    
    // 切换菜单显示状态
    if (isExpanded) {
        menuItems.setAttribute('hidden', '');
        element.classList.add('collapsed');
    } else {
        menuItems.removeAttribute('hidden');
        element.classList.remove('collapsed');
    }
}

// 键盘导航支持
document.addEventListener('DOMContentLoaded', function() {
    const menuTitles = document.querySelectorAll('.menu-title');
    const menuItems = document.querySelectorAll('.menu-item');
    
    // 为菜单标题添加键盘支持
    menuTitles.forEach(title => {
        title.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleMenu(this);
            }
        });
    });
    
    // 高亮当前页面
    const currentPage = window.location.pathname.split('/').pop();
    menuItems.forEach(item => {
        const itemHref = item.getAttribute('href');
        if (itemHref && itemHref.includes(currentPage)) {
            item.classList.add('active');
            item.setAttribute('aria-current', 'page');
            
            // 展开父菜单
            const parentMenu = item.closest('.menu-items');
            if (parentMenu) {
                parentMenu.removeAttribute('hidden');
                const menuTitle = parentMenu.previousElementSibling;
                if (menuTitle) {
                    menuTitle.classList.add('active');
                    menuTitle.setAttribute('aria-expanded', 'true');
                }
            }
        }
    });
});

// ESC 键关闭展开的菜单（可选功能）
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        const expandedMenus = document.querySelectorAll('.menu-title[aria-expanded="true"]');
        expandedMenus.forEach(menu => {
            toggleMenu(menu);
            menu.focus();
        });
    }
});

// 滚动交互功能
document.addEventListener('DOMContentLoaded', function() {
    const sidebarMenu = document.querySelector('.sidebar-menu');
    
    if (sidebarMenu) {
        // 检测滚动位置并添加阴影提示
        function updateScrollIndicators() {
            const scrollTop = sidebarMenu.scrollTop;
            const scrollHeight = sidebarMenu.scrollHeight;
            const clientHeight = sidebarMenu.clientHeight;
            const isScrollable = scrollHeight > clientHeight;
            
            // 顶部阴影
            if (scrollTop > 10) {
                sidebarMenu.classList.add('scroll-top');
            } else {
                sidebarMenu.classList.remove('scroll-top');
            }
            
            // 底部阴影
            if (isScrollable && scrollTop + clientHeight < scrollHeight - 10) {
                sidebarMenu.classList.add('scroll-bottom');
            } else {
                sidebarMenu.classList.remove('scroll-bottom');
            }
        }
        
        // 监听滚动事件
        sidebarMenu.addEventListener('scroll', updateScrollIndicators, { passive: true });
        
        // 初始检测
        updateScrollIndicators();
        
        // 窗口大小改变时重新检测
        window.addEventListener('resize', updateScrollIndicators, { passive: true });
        
        // 键盘滚动支持
        sidebarMenu.addEventListener('keydown', function(e) {
            const scrollAmount = 50;
            
            switch(e.key) {
                case 'ArrowDown':
                    e.preventDefault();
                    sidebarMenu.scrollBy({ top: scrollAmount, behavior: 'smooth' });
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    sidebarMenu.scrollBy({ top: -scrollAmount, behavior: 'smooth' });
                    break;
                case 'PageDown':
                    e.preventDefault();
                    sidebarMenu.scrollBy({ top: sidebarMenu.clientHeight * 0.8, behavior: 'smooth' });
                    break;
                case 'PageUp':
                    e.preventDefault();
                    sidebarMenu.scrollBy({ top: -sidebarMenu.clientHeight * 0.8, behavior: 'smooth' });
                    break;
                case 'Home':
                    e.preventDefault();
                    sidebarMenu.scrollTo({ top: 0, behavior: 'smooth' });
                    break;
                case 'End':
                    e.preventDefault();
                    sidebarMenu.scrollTo({ top: sidebarMenu.scrollHeight, behavior: 'smooth' });
                    break;
            }
        });
    }
});
</script>
