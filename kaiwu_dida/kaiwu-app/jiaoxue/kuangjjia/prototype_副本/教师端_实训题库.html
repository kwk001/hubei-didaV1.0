<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训题库 - 教师端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .breadcrumb {
            font-size: 14px;
            color: #666;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }

        .content-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            background: #F0F2F5;
        }

        /* 左侧树状图区域 */
        .tree-sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #E8E8E8;
            display: flex;
            flex-direction: column;
        }

        .tree-header {
            padding: 16px;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tree-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .tree-actions {
            display: flex;
            gap: 8px;
        }

        .tree-actions button {
            padding: 4px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            background: #fff;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tree-actions button:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .tree-search {
            padding: 12px 16px;
            border-bottom: 1px solid #E8E8E8;
        }

        .tree-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
        }

        .tree-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        /* 树节点样式 */
        .tree-node { user-select: none; }

        .tree-node-content {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tree-node-content:hover { background: #F5F7FA; }
        .tree-node-content.active { background: #E6F7FF; color: #1890FF; }

        .tree-toggle {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            font-size: 10px;
            color: #999;
            transition: transform 0.2s;
        }

        .tree-toggle.expanded { transform: rotate(90deg); }
        .tree-toggle.leaf { visibility: hidden; }
        .tree-icon { margin-right: 8px; font-size: 16px; }
        .tree-label { flex: 1; font-size: 14px; }
        .tree-count {
            font-size: 12px;
            color: #999;
            background: #F5F5F5;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .tree-children { display: none; }
        .tree-children.expanded { display: block; }

        /* 右侧内容区域 */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
        }

        /* 页面标题 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .btn-primary {
            padding: 10px 20px;
            background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(24,144,255,0.3);
        }

        /* 搜索筛选 */
        .search-filter-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .search-row:last-child {
            margin-bottom: 0;
        }

        .search-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            font-size: 14px;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 13px;
            color: #666;
        }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            font-size: 13px;
            background: #fff;
        }

        .btn-search, .btn-reset {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-search {
            background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%);
            color: #fff;
            border: none;
        }

        .btn-reset {
            background: #fff;
            border: 1px solid #D9D9D9;
            color: #666;
        }

        /* 表格 */
        .table-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: #FAFAFA;
            padding: 14px 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #E8E8E8;
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #F0F0F0;
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }

        .data-table tbody tr:hover {
            background: #F5F7FA;
        }

        /* 题型标签 */
        .type-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .type-tag.process { background: #F6FFED; color: #52C41A; }
        .type-tag.programming { background: #FFF7E6; color: #FA8C16; }
        .type-tag.design { background: #E6F7FF; color: #1890FF; }
        .type-tag.machining { background: #FFF2F0; color: #FF4D4F; }
        .type-tag.inspection { background: #F9F0FF; color: #722ED1; }

        /* 难度标签 */
        .difficulty-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .difficulty-tag.easy { background: #F6FFED; color: #52C41A; }
        .difficulty-tag.medium { background: #FFF7E6; color: #FA8C16; }
        .difficulty-tag.hard { background: #FFF2F0; color: #FF4D4F; }

        /* 操作按钮 */
        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btns button {
            padding: 6px 12px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
        }

        .action-btns button:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-top: 1px solid #F0F0F0;
        }

        .pagination-left {
            font-size: 14px;
            color: #666;
        }

        .pagination-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pagination-btn {
            padding: 8px 14px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .pagination-btn.active {
            background: #1890FF;
            color: #fff;
            border-color: #1890FF;
        }

        .pagination-btn:hover:not(.active) {
            border-color: #1890FF;
            color: #1890FF;
        }

        .pagination-jump input {
            width: 50px;
            padding: 6px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            text-align: center;
            margin: 0 8px;
        }

        /* Tab标签页样式 */
        .tabs-container {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid #E8E8E8;
        }

        .tab-item {
            padding: 12px 24px;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-item:hover {
            color: #1890FF;
        }

        .tab-item.active {
            color: #1890FF;
            border-bottom-color: #1890FF;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
    

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="header">
            <div class="breadcrumb">知识库 / 实训题库</div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>

        <div class="content-body">
            <!-- 左侧树状图 -->
            <div class="tree-sidebar" style="display: none;">
                <div class="tree-header">
                    <h3>专业课程</h3>
                    <div class="tree-actions">
                        <button class="btn-expand" onclick="expandAll()">展开</button>
                        <button class="btn-collapse" onclick="collapseAll()">收起</button>
                    </div>
                </div>
                <div class="tree-search">
                    <input type="text" placeholder="搜索专业或课程..." id="treeSearch">
                </div>
                <div class="tree-content" id="treeContent">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 右侧内容区域 -->
            <div class="content-area">
                <!-- 页面标题 -->
                <div class="page-header">
                    <h1 class="page-title">实训题库</h1>
                    <button class="btn-primary" onclick="addQuestion()">+ 新增题目</button>
                </div>

                <!-- Tab标签页 -->
                <div class="tabs-container">
                    <div class="tab-item active" onclick="switchTab('my', this)">我的实训题库</div>
                    <div class="tab-item" onclick="switchTab('public', this)">公用实训题库</div>
                </div>

                <!-- 搜索筛选 -->
                <div class="search-filter-card">
                    <div class="search-row">
                        <input type="text" class="search-input" placeholder="搜索题目内容..." id="searchInput">
                        <button class="btn-search" onclick="search()">🔍 查询</button>
                        <button class="btn-reset" onclick="reset()">重置</button>
                    </div>
                    <div class="search-row">
                        <div class="filter-group">
                            <div class="filter-item">
                                <span class="filter-label">题型：</span>
                                <select class="filter-select" id="typeFilter">
                                    <option value="">全部</option>
                                    <option value="process">工艺类</option>
                                    <option value="programming">编程类</option>
                                    <option value="design">设计类</option>
                                    <option value="machining">加工类</option>
                                    <option value="inspection">检测类</option>
                                </select>
                            </div>
                            <div class="filter-item">
                                <span class="filter-label">难度：</span>
                                <select class="filter-select" id="difficultyFilter">
                                    <option value="">全部</option>
                                    <option value="easy">简单</option>
                                    <option value="medium">中等</option>
                                    <option value="hard">困难</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 表格 -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 60px;">序号</th>
                                <th style="width: 300px; white-space: nowrap;">题目名称</th>
                                <th style="width: 100px; display: none;">所属专业</th>
                                <th style="width: 100px;">所属课程</th>
                                <th style="width: 100px;">题型</th>
                                <th style="width: 80px;">难度</th>
                                <th style="width: 100px;">更新人</th>
                                <th style="width: 120px;">更新时间</th>
                                <th style="width: 150px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>

                    <!-- 分页 -->
                    <div class="pagination">
                        <div class="pagination-left">
                            显示第 <span id="startRecord">1</span>-<span id="endRecord">10</span> 条，共 <span id="totalRecords">50</span> 条记录
                        </div>
                        <div class="pagination-right">
                            <button class="pagination-btn" onclick="prevPage()">上一页</button>
                            <button class="pagination-btn active">1</button>
                            <button class="pagination-btn">2</button>
                            <button class="pagination-btn">3</button>
                            <button class="pagination-btn" onclick="nextPage()">下一页</button>
                            <span class="pagination-jump">
                                跳至 <input type="number" min="1" value="1"> 页
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 树状图数据 - 专业-课程结构
        const treeData = [
            {
                id: 'major1',

                ]
            },
            {

                icon: '🔧',

                    { id: 'course2-1', name: '数控编程', count: 95 },
                    { id: 'course2-2', name: 'CAD/CAM', count: 78 },
                    { id: 'course2-3', name: '机床操作', count: 68 }
                ]
            },
            {
                id: 'major3',
                name: '模具设计',
                icon: '🎨',
                children: [
                    { id: 'course3-1', name: '模具设计基础', count: 82 },
                    { id: 'course3-2', name: '注塑模具', count: 76 },
                    { id: 'course3-3', name: '冲压模具', count: 58 }
                ]
            },
            {
                id: 'major4',
                name: '电气自动化',
                icon: '⚡',
                children: [
                    { id: 'course4-1', name: '电气控制', count: 92 },
                    { id: 'course4-2', name: 'PLC编程', count: 88 },
                    { id: 'course4-3', name: '传感器技术', count: 65 }
                ]
            }
        ];

        // 当前选中的Tab
        let currentTab = 'my';

        // 实训题目数据
        const questionData = [
            // 我的实训题库数据
            { id: 1, content: '数控车床对刀操作中，X轴对刀的步骤和注意事项是什么？', major: '数控技术', course: '数控车床', type: 'process', difficulty: 'easy', useCount: 15, createTime: '2025-01-10', isPublic: false, creator: '张老师' },
            { id: 2, content: '编写数控车床加工程序，完成外圆粗加工和精加工。', major: '数控技术', course: '数控车床', type: 'programming', difficulty: 'medium', useCount: 12, createTime: '2025-01-09', isPublic: false, creator: '张老师' },
            { id: 3, content: '根据零件图纸，分析加工工艺路线，确定装夹方案。', major: '数控技术', course: '数控车床', type: 'design', difficulty: 'medium', useCount: 20, createTime: '2025-01-08', isPublic: false, creator: '张老师' },
            { id: 4, content: '描述轴类零件的外圆车削加工步骤和参数设置。', major: '数控技术', course: '数控车床', type: 'machining', difficulty: 'hard', useCount: 8, createTime: '2025-01-07', isPublic: false, creator: '张老师' },
            { id: 5, content: '使用千分尺测量工件外径，说明测量步骤和注意事项。', major: '数控技术', course: '数控车床', type: 'inspection', difficulty: 'easy', useCount: 10, createTime: '2025-01-06', isPublic: false, creator: '张老师' },
            // 公用实训题库数据
            { id: 6, content: '数控铣床加工中心对刀操作步骤详解。', major: '数控技术', course: '数控铣床', type: 'process', difficulty: 'medium', useCount: 18, createTime: '2025-01-05', isPublic: true, creator: '李老师' },
            { id: 7, content: '编写G代码程序，完成轮廓铣削加工。', major: '数控技术', course: '数控铣床', type: 'programming', difficulty: 'hard', useCount: 6, createTime: '2025-01-04', isPublic: true, creator: '王老师' },
            { id: 8, content: '模具型腔加工工艺设计与刀具选择。', major: '模具设计', course: '模具设计', type: 'design', difficulty: 'hard', useCount: 25, createTime: '2025-01-03', isPublic: true, creator: '李老师' },
            { id: 9, content: '加工中心换刀操作流程及注意事项。', major: '数控技术', course: '数控铣床', type: 'machining', difficulty: 'medium', useCount: 12, createTime: '2025-01-02', isPublic: true, creator: '王老师' },
            { id: 10, content: '三坐标测量机的基本操作和测量方法。', major: '数控技术', course: '数控铣床', type: 'inspection', difficulty: 'hard', useCount: 30, createTime: '2025-01-01', isPublic: true, creator: '李老师' }
        ];

        // 题型映射
        const typeMap = {
            'process': { label: '工艺类', class: 'process' },
            'programming': { label: '编程类', class: 'programming' },
            'design': { label: '设计类', class: 'design' },
            'machining': { label: '加工类', class: 'machining' },
            'inspection': { label: '检测类', class: 'inspection' }
        };

        // 难度映射
        const difficultyMap = {
            'easy': { label: '简单', class: 'easy' },
            'medium': { label: '中等', class: 'medium' },
            'hard': { label: '困难', class: 'hard' }
        };

        // 格式化日期时间为 2026-03-10 11:25:55 格式
        function formatDateTime(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
        }

        // 初始化
        function init() {
            renderTree();
            renderTable();
        }

        // 渲染树状图
        function renderTree() {
            const container = document.getElementById('treeContent');
            let html = '';

            treeData.forEach((major, index) => {
                html += `
                    <div class="tree-node">
                        <div class="tree-node-content" onclick="toggleTreeNode(this)">
                            <span class="tree-toggle">▶</span>
                            <span class="tree-icon">${major.icon}</span>
                            <span class="tree-label">${major.name}</span>
                        </div>
                        <div class="tree-children">
                            ${major.children.map(course => `
                                <div class="tree-node-content" style="padding-left: 40px;" onclick="selectCourse('${course.id}')">
                                    <span class="tree-toggle leaf">▶</span>
                                    <span class="tree-icon">📚</span>
                                    <span class="tree-label">${course.name}</span>
                                    <span class="tree-count">${course.count}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 切换树节点
        function toggleTreeNode(element) {
            const toggle = element.querySelector('.tree-toggle');
            const children = element.nextElementSibling;

            if (children && children.classList.contains('tree-children')) {
                toggle.classList.toggle('expanded');
                children.classList.toggle('expanded');
            }
        }

        // 展开所有节点
        function expandAll() {
            document.querySelectorAll('.tree-toggle').forEach(toggle => {
                if (!toggle.classList.contains('leaf')) {
                    toggle.classList.add('expanded');
                }
            });
            document.querySelectorAll('.tree-children').forEach(children => {
                children.classList.add('expanded');
            });
        }

        // 收起所有节点
        function collapseAll() {
            document.querySelectorAll('.tree-toggle').forEach(toggle => {
                if (!toggle.classList.contains('leaf')) {
                    toggle.classList.remove('expanded');
                }
            });
            document.querySelectorAll('.tree-children').forEach(children => {
                children.classList.remove('expanded');
            });
        }

        // 选择课程
        function selectCourse(courseId) {
            document.querySelectorAll('.tree-node-content').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            console.log('选择课程:', courseId);
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            // 根据当前Tab过滤数据
            const filteredData = questionData.filter(item => {
                if (currentTab === 'my') {
                    return !item.isPublic; // 我的题库：isPublic为false
                } else {
                    return item.isPublic; // 公用题库：isPublic为true
                }
            });

            tbody.innerHTML = filteredData.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.name || item.content}</td>
                    <td style="display: none;">${item.major}</td>
                    <td>${item.course}</td>
                    <td><span class="type-tag ${typeMap[item.type].class}">${typeMap[item.type].label}</span></td>
                    <td><span class="difficulty-tag ${difficultyMap[item.difficulty].class}">${difficultyMap[item.difficulty].label}</span></td>
                    <td>${item.creator || '张老师'}</td>
                    <td>${formatDateTime(item.createTime)}</td>
                    <td>
                        <div class="action-btns">
                            <button onclick="viewQuestion(${item.id})">查看</button>
                            ${currentTab === 'my' ? `
                                <button onclick="editQuestion(${item.id})">编辑</button>
                                <button onclick="deleteQuestion(${item.id})">删除</button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
            
            // 更新记录数显示
            document.getElementById('startRecord').textContent = filteredData.length > 0 ? 1 : 0;
            document.getElementById('endRecord').textContent = filteredData.length;
            document.getElementById('totalRecords').textContent = filteredData.length;
        }

        // 搜索
        function search() {
            const keyword = document.getElementById('searchInput').value;
            const type = document.getElementById('typeFilter').value;
            const difficulty = document.getElementById('difficultyFilter').value;

            let filtered = questionData.filter(item => {
                // 根据Tab过滤
                const matchTab = currentTab === 'my' ? !item.isPublic : item.isPublic;
                // 其他筛选条件
                const matchKeyword = !keyword || item.content.includes(keyword);
                const matchType = !type || item.type === type;
                const matchDifficulty = !difficulty || item.difficulty === difficulty;
                return matchTab && matchKeyword && matchType && matchDifficulty;
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filtered.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.name || item.content}</td>
                    <td style="display: none;">${item.major}</td>
                    <td>${item.course}</td>
                    <td><span class="type-tag ${typeMap[item.type].class}">${typeMap[item.type].label}</span></td>
                    <td><span class="difficulty-tag ${difficultyMap[item.difficulty].class}">${difficultyMap[item.difficulty].label}</span></td>
                    <td>${item.creator || '张老师'}</td>
                    <td>${formatDateTime(item.createTime)}</td>
                    <td>
                        <div class="action-btns">
                            <button onclick="viewQuestion(${item.id})">查看</button>
                            ${currentTab === 'my' ? `
                                <button onclick="editQuestion(${item.id})">编辑</button>
                                <button onclick="deleteQuestion(${item.id})">删除</button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
            
            // 更新记录数显示
            document.getElementById('startRecord').textContent = filtered.length > 0 ? 1 : 0;
            document.getElementById('endRecord').textContent = filtered.length;
            document.getElementById('totalRecords').textContent = filtered.length;
        }

        // Tab切换
        function switchTab(tab, element) {
            currentTab = tab;
            
            // 更新Tab样式
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            
            // 重新渲染表格
            renderTable();
        }

        // 重置
        function reset() {
            document.getElementById('searchInput').value = '';
            document.getElementById('typeFilter').value = '';
            document.getElementById('difficultyFilter').value = '';
            renderTable();
        }

        // 新增题目
        function addQuestion() {
            window.location.href = './教师端_实训题库_新增题目.html';
        }

        // 查看题目
        function viewQuestion(id) {
            window.location.href = `./教师端_实训题库_题目详情.html?id=${id}`;
        }

        // 编辑题目
        function editQuestion(id) {
            window.location.href = `./教师端_实训题库_编辑题目.html?id=${id}`;
        }

        // 删除题目
        function deleteQuestion(id) {
            if (confirm('确定要删除这道题目吗？删除后不可恢复。')) {
                alert('题目删除成功！');
                renderTable();
            }
        }

        // 上一页
        function prevPage() {
            alert('上一页');
        }

        // 下一页
        function nextPage() {
            alert('下一页');
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('iBodaoUser');
            window.location.href = './教学实训平台_登录.html';
        }

        // 菜单折叠
        function toggleMenu(element) {
            element.classList.toggle('collapsed');
            const menuItems = element.nextElementSibling;
            if (menuItems && menuItems.classList.contains('menu-items')) {
                menuItems.classList.toggle('collapsed');
            }
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
</html>
