<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考题编辑 - 教师端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            height: 100vh;
            overflow: hidden;
        }
        
        /* 全屏容器 */
        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #F5F7FA;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-btn {
            padding: 8px 16px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .breadcrumb span:hover {
            text-decoration: underline;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-primary {
            padding: 10px 24px;
            background: #1890FF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: #40A9FF;
        }
        .btn-secondary {
            padding: 10px 24px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }
        .btn-secondary:hover {
            border-color: #1890FF;
            color: #1890FF;
        }
        
        /* 主内容区 */

        /* 提示选项卡 */
        .tips-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #fff;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .tips-tab {
            padding: 8px 16px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
        }
        .tips-tab:hover {
            border-color: #1890FF;
            color: #1890FF;
        }
        .tips-tab.active {
            background: #1890FF;
            border-color: #1890FF;
            color: #fff;
        }
        
        /* 表单容器 */
        .form-container {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .form-section {
            margin-bottom: 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid #F0F0F0;
        }
        .form-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-item {
            margin-bottom: 20px;
        }
        .form-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        .form-item label .required {
            color: #FF4D4F;
        }
        .form-item input,
        .form-item select,
        .form-item textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-item input:focus,
        .form-item select:focus,
        .form-item textarea:focus {
            outline: none;
            border-color: #1890FF;
            box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
        }
        .form-item textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* 题型单选框样式 */
        .question-type-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .question-type-radio {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border: 2px solid #D9D9D9;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            background: #fff;
        }
        .question-type-radio:hover {
            border-color: #1890FF;
        }
        .question-type-radio.selected {
            border-color: #1890FF;
            background: #E6F7FF;
            color: #1890FF;
        }
        .question-type-radio input {
            width: auto;
            cursor: pointer;
        }

        /* 上部区域样式 */
        .top-section {
            background: #FAFAFA;
            border: 1px solid #E8E8E8;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .top-section .form-row {
            margin-bottom: 0;
        }

        /* 选项列表 */
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #FAFAFA;
            border: 1px solid #E8E8E8;
            border-radius: 4px;
            cursor: move;
            transition: all 0.3s;
        }
        .option-item:hover {
            border-color: #1890FF;
            box-shadow: 0 2px 8px rgba(24,144,255,0.1);
        }
        .option-item.dragging {
            opacity: 0.5;
            background: #E6F7FF;
        }
        
        .option-drag-handle {
            color: #999;
            cursor: move;
            font-size: 16px;
        }
        
        .option-label {
            font-size: 14px;
            color: #666;
            font-weight: 600;
            width: 30px;
            text-align: center;
        }
        
        .option-input {
            flex: 1;
        }
        .option-input input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
        }
        .option-input input:focus {
            outline: none;
            border-color: #1890FF;
        }
        
        .option-delete {
            padding: 6px 12px;
            border: none;
            background: #FF4D4F;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }
        .option-delete:hover {
            background: #FF7875;
        }
        
        .add-option-btn {
            margin-top: 12px;
            padding: 10px 20px;
            border: 1px dashed #1890FF;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #1890FF;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.3s;
        }
        .add-option-btn:hover {
            background: #E6F7FF;
        }
        
        /* 正确答案选择区 */
        .answer-section {
            background: #F6FFED;
            border: 1px solid #B7EB8F;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
        .answer-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #52C41A;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .answer-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .answer-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #fff;
            border: 2px solid #D9D9D9;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .answer-option:hover {
            border-color: #1890FF;
        }
        .answer-option.selected {
            border-color: #52C41A;
            background: #F6FFED;
        }
        .answer-option input {
            cursor: pointer;
        }
        .answer-option span {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        /* 判断题答案 */
        .judge-answers {
            display: flex;
            gap: 20px;
        }
        .judge-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 30px;
            background: #fff;
            border: 2px solid #D9D9D9;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .judge-option:hover {
            border-color: #1890FF;
        }
        .judge-option.selected-true {
            border-color: #52C41A;
            background: #F6FFED;
        }
        .judge-option.selected-false {
            border-color: #FF4D4F;
            background: #FFF1F0;
        }
        .judge-option input {
            cursor: pointer;
        }
        .judge-option span {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        /* 提示内容区 */
        .tips-content {
            display: none;
            background: #FAFAFA;
            border-radius: 8px;
            padding: 20px;
            margin-top: 16px;
        }
        .tips-content.active {
            display: block;
        }
        .tips-content h4 {
            font-size: 14px;
            color: #333;
            margin-bottom: 12px;
        }
        .tips-content p {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }
        .tips-content ul {
            margin: 0;
            padding-left: 20px;
        }
        .tips-content li {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 8px;
        }
    
        /* 菜单图标宽度修复 */
        .menu-item .iconfont {
            width: 20px;
            min-width: 20px;
            text-align: center;
            margin-right: 8px;
            font-size: 16px;
            display: inline-block;
            flex-shrink: 0;
        }
        
    </style>
</head>
<body>
    <div class="fullscreen-container">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="header-left">
                <button class="back-btn" onclick="goBack()">
                    ← 返回上一层
                </button>
                <div class="breadcrumb">
                    <span onclick="goBack()">普通题库管理</span> / <span>计算机基础 / 第一章</span> / <span id="pageTitle">新增考题</span>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-secondary" onclick="goBack()">取消</button>
                <button class="btn-primary" onclick="saveAndAddNew()" style="background: #52C41A;">保存并新增</button>
                <button class="btn-primary" onclick="saveQuestion()">保存</button>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 表单容器 -->
            <div class="form-container">
                <!-- 上部：题型和难度 -->
                <div class="top-section">
                    <div class="form-row">
                        <div class="form-item">
                            <label>题型 <span class="required">*</span></label>
                            <div class="question-type-group">
                                <label class="question-type-radio" onclick="selectQuestionType('single')">
                                    <input type="radio" name="questionType" value="single" onchange="changeQuestionType()">
                                    <span>单选题</span>
                                </label>
                                <label class="question-type-radio" onclick="selectQuestionType('multiple')">
                                    <input type="radio" name="questionType" value="multiple" onchange="changeQuestionType()">
                                    <span>多选题</span>
                                </label>
                                <label class="question-type-radio" onclick="selectQuestionType('judge')">
                                    <input type="radio" name="questionType" value="judge" onchange="changeQuestionType()">
                                    <span>判断题</span>
                                </label>
                                <label class="question-type-radio" onclick="selectQuestionType('fill')">
                                    <input type="radio" name="questionType" value="fill" onchange="changeQuestionType()">
                                    <span>填空题</span>
                                </label>
                                <label class="question-type-radio" onclick="selectQuestionType('essay')">
                                    <input type="radio" name="questionType" value="essay" onchange="changeQuestionType()">
                                    <span>问答题</span>
                                </label>
                            </div>
                        </div>
                        <div class="form-item">
                            <label>难度 <span class="required">*</span></label>
                            <select id="questionDifficulty">
                                <option value="">请选择难度</option>
                                <option value="easy">简单</option>
                                <option value="medium">中等</option>
                                <option value="hard">困难</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 下部：其他内容 -->
                <!-- 基础信息 -->
                <div id="tip-basic" class="tips-content active" style="display: block;">
                    <div class="form-section">
                        <h3 class="section-title">题目内容</h3>
                        <div class="form-item">
                            <label>题目内容 <span class="required">*</span></label>
                            <textarea id="questionContent" placeholder="请输入题目内容..."></textarea>
                        </div>
                    </div>
                </div>

                <!-- 选项设置 -->
                <div id="tip-options" class="tips-content" style="display: block;">
                    <div class="form-section">
                        <h3 class="section-title">选项设置</h3>
                        <p style="font-size: 13px; color: #666; margin-bottom: 16px;">💡 提示：拖拽选项可调整顺序，选项字母会自动更新</p>
                        
                        <!-- 单选题/多选题选项 -->
                        <div id="choiceOptions" style="display: none;">
                            <div class="options-list" id="optionsList">
                                <!-- 动态生成选项 -->
                            </div>
                            <button class="add-option-btn" onclick="addOption()">+ 添加选项</button>
                        </div>

                        <!-- 判断题 -->
                        <div id="judgeOptions" style="display: none;">
                            <div class="form-section">
                                <h3 class="section-title">判断题选项设置</h3>
                                <p style="font-size: 13px; color: #666; margin-bottom: 16px;">💡 提示：默认选项为"正确/错误"，您可以根据需要修改选项内容</p>
                                <div class="form-row">
                                    <div class="form-item">
                                        <label>选项 A <span class="required">*</span></label>
                                        <input type="text" id="judgeOptionA" value="正确" placeholder="请输入选项A内容" oninput="updateJudgeAnswerDisplay()">
                                    </div>
                                    <div class="form-item">
                                        <label>选项 B <span class="required">*</span></label>
                                        <input type="text" id="judgeOptionB" value="错误" placeholder="请输入选项B内容" oninput="updateJudgeAnswerDisplay()">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 填空题 -->
                        <div id="fillOptions" style="display: none;">
                            <div id="fillAnswers" class="options-list">
                                <div class="option-item">
                                    <span class="option-drag-handle">⋮⋮</span>
                                    <span class="option-label">空格1</span>
                                    <div class="option-input">
                                        <input type="text" placeholder="请输入答案">
                                    </div>
                                    <button class="option-delete" onclick="this.parentElement.remove()">删除</button>
                                </div>
                            </div>
                            <button class="add-option-btn" onclick="addFillAnswer()">+ 添加空格</button>
                        </div>

                        <!-- 问答题 -->
                        <div id="essayOptions" style="display: none;">
                            <p style="font-size: 14px; color: #666;">问答题无需设置选项，请在"答案设定"中输入参考答案。</p>
                        </div>
                    </div>
                </div>

                <!-- 答案设定 -->
                <div id="tip-answer" class="tips-content" style="display: block;">
                    <div class="form-section">
                        <h3 class="section-title">答案设定</h3>
                        
                        <!-- 单选题答案 -->
                        <div id="singleAnswer" style="display: none;">
                            <div class="answer-section">
                                <div class="answer-section-title">✓ 选择正确答案</div>
                                <div class="answer-options" id="singleAnswerOptions">
                                    <!-- 动态生成 -->
                                </div>
                            </div>
                        </div>

                        <!-- 多选题答案 -->
                        <div id="multipleAnswer" style="display: none;">
                            <div class="answer-section">
                                <div class="answer-section-title">✓ 选择正确答案（可多选）</div>
                                <div class="answer-options" id="multipleAnswerOptions">
                                    <!-- 动态生成 -->
                                </div>
                            </div>
                        </div>

                        <!-- 判断题答案 -->
                        <div id="judgeAnswerSection" style="display: none;">
                            <div class="answer-section">
                                <div class="answer-section-title">✓ 选择正确答案</div>
                                <div class="judge-answers" id="judgeAnswerOptions">
                                    <label class="judge-option" id="judgeOptionALabel" onclick="selectJudgeAnswer('A')">
                                        <input type="radio" name="judgeAnswer" value="A" style="display: none;">
                                        <span id="judgeOptionAText">A. 正确</span>
                                    </label>
                                    <label class="judge-option" id="judgeOptionBLabel" onclick="selectJudgeAnswer('B')">
                                        <input type="radio" name="judgeAnswer" value="B" style="display: none;">
                                        <span id="judgeOptionBText">B. 错误</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- 填空题答案 -->
                        <div id="fillAnswerSection" style="display: none;">
                            <div class="answer-section">
                                <div class="answer-section-title">✓ 参考答案</div>
                                <p style="font-size: 13px; color: #666; margin-bottom: 12px;">请在"选项设置"中填写各空格的答案</p>
                            </div>
                        </div>

                        <!-- 问答题答案 -->
                        <div id="essayAnswerSection" style="display: none;">
                            <div class="answer-section">
                                <div class="answer-section-title">✓ 参考答案</div>
                                <textarea placeholder="请输入参考答案..." style="width: 100%; padding: 12px; border: 1px solid #D9D9D9; border-radius: 4px; font-size: 14px; min-height: 150px; resize: vertical;"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 答案解析 -->
                <div id="tip-analysis" class="tips-content" style="display: block;">
                    <div class="form-section">
                        <h3 class="section-title">答案解析</h3>
                        <div class="form-item">
                            <label>解析内容（选填）</label>
                            <textarea id="questionAnalysis" placeholder="请输入答案解析，帮助学生理解题目..." style="min-height: 200px;"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 选项数据
        let options = [
            { id: 'A', text: '' },
            { id: 'B', text: '' },
            { id: 'C', text: '' },
            { id: 'D', text: '' }
        ];
        
        let draggedItem = null;
        let currentQuestionType = '';

        // 切换提示选项卡
        function switchTip(tipId, element) {
            // 更新选项卡样式
            document.querySelectorAll('.tips-tab').forEach(tab => tab.classList.remove('active'));
            element.classList.add('active');
            
            // 显示对应内容
            document.querySelectorAll('.tips-content').forEach(content => content.classList.remove('active'));
            document.getElementById('tip-' + tipId).classList.add('active');
        }

        // 选择题型（单选框）
        function selectQuestionType(type) {
            // 更新单选框样式
            document.querySelectorAll('.question-type-radio').forEach(radio => {
                radio.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            // 设置radio选中状态
            const radio = event.currentTarget.querySelector('input[type="radio"]');
            if (radio) {
                radio.checked = true;
            }
            
            // 触发题型变更处理（handleQuestionTypeChange中会设置currentQuestionType）
            handleQuestionTypeChange(type);
        }

        // 切换题型（兼容原有onchange事件）
        function changeQuestionType() {
            const radios = document.getElementsByName('questionType');
            let type = '';
            for (let radio of radios) {
                if (radio.checked) {
                    type = radio.value;
                    break;
                }
            }
            currentQuestionType = type;
            
            // 更新单选框样式
            document.querySelectorAll('.question-type-radio').forEach(radio => {
                radio.classList.remove('selected');
            });
            if (type) {
                const selectedRadio = document.querySelector(`input[name="questionType"][value="${type}"]`);
                if (selectedRadio) {
                    selectedRadio.closest('.question-type-radio').classList.add('selected');
                }
            }
            
            handleQuestionTypeChange(type);
        }

        // 处理题型变更
        function handleQuestionTypeChange(type) {
            // 更新当前题型变量
            currentQuestionType = type;
            
            // 隐藏所有选项区域
            document.getElementById('choiceOptions').style.display = 'none';
            document.getElementById('judgeOptions').style.display = 'none';
            document.getElementById('fillOptions').style.display = 'none';
            document.getElementById('essayOptions').style.display = 'none';
            
            // 隐藏所有答案区域
            document.getElementById('singleAnswer').style.display = 'none';
            document.getElementById('multipleAnswer').style.display = 'none';
            document.getElementById('judgeAnswerSection').style.display = 'none';
            document.getElementById('fillAnswerSection').style.display = 'none';
            document.getElementById('essayAnswerSection').style.display = 'none';
            
            // 根据题型显示对应区域
            if (type === 'single' || type === 'multiple') {
                document.getElementById('choiceOptions').style.display = 'block';
                renderOptions();
                renderAnswerOptions();
                if (type === 'single') {
                    document.getElementById('singleAnswer').style.display = 'block';
                } else {
                    document.getElementById('multipleAnswer').style.display = 'block';
                }
            } else if (type === 'judge') {
                document.getElementById('judgeOptions').style.display = 'block';
                document.getElementById('judgeAnswerSection').style.display = 'block';
                // 更新判断题答案选项显示
                updateJudgeAnswerDisplay();
            } else if (type === 'fill') {
                document.getElementById('fillOptions').style.display = 'block';
                document.getElementById('fillAnswerSection').style.display = 'block';
            } else if (type === 'essay') {
                document.getElementById('essayOptions').style.display = 'block';
                document.getElementById('essayAnswerSection').style.display = 'block';
            }
        }

        // 渲染选项列表
        function renderOptions() {
            const container = document.getElementById('optionsList');
            container.innerHTML = options.map((option, index) => `
                <div class="option-item" draggable="true" data-index="${index}">
                    <span class="option-drag-handle">⋮⋮</span>
                    <span class="option-label">${option.id}.</span>
                    <div class="option-input">
                        <input type="text" placeholder="选项${option.id}内容" value="${option.text}" onchange="updateOptionText(${index}, this.value)">
                    </div>
                    <button class="option-delete" onclick="deleteOption(${index})">删除</button>
                </div>
            `).join('');
            
            // 添加拖拽事件
            addDragEvents();
        }

        // 渲染答案选项
        function renderAnswerOptions() {
            const singleContainer = document.getElementById('singleAnswerOptions');
            const multipleContainer = document.getElementById('multipleAnswerOptions');
            
            // 渲染单选题答案选项（使用radio）
            const singleHtml = options.map(option => `
                <label class="answer-option" onclick="toggleAnswerOption(event, this, '${option.id}')">
                    <input type="radio" name="answer" value="${option.id}" style="display: none;" onclick="event.stopPropagation()">
                    <span>${option.id}</span>
                </label>
            `).join('');
            
            // 渲染多选题答案选项（使用checkbox，name带索引以支持多选）
            const multipleHtml = options.map((option, index) => `
                <label class="answer-option" onclick="toggleAnswerOption(event, this, '${option.id}')">
                    <input type="checkbox" name="answer_${index}" value="${option.id}" style="display: none;" onclick="event.stopPropagation()">
                    <span>${option.id}</span>
                </label>
            `).join('');
            
            singleContainer.innerHTML = singleHtml;
            multipleContainer.innerHTML = multipleHtml;
        }

        // 添加拖拽事件
        function addDragEvents() {
            const items = document.querySelectorAll('.option-item');
            
            items.forEach(item => {
                item.addEventListener('dragstart', function(e) {
                    draggedItem = this;
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                
                item.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    draggedItem = null;
                    updateOptionLabels();
                });
                
                item.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    
                    if (this !== draggedItem) {
                        const rect = this.getBoundingClientRect();
                        const midY = rect.top + rect.height / 2;
                        
                        if (e.clientY < midY) {
                            this.parentNode.insertBefore(draggedItem, this);
                        } else {
                            this.parentNode.insertBefore(draggedItem, this.nextSibling);
                        }
                    }
                });
            });
        }

        // 更新选项标签（A、B、C、D...）
        function updateOptionLabels() {
            const items = document.querySelectorAll('.option-item');
            const labels = 'ABCDEFGHIJ';
            
            items.forEach((item, index) => {
                const label = item.querySelector('.option-label');
                const input = item.querySelector('input');
                label.textContent = labels[index] + '.';
                input.placeholder = '选项' + labels[index] + '内容';
            });
            
            // 更新选项数据
            options = Array.from(items).map((item, index) => ({
                id: labels[index],
                text: item.querySelector('input').value
            }));
            
            // 重新渲染答案选项
            renderAnswerOptions();
        }

        // 更新选项文本
        function updateOptionText(index, value) {
            options[index].text = value;
        }

        // 添加选项
        function addOption() {
            if (options.length >= 10) {
                alert('最多只能添加10个选项');
                return;
            }
            const labels = 'ABCDEFGHIJ';
            options.push({ id: labels[options.length], text: '' });
            renderOptions();
            renderAnswerOptions();
        }

        // 删除选项
        function deleteOption(index) {
            if (options.length <= 2) {
                alert('至少需要保留2个选项');
                return;
            }
            options.splice(index, 1);
            renderOptions();
            renderAnswerOptions();
        }

        // 添加填空题答案
        function addFillAnswer() {
            const container = document.getElementById('fillAnswers');
            const count = container.children.length + 1;
            
            const div = document.createElement('div');
            div.className = 'option-item';
            div.innerHTML = `
                <span class="option-drag-handle">⋮⋮</span>
                <span class="option-label">空格${count}</span>
                <div class="option-input">
                    <input type="text" placeholder="请输入答案">
                </div>
                <button class="option-delete" onclick="this.parentElement.remove()">删除</button>
            `;
            container.appendChild(div);
        }

        // 切换答案选项
        function toggleAnswerOption(event, element, value) {
            // 阻止事件冒泡，防止触发多次
            event.preventDefault();
            event.stopPropagation();
            
            // 确保 element 是 label 元素
            if (element.tagName !== 'LABEL') {
                element = element.closest('.answer-option');
            }
            
            if (!element) return;
            
            if (currentQuestionType === 'single') {
                // 单选题：只能选一个
                document.querySelectorAll('#singleAnswerOptions .answer-option').forEach(opt => {
                    opt.classList.remove('selected');
                    const input = opt.querySelector('input');
                    if (input) input.checked = false;
                });
                element.classList.add('selected');
                const input = element.querySelector('input');
                if (input) input.checked = true;
            } else if (currentQuestionType === 'multiple') {
                // 多选题：可以选多个
                element.classList.toggle('selected');
                const input = element.querySelector('input');
                if (input) {
                    input.checked = element.classList.contains('selected');
                }
            }
        }

        // 更新判断题答案选项显示
        function updateJudgeAnswerDisplay() {
            const optionA = document.getElementById('judgeOptionA').value || '正确';
            const optionB = document.getElementById('judgeOptionB').value || '错误';
            document.getElementById('judgeOptionAText').textContent = 'A. ' + optionA;
            document.getElementById('judgeOptionBText').textContent = 'B. ' + optionB;
        }

        // 选择判断题答案
        function selectJudgeAnswer(option) {
            // 清除所有选中状态
            document.querySelectorAll('.judge-option').forEach(opt => {
                opt.classList.remove('selected-true', 'selected-false');
                const input = opt.querySelector('input');
                if (input) input.checked = false;
            });
            
            // 根据选项设置选中状态
            if (option === 'A') {
                document.getElementById('judgeOptionALabel').classList.add('selected-true');
                document.querySelector('input[name="judgeAnswer"][value="A"]').checked = true;
            } else if (option === 'B') {
                document.getElementById('judgeOptionBLabel').classList.add('selected-false');
                document.querySelector('input[name="judgeAnswer"][value="B"]').checked = true;
            }
        }

        // 返回上一层
        function goBack() {
            if (confirm('确定要返回吗？未保存的内容将丢失。')) {
                window.close();
                // 或者返回到题目列表页
                // window.location.href = './教师端_题库.html';
            }
        }

        // 获取当前选中的题型
        function getSelectedQuestionType() {
            const radios = document.getElementsByName('questionType');
            for (let radio of radios) {
                if (radio.checked) {
                    return radio.value;
                }
            }
            return '';
        }

        // 保存题目
        function saveQuestion() {
            const type = getSelectedQuestionType();
            const difficulty = document.getElementById('questionDifficulty').value;
            const content = document.getElementById('questionContent').value;
            
            if (!type || !difficulty || !content) {
                alert('请填写基础信息中的必填项！');
                return;
            }
            
            alert('保存成功！');
            goBack();
        }

        // 保存并新增
        function saveAndAddNew() {
            const type = getSelectedQuestionType();
            const difficulty = document.getElementById('questionDifficulty').value;
            const content = document.getElementById('questionContent').value;
            
            if (!type || !difficulty || !content) {
                alert('请填写基础信息中的必填项！');
                return;
            }
            
            alert('保存成功！继续新增下一题。');
            // 重置表单
            resetForm();
        }

        // 重置表单
        function resetForm() {
            // 重置题型单选框
            const radios = document.getElementsByName('questionType');
            for (let radio of radios) {
                radio.checked = false;
            }
            document.querySelectorAll('.question-type-radio').forEach(radio => {
                radio.classList.remove('selected');
            });
            currentQuestionType = '';
            
            // 重置其他字段
            document.getElementById('questionDifficulty').value = '';
            document.getElementById('questionContent').value = '';
            document.getElementById('questionAnalysis').value = '';
            
            // 重置判断题选项
            document.getElementById('judgeOptionA').value = '正确';
            document.getElementById('judgeOptionB').value = '错误';
            
            // 重置选项数据
            options = [
                { id: 'A', text: '' },
                { id: 'B', text: '' },
                { id: 'C', text: '' },
                { id: 'D', text: '' }
            ];
            
            // 隐藏所有选项区域
            document.getElementById('choiceOptions').style.display = 'none';
            document.getElementById('judgeOptions').style.display = 'none';
            document.getElementById('fillOptions').style.display = 'none';
            document.getElementById('essayOptions').style.display = 'none';
            
            // 隐藏所有答案区域
            document.getElementById('singleAnswer').style.display = 'none';
            document.getElementById('multipleAnswer').style.display = 'none';
            document.getElementById('judgeAnswerSection').style.display = 'none';
            document.getElementById('fillAnswerSection').style.display = 'none';
            document.getElementById('essayAnswerSection').style.display = 'none';
            
            // 重置填空题答案
            const fillAnswers = document.getElementById('fillAnswers');
            fillAnswers.innerHTML = `
                <div class="option-item">
                    <span class="option-drag-handle">⋮⋮</span>
                    <span class="option-label">空格1</span>
                    <div class="option-input">
                        <input type="text" placeholder="请输入答案">
                    </div>
                    <button class="option-delete" onclick="this.parentElement.remove()">删除</button>
                </div>
            `;
            
            // 清除答案选中状态
            document.querySelectorAll('.answer-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.judge-option').forEach(opt => {
                opt.classList.remove('selected-true', 'selected-false');
            });
            
            // 重新渲染选项
            renderOptions();
            
            // 滚动到页面顶部
            document.querySelector('.main-content').scrollTop = 0;
        }

        // 初始化
        renderOptions();
    </script>
</body>
</html>
