<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增实训题库</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            padding: 24px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #E8E8E8;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }
        .btn-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #F5F7FA;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            color: #999;
        }
        .btn-close:hover {
            background: #E8E8E8;
        }
        .form-container {
            background: #fff;
            border-radius: 8px;
            padding: 24px;
        }
        .form-section {
            margin-bottom: 24px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 4px solid #1890FF;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-item {
            margin-bottom: 20px;
        }
        .form-item.full-width {
            grid-column: 1 / -1;
        }
        .form-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        .form-item label .required {
            color: #FF4D4F;
            margin-left: 4px;
        }
        .form-item input,
        .form-item select,
        .form-item textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-item input:focus,
        .form-item select:focus,
        .form-item textarea:focus {
            outline: none;
            border-color: #1890FF;
            box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
        }
        .form-item textarea {
            resize: vertical;
            min-height: 100px;
        }
        .type-selector {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .type-option {
            padding: 8px 16px;
            border: 2px solid #D9D9D9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .type-option:hover {
            border-color: #1890FF;
            color: #1890FF;
        }
        .type-option.selected {
            border-color: #1890FF;
            background: #E6F7FF;
            color: #1890FF;
        }
        .type-option input {
            width: auto;
            margin: 0;
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-wrapper input[type="checkbox"] {
            width: auto;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #E8E8E8;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            border: none;
        }
        .btn-default {
            background: #fff;
            border: 1px solid #D9D9D9;
            color: #666;
        }
        .btn-default:hover {
            border-color: #1890FF;
            color: #1890FF;
        }
        .btn-primary {
            background: #1890FF;
            color: #fff;
        }
        .btn-primary:hover {
            background: #40A9FF;
        }
        .help-text {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
    
        /* 菜单图标宽度修复 */
        .menu-item .iconfont {
            width: 20px;
            min-width: 20px;
            text-align: center;
            margin-right: 8px;
            font-size: 16px;
            display: inline-block;
            flex-shrink: 0;
        }
        
    </style>
</head>
<body>
    <div class="modal-header">
        <h2 class="modal-title">📚 新增实训题库</h2>
        <button class="btn-close" onclick="closeModal()">×</button>
    </div>

    <div class="form-container">
        <div class="form-section">
            <h3 class="section-title">基本信息</h3>
            <div class="form-row">
                <div class="form-item">
                    <label>题库名称 <span class="required">*</span></label>
                    <input type="text" id="bankName" placeholder="请输入实训题库名称">
                </div>
                <div class="form-item">
                    <label>所属课程 <span class="required">*</span></label>
                    <select id="courseSelect">
                        <option value="">请选择课程</option>
                        <option value="101">数控车床编程与操作</option>
                        <option value="102">数控铣床加工技术</option>
                        <option value="103">加工中心综合实训</option>
                        <option value="104">精密测量技术</option>
                        <option value="201">机械制图与CAD</option>
                        <option value="202">机械加工工艺</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-item full-width">
                    <label>题库描述</label>
                    <textarea id="bankDescription" placeholder="请输入题库描述，如适用对象、教学目标等..."></textarea>
                    <div class="help-text">建议填写200字以内的描述</div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3 class="section-title">实训类型 <span class="required">*</span></h3>
            <div class="form-item">
                <div class="type-selector">
                    <div class="type-option" onclick="toggleType(this, 'design')">
                        <input type="checkbox" name="types" value="design">
                        <span>🎨 设计类</span>
                    </div>
                    <div class="type-option" onclick="toggleType(this, 'programming')">
                        <input type="checkbox" name="types" value="programming">
                        <span>💻 编程类</span>
                    </div>
                    <div class="type-option" onclick="toggleType(this, 'process')">
                        <input type="checkbox" name="types" value="process">
                        <span>⚙️ 工艺类</span>
                    </div>
                    <div class="type-option" onclick="toggleType(this, 'machining')">
                        <input type="checkbox" name="types" value="machining">
                        <span>🔧 加工类</span>
                    </div>
                    <div class="type-option" onclick="toggleType(this, 'inspection')">
                        <input type="checkbox" name="types" value="inspection">
                        <span>📏 检测类</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3 class="section-title">高级设置</h3>
            <div class="form-row">
                <div class="form-item">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="isPublic">
                        <label for="isPublic" style="margin-bottom: 0;">设为公用题库（其他教师可见）</label>
                    </div>
                </div>
                <div class="form-item">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="enableMES" checked>
                        <label for="enableMES" style="margin-bottom: 0;">启用MES系统集成</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-default" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveBank()">保存</button>
        </div>
    </div>

    <script>
        // 切换类型选择
        function toggleType(element, type) {
            element.classList.toggle('selected');
            const checkbox = element.querySelector('input[type="checkbox"]');
            checkbox.checked = element.classList.contains('selected');
        }

        // 保存题库
        function saveBank() {
            const name = document.getElementById('bankName').value;
            const course = document.getElementById('courseSelect').value;
            const description = document.getElementById('bankDescription').value;
            
            // 获取选中的类型
            const selectedTypes = [];
            document.querySelectorAll('.type-option.selected').forEach(el => {
                selectedTypes.push(el.querySelector('input').value);
            });

            // 验证必填项
            if (!name) {
                alert('请输入题库名称');
                return;
            }
            if (!course) {
                alert('请选择所属课程');
                return;
            }
            if (selectedTypes.length === 0) {
                alert('请至少选择一种实训类型');
                return;
            }

            // 模拟保存
            const bankData = {
                name: name,
                course: course,
                description: description,
                types: selectedTypes,
                isPublic: document.getElementById('isPublic').checked,
                enableMES: document.getElementById('enableMES').checked
            };

            console.log('保存题库:', bankData);
            alert('题库创建成功！');
            
            // 通知父页面刷新
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'bankAdded', data: bankData }, '*');
            }
            
            closeModal();
        }

        // 关闭弹窗
        function closeModal() {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage({ type: 'closeModal' }, '*');
            } else {
                window.close();
            }
        }
    </script>
</body>
</html>
