<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>普通题库 - 教师端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .breadcrumb {
            font-size: 14px;
            color: #666;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            color: #1890FF;
        }

        .content-body {
            flex: 1;
            display: flex;
            overflow: hidden;
            background: #F0F2F5;
        }

        /* 左侧树状图区域 */
        .tree-sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #E8E8E8;
            display: flex;
            flex-direction: column;
        }

        .tree-header {
            padding: 16px;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tree-header h3 {
            margin: 0;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .tree-actions {
            display: flex;
            gap: 8px;
        }

        .tree-actions button {
            padding: 4px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            background: #fff;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tree-actions button:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .tree-search {
            padding: 12px 16px;
            border-bottom: 1px solid #E8E8E8;
        }

        .tree-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
        }

        .tree-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        /* 树节点样式 */
        .tree-node { user-select: none; }

        .tree-node-content {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tree-node-content:hover { background: #F5F7FA; }
        .tree-node-content.active { background: #E6F7FF; color: #1890FF; }

        .tree-toggle {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            font-size: 10px;
            color: #999;
            transition: transform 0.2s;
        }

        .tree-toggle.expanded { transform: rotate(90deg); }
        .tree-toggle.leaf { visibility: hidden; }
        .tree-icon { margin-right: 8px; font-size: 16px; }
        .tree-label { flex: 1; font-size: 14px; }
        .tree-count {
            font-size: 12px;
            color: #999;
            background: #F5F5F5;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .tree-children { display: none; }
        .tree-children.expanded { display: block; }

        /* 右侧内容区域 */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 16px;
        }

        /* 页面标题 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .btn-primary {
            padding: 10px 20px;
            background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(24,144,255,0.3);
        }

        /* 搜索筛选 */
        .search-filter-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .search-row:last-child {
            margin-bottom: 0;
        }

        .search-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            font-size: 14px;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-label {
            font-size: 13px;
            color: #666;
        }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            font-size: 13px;
            background: #fff;
        }

        .btn-search, .btn-reset {
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-search {
            background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%);
            color: #fff;
            border: none;
        }

        .btn-reset {
            background: #fff;
            border: 1px solid #D9D9D9;
            color: #666;
        }

        /* 表格 */
        .table-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }
        .table-container .data-table {
            border-radius: 0;
            box-shadow: none;
        }
        .table-container .pagination {
            border-top: 1px solid #F0F0F0;
            background: transparent;
            padding: 16px 0 0 0;
            margin-top: 16px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            background: #FAFAFA;
            padding: 14px 16px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #E8E8E8;
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #F0F0F0;
            font-size: 14px;
            color: #666;
        }

        /* 题目名称列样式 - 防止换行 */
        .data-table td:nth-child(2) {
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 所属专业、所属课程列样式 - 防止换行 */
        .data-table td:nth-child(3),
        .data-table td:nth-child(4) {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 题型、难度、创建人、创建时间列样式 - 防止换行 */
        .data-table td:nth-child(5),
        .data-table td:nth-child(6),
        .data-table td:nth-child(7),
        .data-table td:nth-child(8) {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 固定列样式 - 第1列(序号)和操作列 */
        .data-table td:nth-child(1) {
            position: sticky;
            left: 0;
            z-index: 5;
            background: #fff;
        }

        .data-table td:nth-child(9) {
            position: sticky;
            right: 0;
            z-index: 5;
            background: #fff;
        }

        .data-table tbody tr:hover td:nth-child(1),
        .data-table tbody tr:hover td:nth-child(9) {
            background: #F5F7FA;
        }

        .data-table tbody tr:hover {
            background: #F5F7FA;
        }

        /* 题型标签 */
        .type-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .type-tag.single { background: #E6F7FF; color: #1890FF; }
        .type-tag.multiple { background: #F6FFED; color: #52C41A; }
        .type-tag.judge { background: #FFF7E6; color: #FA8C16; }
        .type-tag.fill { background: #F9F0FF; color: #722ED1; }
        .type-tag.essay { background: #FFF2F0; color: #FF4D4F; }

        /* 难度标签 */
        .difficulty-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .difficulty-tag.easy { background: #F6FFED; color: #52C41A; }
        .difficulty-tag.medium { background: #FFF7E6; color: #FA8C16; }
        .difficulty-tag.hard { background: #FFF2F0; color: #FF4D4F; }

        /* 操作按钮 */
        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btns button {
            padding: 6px 12px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
        }

        .action-btns button:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-top: 1px solid #F0F0F0;
        }

        .pagination-left {
            font-size: 14px;
            color: #666;
        }

        .pagination-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .pagination-btn {
            padding: 8px 14px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .pagination-btn.active {
            background: #1890FF;
            color: #fff;
            border-color: #1890FF;
        }

        .pagination-btn:hover:not(.active) {
            border-color: #1890FF;
            color: #1890FF;
        }

        .pagination-jump input {
            width: 50px;
            padding: 6px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            text-align: center;
            margin: 0 8px;
        }

        /* Tab标签页样式 */
        .tabs-container {
            display: flex;
            gap: 0;
            margin-bottom: 16px;
            border-bottom: 1px solid #E8E8E8;
        }

        .tab-item {
            padding: 12px 24px;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab-item:hover {
            color: #1890FF;
        }

        .tab-item.active {
            color: #1890FF;
            border-bottom-color: #1890FF;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
    

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="header">
            <div class="breadcrumb">知识库 / 普通题库</div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>

        <div class="content-body">
            <!-- 左侧树状图 -->
            <div class="tree-sidebar" style="display: none;">
                <div class="tree-header">
                    <h3>课程分类</h3>
                    <div class="tree-actions">
                        <button class="btn-expand" onclick="expandAll()">展开</button>
                        <button class="btn-collapse" onclick="collapseAll()">收起</button>
                    </div>
                </div>
                <div class="tree-search">
                    <input type="text" placeholder="搜索专业或课程..." id="treeSearch">
                </div>
                <div class="tree-content" id="treeContent">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 右侧内容区域 -->
            <div class="content-area">
                <!-- 页面标题 -->
                <div class="page-header">
                    <h1 class="page-title">普通题库</h1>
                    <button class="btn-primary" onclick="addQuestion()">+ 新增题目</button>
                </div>

                <!-- Tab标签页 -->
                <div class="tabs-container">
                    <div class="tab-item active" onclick="switchTab('my', this)">我的题库</div>
                    <div class="tab-item" onclick="switchTab('public', this)">公用题库</div>
                </div>

                <!-- 搜索筛选 -->
                <div class="search-filter-card">
                    <div class="search-row">
                        <input type="text" class="search-input" placeholder="搜索题目内容..." id="searchInput">
                        <button class="btn-search" onclick="search()">🔍 查询</button>
                        <button class="btn-reset" onclick="reset()">重置</button>
                    </div>
                    <div class="search-row">
                        <div class="filter-group">
                            <div class="filter-item">
                                <span class="filter-label">题型：</span>
                                <select class="filter-select" id="typeFilter">
                                    <option value="">全部</option>
                                    <option value="single">单选题</option>
                                    <option value="multiple">多选题</option>
                                    <option value="judge">判断题</option>
                                    <option value="fill">填空题</option>
                                    <option value="essay">简答题</option>
                                </select>
                            </div>
                            <div class="filter-item">
                                <span class="filter-label">难度：</span>
                                <select class="filter-select" id="difficultyFilter">
                                    <option value="">全部</option>
                                    <option value="easy">简单</option>
                                    <option value="medium">中等</option>
                                    <option value="hard">困难</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 表格 -->
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th style="width: 60px;">序号</th>
                                <th style="width: 350px; white-space: nowrap;">题目名称</th>
                                <th style="width: 120px;">所属课程</th>
                                <th style="width: 100px;">题型</th>
                                <th style="width: 80px;">难度</th>
                                <th style="width: 100px;">更新人</th>
                                <th style="width: 150px;">更新时间</th>
                                <th style="width: 120px; position: sticky; right: 0; z-index: 10; background: #FAFAFA;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 动态生成 -->
                        </tbody>
                    </table>

                    <!-- 分页 -->
                    <div class="pagination">
                        <div class="pagination-left">
                            显示第 <span id="startRecord">1</span>-<span id="endRecord">10</span> 条，共 <span id="totalRecords">50</span> 条记录
                        </div>
                        <div class="pagination-right">
                            <button class="pagination-btn" onclick="prevPage()">上一页</button>
                            <button class="pagination-btn active">1</button>
                            <button class="pagination-btn">2</button>
                            <button class="pagination-btn">3</button>
                            <button class="pagination-btn" onclick="nextPage()">下一页</button>
                            <span class="pagination-jump">
                                跳至 <input type="number" min="1" value="1"> 页
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 树状图数据
        const treeData = [
            {
                id: 'major1',
                name: '计算机类',
                icon: '💻',
                children: [
                    { id: 'course1-1', name: '计算机基础', count: 156 },
                    { id: 'course1-2', name: 'Java程序设计', count: 128 },
                    { id: 'course1-3', name: 'Web前端开发', count: 95 },
                    { id: 'course1-4', name: '数据库原理', count: 87 }
                ]
            },
            {
                id: 'major2',
                name: '机械工程类',
                icon: '⚙️',
                children: [
                    { id: 'course2-1', name: '机械制图', count: 86 },
                    { id: 'course2-2', name: '数控技术', count: 72 },
                    { id: 'course2-3', name: '模具设计', count: 68 }
                ]
            },
            {
                id: 'major3',
                name: '电气自动化类',
                icon: '⚡',
                children: [
                    { id: 'course3-1', name: '电气控制', count: 92 },
                    { id: 'course3-2', name: 'PLC编程', count: 78 },
                    { id: 'course3-3', name: '传感器技术', count: 65 }
                ]
            }
        ];

        // 当前选中的Tab
        let currentTab = 'my';

        // 题目数据
        const questionData = [
            // 我的题库数据
            { id: 1, content: '计算机的CPU主要由哪两部分组成？', major: '计算机类', course: '计算机基础', type: 'single', difficulty: 'easy', useCount: 15, createTime: '2025-01-10', creator: '张老师', isPublic: false },
            { id: 2, content: '计算机内存断电后数据不会丢失。', major: '计算机类', course: '计算机基础', type: 'judge', difficulty: 'easy', useCount: 20, createTime: '2025-01-08', creator: '张老师', isPublic: false },
            { id: 3, content: '计算机的五大组成部分包括输入设备、输出设备、存储器、______和______。', major: '计算机类', course: '计算机基础', type: 'fill', difficulty: 'medium', useCount: 8, createTime: '2025-01-07', creator: '张老师', isPublic: false },
            { id: 4, content: '以下哪种存储器的读写速度最快？', major: '计算机类', course: '计算机基础', type: 'single', difficulty: 'medium', useCount: 18, createTime: '2025-01-05', creator: '张老师', isPublic: false },
            { id: 5, content: '在计算机中，1KB等于多少字节？', major: '计算机类', course: '计算机基础', type: 'single', difficulty: 'easy', useCount: 30, createTime: '2025-01-01', creator: '张老师', isPublic: false },
            // 公用题库数据
            { id: 6, content: '以下哪些是计算机的输入设备？', major: '计算机类', course: '计算机基础', type: 'multiple', difficulty: 'medium', useCount: 12, createTime: '2025-01-09', creator: '李老师', isPublic: true },
            { id: 7, content: '简述计算机操作系统的主要功能及其作用。', major: '计算机类', course: '计算机基础', type: 'essay', difficulty: 'medium', useCount: 10, createTime: '2025-01-06', creator: '李老师', isPublic: true },
            { id: 8, content: '操作系统的主要功能包括哪些？', major: '计算机类', course: '计算机基础', type: 'multiple', difficulty: 'hard', useCount: 6, createTime: '2025-01-04', creator: '李老师', isPublic: true },
            { id: 9, content: 'Windows和Linux都是开源操作系统。', major: '计算机类', course: '计算机基础', type: 'judge', difficulty: 'easy', useCount: 25, createTime: '2025-01-03', creator: '王老师', isPublic: true },
            { id: 10, content: '什么是计算机网络？简述计算机网络的主要功能。', major: '计算机类', course: '计算机基础', type: 'essay', difficulty: 'easy', useCount: 12, createTime: '2025-01-02', creator: '王老师', isPublic: true }
        ];

        // 题型映射
        const typeMap = {
            'single': { label: '单选题', class: 'single' },
            'multiple': { label: '多选题', class: 'multiple' },
            'judge': { label: '判断题', class: 'judge' },
            'fill': { label: '填空题', class: 'fill' },
            'essay': { label: '简答题', class: 'essay' }
        };

        // 难度映射
        const difficultyMap = {
            'easy': { label: '简单', class: 'easy' },
            'medium': { label: '中等', class: 'medium' },
            'hard': { label: '困难', class: 'hard' }
        };

        // 初始化
        function init() {
            renderTree();
            renderTable();
        }

        // 渲染树状图
        function renderTree() {
            const container = document.getElementById('treeContent');
            let html = '';

            treeData.forEach((major, index) => {
                html += `
                    <div class="tree-node">
                        <div class="tree-node-content" onclick="toggleTreeNode(this)">
                            <span class="tree-toggle">▶</span>
                            <span class="tree-icon">${major.icon}</span>
                            <span class="tree-label">${major.name}</span>
                        </div>
                        <div class="tree-children">
                            ${major.children.map(course => `
                                <div class="tree-node-content" style="padding-left: 40px;" onclick="selectCourse('${course.id}')">
                                    <span class="tree-toggle leaf">▶</span>
                                    <span class="tree-icon">📚</span>
                                    <span class="tree-label">${course.name}</span>
                                    <span class="tree-count">${course.count}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 切换树节点
        function toggleTreeNode(element) {
            const toggle = element.querySelector('.tree-toggle');
            const children = element.nextElementSibling;

            if (children && children.classList.contains('tree-children')) {
                toggle.classList.toggle('expanded');
                children.classList.toggle('expanded');
            }
        }

        // 展开所有节点
        function expandAll() {
            document.querySelectorAll('.tree-toggle').forEach(toggle => {
                if (!toggle.classList.contains('leaf')) {
                    toggle.classList.add('expanded');
                }
            });
            document.querySelectorAll('.tree-children').forEach(children => {
                children.classList.add('expanded');
            });
        }

        // 收起所有节点
        function collapseAll() {
            document.querySelectorAll('.tree-toggle').forEach(toggle => {
                if (!toggle.classList.contains('leaf')) {
                    toggle.classList.remove('expanded');
                }
            });
            document.querySelectorAll('.tree-children').forEach(children => {
                children.classList.remove('expanded');
            });
        }

        // 选择课程
        function selectCourse(courseId) {
            document.querySelectorAll('.tree-node-content').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            // 这里可以根据课程ID筛选题目
            console.log('选择课程:', courseId);
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('tableBody');

            // 根据当前Tab过滤数据
            const filteredData = questionData.filter(item => {
                if (currentTab === 'my') {
                    return !item.isPublic; // 我的题库：isPublic为false
                } else {
                    return item.isPublic; // 公用题库：isPublic为true
                }
            });

            tbody.innerHTML = filteredData.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.content}</td>
                    <td>${item.course}</td>
                    <td><span class="type-tag ${typeMap[item.type].class}">${typeMap[item.type].label}</span></td>
                    <td><span class="difficulty-tag ${difficultyMap[item.difficulty].class}">${difficultyMap[item.difficulty].label}</span></td>
                    <td>${item.updater || item.creator || '张老师'}</td>
                    <td>${item.updateTime || item.createTime}</td>
                    <td>
                        <div class="action-btns">
                            ${currentTab === 'my' ? `
                                <button onclick="editQuestion(${item.id})">编辑</button>
                                <button onclick="deleteQuestion(${item.id})">删除</button>
                            ` : `
                                <button onclick="copyQuestion(${item.id})">复制</button>
                            `}
                        </div>
                    </td>
                </tr>
            `).join('');

            // 更新记录数显示
            document.getElementById('startRecord').textContent = filteredData.length > 0 ? 1 : 0;
            document.getElementById('endRecord').textContent = filteredData.length;
            document.getElementById('totalRecords').textContent = filteredData.length;
        }

        // 搜索
        function search() {
            const keyword = document.getElementById('searchInput').value;
            const type = document.getElementById('typeFilter').value;
            const difficulty = document.getElementById('difficultyFilter').value;

            // 筛选逻辑
            let filtered = questionData.filter(item => {
                // 根据Tab过滤
                const matchTab = currentTab === 'my' ? !item.isPublic : item.isPublic;
                // 其他筛选条件
                const matchKeyword = !keyword || item.content.includes(keyword);
                const matchType = !type || item.type === type;
                const matchDifficulty = !difficulty || item.difficulty === difficulty;
                return matchTab && matchKeyword && matchType && matchDifficulty;
            });

            // 重新渲染表格
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = filtered.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.content}</td>
                    <td>${item.course}</td>
                    <td><span class="type-tag ${typeMap[item.type].class}">${typeMap[item.type].label}</span></td>
                    <td><span class="difficulty-tag ${difficultyMap[item.difficulty].class}">${difficultyMap[item.difficulty].label}</span></td>
                    <td>${item.updater || item.creator || '张老师'}</td>
                    <td>${item.updateTime || item.createTime}</td>
                    <td>
                        <div class="action-btns">
                            ${currentTab === 'my' ? `
                                <button onclick="editQuestion(${item.id})">编辑</button>
                                <button onclick="deleteQuestion(${item.id})">删除</button>
                            ` : `
                                <button onclick="copyQuestion(${item.id})">复制</button>
                            `}
                        </div>
                    </td>
                </tr>
            `).join('');

            // 更新记录数显示
            document.getElementById('startRecord').textContent = filtered.length > 0 ? 1 : 0;
            document.getElementById('endRecord').textContent = filtered.length;
            document.getElementById('totalRecords').textContent = filtered.length;
        }

        // Tab切换
        function switchTab(tab, element) {
            currentTab = tab;
            
            // 更新Tab样式
            document.querySelectorAll('.tab-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');
            
            // 重新渲染表格
            renderTable();
        }

        // 重置
        function reset() {
            document.getElementById('searchInput').value = '';
            document.getElementById('typeFilter').value = '';
            document.getElementById('difficultyFilter').value = '';
            renderTable();
        }

        // 新增题目
        function addQuestion() {
            window.location.href = './教师端_题库_新增题目.html';
        }

        // 编辑题目
        function editQuestion(id) {
            window.location.href = `./教师端_题库_编辑题目.html?id=${id}`;
        }

        // 删除题目
        function deleteQuestion(id) {
            if (confirm('确定要删除这道题目吗？删除后不可恢复。')) {
                // 这里添加删除逻辑
                alert('题目删除成功！');
                // 重新渲染表格
                renderTable();
            }
        }

        // 复制题目
        function copyQuestion(id) {
            // 这里添加复制逻辑
            alert('题目复制成功！已添加到我的题库');
        }

        // 上一页
        function prevPage() {
            alert('上一页');
        }

        // 下一页
        function nextPage() {
            alert('下一页');
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('iBodaoUser');
            window.location.href = './教学实训平台_登录.html';
        }

        // 菜单折叠
        function toggleMenu(element) {
            element.classList.toggle('collapsed');
            const menuItems = element.nextElementSibling;
            if (menuItems && menuItems.classList.contains('menu-items')) {
                menuItems.classList.toggle('collapsed');
            }
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
