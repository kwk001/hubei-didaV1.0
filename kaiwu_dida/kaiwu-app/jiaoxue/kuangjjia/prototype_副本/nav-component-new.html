<!-- 导航组件脚本 -->
<script>
(function() {
  'use strict';

  class NavigationComponent {
    constructor() {
      this.nav = document.getElementById('mainNav');
      if (!this.nav) return;
      
      this.init();
    }

    init() {
      this.bindEvents();
      this.highlightCurrentPage();
      this.initSearch();
    }

    bindEvents() {
      // 菜单展开/收起
      const headers = this.nav.querySelectorAll('.nav-section-header');
      headers.forEach(header => {
        header.addEventListener('click', (e) => this.toggleSection(e.currentTarget));
        header.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            this.toggleSection(e.currentTarget);
          }
        });
      });

      // 键盘导航
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          this.closeAllSections();
        }
      });
    }

    toggleSection(header) {
      const content = header.nextElementSibling;
      const isExpanded = header.getAttribute('aria-expanded') === 'true';
      
      header.setAttribute('aria-expanded', !isExpanded);
      header.classList.toggle('collapsed', isExpanded);
      
      if (isExpanded) {
        content.style.maxHeight = '0';
        content.style.opacity = '0';
      } else {
        content.style.maxHeight = content.scrollHeight + 'px';
        content.style.opacity = '1';
      }
    }

    closeAllSections() {
      const headers = this.nav.querySelectorAll('.nav-section-header[aria-expanded="true"]');
      headers.forEach(header => this.toggleSection(header));
    }

    highlightCurrentPage() {
      const currentPage = decodeURIComponent(window.location.pathname.split('/').pop());
      const items = this.nav.querySelectorAll('.nav-item');
      
      items.forEach(item => {
        const href = item.getAttribute('href');
        if (href && href.includes(currentPage)) {
          item.classList.add('active');
          item.setAttribute('aria-current', 'page');
          
          // 展开父菜单
          const section = item.closest('.nav-section');
          if (section) {
            const header = section.querySelector('.nav-section-header');
            const content = section.querySelector('.nav-section-content');
            if (header && content) {
              header.setAttribute('aria-expanded', 'true');
              content.style.maxHeight = content.scrollHeight + 'px';
              content.style.opacity = '1';
            }
          }
        }
      });
    }

    initSearch() {
      const searchInput = this.nav.querySelector('.search-input');
      if (!searchInput) return;

      // 快捷键支持
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
          e.preventDefault();
          searchInput.focus();
        }
      });

      // 搜索过滤
      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const items = this.nav.querySelectorAll('.nav-item');
        
        items.forEach(item => {
          const text = item.textContent.toLowerCase();
          const section = item.closest('.nav-section');
          
          if (text.includes(query)) {
            item.style.display = '';
            if (section) {
              section.style.display = '';
              const header = section.querySelector('.nav-section-header');
              const content = section.querySelector('.nav-section-content');
              if (header && content && query) {
                header.setAttribute('aria-expanded', 'true');
                content.style.maxHeight = content.scrollHeight + 'px';
                content.style.opacity = '1';
              }
            }
          } else {
            item.style.display = 'none';
          }
        });

        // 隐藏空的分区
        const sections = this.nav.querySelectorAll('.nav-section');
        sections.forEach(section => {
          const visibleItems = section.querySelectorAll('.nav-item:not([style*="display: none"])');
          if (visibleItems.length === 0 && query) {
            section.style.display = 'none';
          } else {
            section.style.display = '';
          }
        });
      });
    }
  }

  // 初始化
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => new NavigationComponent());
  } else {
    new NavigationComponent();
  }
})();
</script>
