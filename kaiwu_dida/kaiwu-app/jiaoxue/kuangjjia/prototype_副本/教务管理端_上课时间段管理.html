<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#6366f1">
    <title>上课时间段管理 - 教务管理端</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --secondary: #f59e0b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --border-light: #e2e8f0;
            --border-medium: #cbd5e1;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F5F7FA;
            min-height: 100vh;
        }

        .main-content {
            margin-left: 220px;
            padding-top: 60px;
            background: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 220px;
            right: 0;
            z-index: 100;
            height: 60px;
        }

        .breadcrumb {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb a {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
        }

        .breadcrumb span:not(a) {
            color: rgba(255,255,255,0.6);
        }

        .content-body {
            padding: 20px;
            min-height: calc(100vh - 60px);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--bg-card);
            padding: 14px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .stat-card.total::before {
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-light) 100%);
        }

        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .stat-card:hover .stat-icon {
            transform: scale(1.1) rotate(5deg);
        }

        .stat-card.total .stat-icon {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            box-shadow: 0 8px 20px -4px rgba(99, 102, 241, 0.4);
        }

        .stat-icon svg {
            width: 26px;
            height: 26px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .stat-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* 筛选区域 */
        .filter-section {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
        }

        .filter-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .filter-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }

        .btn-expand {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border: 1px solid var(--border-light);
            background: var(--bg-card);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .btn-expand:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .expand-icon {
            transition: transform 0.3s ease;
        }

        .btn-expand.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .filter-row {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
            max-height: 70px;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .filter-row.expanded {
            max-height: 300px;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: calc(25% - 18px);
            min-width: 180px;
        }

        .filter-item label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
        }

        .filter-item input, .filter-item select {
            padding: 10px 14px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 14px;
            background: #ffffff;
            transition: all 0.2s ease;
            height: 40px;
        }

        .filter-item input:focus, .filter-item select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .filter-actions {
            display: flex;
            gap: 12px;
            width: calc(25% - 18px);
            min-width: 160px;
        }

        .btn-search {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px -2px rgba(99, 102, 241, 0.4);
        }

        .btn-reset {
            padding: 12px 24px;
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-reset:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        /* 操作栏 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .action-left {
            display: flex;
            gap: 12px;
        }

        .btn-primary {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 12px -2px rgba(99, 102, 241, 0.4);
        }

        .btn-default {
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .btn-default:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .record-count {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .record-count span {
            color: var(--primary);
            font-weight: 600;
        }

        /* 表格容器 */
        .table-container {
            background: var(--bg-card);
            border-radius: 10px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            background: #f1f5f9;
            padding: 16px 20px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            border-bottom: 1px solid #cbd5e1;
            white-space: nowrap;
        }

        td {
            padding: 16px 20px;
            font-size: 14px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-light);
            white-space: nowrap;
            background: var(--bg-card);
        }

        tr:hover td {
            background: rgba(99, 102, 241, 0.03);
        }

        /* 固定第一列（复选框列） */
        th:first-child,
        td:first-child {
            position: sticky;
            left: 0;
            z-index: 10;
            width: 50px;
            min-width: 50px;
            max-width: 50px;
            text-align: center;
            vertical-align: middle;
        }

        th:first-child {
            background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
            z-index: 20;
        }

        td:first-child {
            background: var(--bg-card);
        }

        tr:hover td:first-child {
            background: rgba(99, 102, 241, 0.03);
        }

        /* 固定最后一列（操作列） */
        th:last-child,
        td:last-child {
            position: sticky;
            right: 0;
            z-index: 10;
            width: auto;
            min-width: fit-content;
        }

        th:last-child {
            background: linear-gradient(180deg, #f1f5f9 0%, #e2e8f0 100%);
            z-index: 20;
        }

        td:last-child {
            background: var(--bg-card);
            padding: 16px 10px;
        }

        /* 固定列阴影效果 */
        th:first-child::after,
        td:first-child::after {
            content: '';
            position: absolute;
            top: 0;
            right: -5px;
            width: 5px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.05), transparent);
            pointer-events: none;
        }

        th:last-child::before,
        td:last-child::before {
            content: '';
            position: absolute;
            top: 0;
            left: -5px;
            width: 5px;
            height: 100%;
            background: linear-gradient(to left, rgba(0,0,0,0.05), transparent);
            pointer-events: none;
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* 复选框样式 */
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-light);
            border-radius: 4px;
            cursor: pointer;
            accent-color: var(--primary);
            transition: all 0.2s ease;
            vertical-align: middle;
        }

        input[type="checkbox"]:hover {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.1);
        }

        /* 时间段标签 */
        .time-slot-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            color: #4f46e5;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .time-slot-tag svg {
            width: 16px;
            height: 16px;
        }

        /* 操作按钮 */
        .action-btns {
            display: flex;
            gap: 10px;
            white-space: nowrap;
        }

        .action-btns button {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: var(--primary);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .action-btns button:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .action-btns .btn-delete {
            color: #ef4444;
        }

        .action-btns .btn-delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px 20px;
            gap: 8px;
        }

        .pagination button {
            padding: 8px 12px;
            border: 1px solid var(--border-light);
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .pagination button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-body {
            padding: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        /* 时间范围选择器 */
        .time-range-picker {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .time-range-picker input[type="time"] {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            background: white;
        }

        .time-range-picker input[type="time"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .time-separator {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding: 10px;
            border-top: 1px solid var(--border-light);
        }

        .btn-cancel {
            padding: 10px 20px;
            border: 1px solid var(--border-light);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-save {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-save:hover {
            background: var(--primary-dark);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- 侧边栏导航容器 -->
    <div id="nav-container"></div>

    <!-- 头部区域 -->
    <div class="header">
        <div class="header-left">
            <div class="breadcrumb">
                <a href="./教学实训平台_教务管理端.html">首页</a>
                <span>/</span>
                <a href="#">教务管理</a>
                <span>/</span>
                <span>上课时间段管理</span>
            </div>
        </div>
        <div class="header-right">
            <div id="user-menu-container"></div>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="content-body">
            <!-- 筛选区域 -->
            <div class="filter-section">
                <div class="filter-header">
                    <span class="filter-title">筛选条件</span>
                    <button class="btn-expand" id="expandBtn" onclick="toggleFilter()">
                        <span>展开</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="expand-icon">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="filter-row" id="filterRow">
                    <div class="filter-item">
                        <label>上课时间段</label>
                        <input type="text" id="filterTimeRange" placeholder="例如：08:00-09:40">
                    </div>
                    <div class="filter-item">
                        <label>备注</label>
                        <input type="text" id="filterRemark" placeholder="请输入备注关键词">
                    </div>
                    <div class="filter-actions">
                        <button class="btn-search" onclick="searchTimeSlots()">查询</button>
                        <button class="btn-reset" onclick="resetFilter()">重置</button>
                    </div>
                </div>
            </div>

            <!-- 操作栏 -->
            <div class="action-bar">
                <div class="action-left">
                    <button class="btn-primary" onclick="openAddModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        新增时间段
                    </button>
                    <button class="btn-default" onclick="downloadTemplate()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        导入模板
                    </button>
                    <button class="btn-default" onclick="batchImport()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        批量导入
                    </button>
                    <button class="btn-default" onclick="batchExport()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        批量导出
                    </button>
                </div>
                <div class="record-count">
                    共 <span id="recordCount">0</span> 条记录
                </div>
            </div>

            <!-- 表格 -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                            <th>上课时间段</th>
                            <th>备注</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- 数据由JavaScript动态生成 -->
                    </tbody>
                </table>

                <!-- 分页 -->
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑弹窗 -->
    <div class="modal-overlay" id="timeSlotModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">新增时间段</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="timeSlotForm">
                    <input type="hidden" id="timeSlotId">
                    <div class="form-group">
                        <label>上课时间段 <span style="color: #ef4444;">*</span></label>
                        <div class="time-range-picker">
                            <input type="time" id="startTime" required>
                            <span class="time-separator">至</span>
                            <input type="time" id="endTime" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="remark" rows="3" placeholder="请输入备注信息（选填）"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
                <button type="button" class="btn-save" onclick="saveTimeSlot()">保存</button>
            </div>
        </div>
    </div>

    <script src="./nav-loader-new.js"></script>
    <script>
        // 示例数据
        let allData = [
            { id: 1, timeRange: '08:00-09:40', remark: '上午第一节' },
            { id: 2, timeRange: '10:00-11:40', remark: '上午第二节' },
            { id: 3, timeRange: '14:00-15:40', remark: '下午第一节' },
            { id: 4, timeRange: '16:00-17:40', remark: '下午第二节' },
            { id: 5, timeRange: '19:00-20:40', remark: '晚间课程' }
        ];

        let filteredData = [...allData];
        let currentPage = 1;
        let pageSize = 10;
        let editingId = null;
        let selectedIds = new Set();

        // 初始化
        function init() {
            renderTable();
            updateStats();
            renderPagination();
        }

        // 渲染表格
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);

            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                            <p>暂无数据</p>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = pageData.map(item => `
                <tr>
                    <td>
                        <input type="checkbox" 
                               value="${item.id}" 
                               ${selectedIds.has(item.id) ? 'checked' : ''}
                               onchange="toggleSelect(${item.id})">
                    </td>
                    <td>
                        <div class="time-slot-tag">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <polyline points="12 6 12 12 16 14"/>
                            </svg>
                            ${item.timeRange}
                        </div>
                    </td>
                    <td>${item.remark || '-'}</td>
                    <td>
                        <div class="action-btns">
                            <button onclick="editTimeSlot(${item.id})">编辑</button>
                            <button class="btn-delete" onclick="deleteTimeSlot(${item.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            updateSelectAllCheckbox();
        }

        // 更新统计
        function updateStats() {
            document.getElementById('totalCount').textContent = allData.length;
            document.getElementById('recordCount').textContent = filteredData.length;
        }

        // 渲染分页
        function renderPagination() {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <button onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += `<span>...</span>`;
                }
            }

            html += `
                <button onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
            `;

            pagination.innerHTML = html;
        }

        // 跳转页面
        function goToPage(page) {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
            renderPagination();
        }

        // 筛选展开/收起
        function toggleFilter() {
            const filterRow = document.getElementById('filterRow');
            const expandBtn = document.getElementById('expandBtn');
            const isExpanded = filterRow.classList.contains('expanded');

            if (isExpanded) {
                filterRow.classList.remove('expanded');
                expandBtn.classList.remove('expanded');
                expandBtn.querySelector('span').textContent = '展开';
            } else {
                filterRow.classList.add('expanded');
                expandBtn.classList.add('expanded');
                expandBtn.querySelector('span').textContent = '收起';
            }
        }

        // 搜索
        function searchTimeSlots() {
            const timeRange = document.getElementById('filterTimeRange').value.trim().toLowerCase();
            const remark = document.getElementById('filterRemark').value.trim().toLowerCase();

            filteredData = allData.filter(item => {
                const matchTime = !timeRange || item.timeRange.toLowerCase().includes(timeRange);
                const matchRemark = !remark || (item.remark && item.remark.toLowerCase().includes(remark));
                return matchTime && matchRemark;
            });

            currentPage = 1;
            selectedIds.clear();
            renderTable();
            updateStats();
            renderPagination();
        }

        // 重置筛选
        function resetFilter() {
            document.getElementById('filterTimeRange').value = '';
            document.getElementById('filterRemark').value = '';
            filteredData = [...allData];
            currentPage = 1;
            selectedIds.clear();
            renderTable();
            updateStats();
            renderPagination();
        }

        // 全选/取消全选
        function toggleSelectAll() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('#tableBody input[type="checkbox"]');

            if (selectAllCheckbox.checked) {
                checkboxes.forEach(cb => {
                    selectedIds.add(parseInt(cb.value));
                    cb.checked = true;
                });
            } else {
                checkboxes.forEach(cb => {
                    selectedIds.delete(parseInt(cb.value));
                    cb.checked = false;
                });
            }
        }

        // 更新全选复选框状态
        function updateSelectAllCheckbox() {
            const selectAllCheckbox = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('#tableBody input[type="checkbox"]');
            const checkedBoxes = document.querySelectorAll('#tableBody input[type="checkbox"]:checked');

            if (checkboxes.length === 0) {
                selectAllCheckbox.checked = false;
                selectAllCheckbox.indeterminate = false;
            } else if (checkedBoxes.length === checkboxes.length) {
                selectAllCheckbox.checked = true;
                selectAllCheckbox.indeterminate = false;
            } else if (checkedBoxes.length > 0) {
                selectAllCheckbox.checked = false;
                selectAllCheckbox.indeterminate = true;
            } else {
                selectAllCheckbox.checked = false;
                selectAllCheckbox.indeterminate = false;
            }
        }

        // 选择单个
        function toggleSelect(id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
            } else {
                selectedIds.add(id);
            }
            updateSelectAllCheckbox();
        }

        // 打开新增弹窗
        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '新增时间段';
            document.getElementById('timeSlotForm').reset();
            document.getElementById('timeSlotModal').classList.add('active');
        }

        // 编辑时间段
        function editTimeSlot(id) {
            const item = allData.find(s => s.id === id);
            if (!item) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = '编辑时间段';
            document.getElementById('timeSlotId').value = item.id;

            const timeParts = item.timeRange.split('-');
            if (timeParts.length === 2) {
                document.getElementById('startTime').value = timeParts[0];
                document.getElementById('endTime').value = timeParts[1];
            }

            document.getElementById('remark').value = item.remark || '';
            document.getElementById('timeSlotModal').classList.add('active');
        }

        // 保存时间段
        function saveTimeSlot() {
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const remark = document.getElementById('remark').value.trim();

            if (!startTime || !endTime) {
                alert('请选择开始时间和结束时间');
                return;
            }

            if (startTime >= endTime) {
                alert('结束时间必须晚于开始时间');
                return;
            }

            const timeRange = startTime + '-' + endTime;

            if (editingId) {
                const index = allData.findIndex(s => s.id === editingId);
                if (index !== -1) {
                    allData[index] = { ...allData[index], timeRange, remark };
                }
            } else {
                const newId = Math.max(...allData.map(s => s.id), 0) + 1;
                allData.push({ id: newId, timeRange, remark });
            }

            filteredData = [...allData];
            renderTable();
            updateStats();
            renderPagination();
            closeModal();
        }

        // 删除时间段
        function deleteTimeSlot(id) {
            if (confirm('确定要删除该时间段吗？')) {
                allData = allData.filter(s => s.id !== id);
                selectedIds.delete(id);
                filteredData = [...allData];
                renderTable();
                updateStats();
                renderPagination();
            }
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('timeSlotModal').classList.remove('active');
        }

        // 下载模板
        function downloadTemplate() {
            const template = '上课时间段,备注\n08:00-09:40,上午第一节\n10:00-11:40,上午第二节';
            const blob = new Blob([template], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '上课时间段导入模板.csv';
            link.click();
        }

        // 批量导入
        function batchImport() {
            alert('批量导入功能开发中...');
        }

        // 批量导出
        function batchExport() {
            if (selectedIds.size === 0) {
                alert('请先选择要导出的记录');
                return;
            }
            alert('批量导出功能开发中...');
        }

        // 点击遮罩关闭弹窗
        document.getElementById('timeSlotModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // 初始化
        init();
    </script>
</body>
</html>
