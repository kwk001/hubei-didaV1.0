<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑题目 - 普通题库</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .breadcrumb {
            font-size: 14px;
            color: #666;
        }

        .breadcrumb span {
            color: #1890FF;
            cursor: pointer;
        }

        .breadcrumb span:hover {
            text-decoration: underline;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #F0F2F5;
        }

        .btn-back {
            padding: 10px 20px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
        }

        .btn-back:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .form-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .form-card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
        }

        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .form-label .required {
            color: #FF4D4F;
            margin-left: 4px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #1890FF;
            box-shadow: 0 0 0 3px rgba(24,144,255,0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .option-list {
            margin-top: 12px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .option-item input[type="radio"], .option-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .option-item input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #D9D9D9;
            border-radius: 6px;
            font-size: 14px;
        }

        .option-item .btn-delete {
            color: #FF4D4F;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-add-option {
            padding: 10px 20px;
            border: 1px dashed #D9D9D9;
            background: #FAFAFA;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        .btn-add-option:hover {
            border-color: #1890FF;
            color: #1890FF;
            background: #E6F7FF;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #F0F0F0;
        }

        .btn-primary {
            padding: 12px 24px;
            background: linear-gradient(135deg, #1890FF 0%, #096DD9 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-secondary {
            padding: 12px 24px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }

        .btn-secondary:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        .answer-section {
            margin-top: 20px;
            padding: 16px;
            background: #F6FFED;
            border-radius: 8px;
            border: 1px solid #B7EB8F;
        }

        .answer-section label {
            display: block;
            font-size: 14px;
            color: #52C41A;
            margin-bottom: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
    

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="header">
            <div class="breadcrumb">
                <span onclick="goBack()">普通题库</span> / 编辑题目
            </div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>

        <div class="content-body">
            <button class="btn-back" onclick="goBack()">
                ← 返回列表
            </button>

            <!-- 基本信息 -->
            <div class="form-card">
                <div class="form-card-title">基本信息</div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">所属课程 <span class="required">*</span></label>
                        <select class="form-select" id="courseSelect">
                            <option value="">请选择课程</option>
                            <option value="计算机基础">计算机基础</option>
                            <option value="Java程序设计">Java程序设计</option>
                            <option value="Web前端开发">Web前端开发</option>
                            <option value="数据库原理">数据库原理</option>
                            <option value="计算机网络">计算机网络</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">题型 <span class="required">*</span></label>
                        <select class="form-select" id="questionType" onchange="changeQuestionType()">
                            <option value="single">单选题</option>
                            <option value="multiple">多选题</option>
                            <option value="judge">判断题</option>
                            <option value="fill">填空题</option>
                            <option value="essay">简答题</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">难度 <span class="required">*</span></label>
                        <select class="form-select" id="difficulty">
                            <option value="easy">简单</option>
                            <option value="medium">中等</option>
                            <option value="hard">困难</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- 题目内容 -->
            <div class="form-card">
                <div class="form-card-title">题目内容</div>
                <div class="form-group">
                    <label class="form-label">题干 <span class="required">*</span></label>
                    <textarea class="form-textarea" id="questionContent" placeholder="请输入题目内容"></textarea>
                </div>

                <!-- 选项区域（单选/多选） -->
                <div id="optionsSection">
                    <label class="form-label">选项设置 <span class="required">*</span></label>
                    <div class="option-list" id="optionList">
                        <div class="option-item">
                            <input type="radio" name="correctAnswer" value="A">
                            <input type="text" placeholder="选项 A">
                            <span class="btn-delete" onclick="deleteOption(this)">删除</span>
                        </div>
                        <div class="option-item">
                            <input type="radio" name="correctAnswer" value="B">
                            <input type="text" placeholder="选项 B">
                            <span class="btn-delete" onclick="deleteOption(this)">删除</span>
                        </div>
                    </div>
                    <button class="btn-add-option" onclick="addOption()">+ 添加选项</button>
                </div>

                <!-- 正确答案 -->
                <div class="answer-section">
                    <label>正确答案 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="correctAnswer" placeholder="请输入正确答案">
                </div>

                <!-- 答案解析 -->
                <div class="form-group" style="margin-top: 20px;">
                    <label class="form-label">答案解析</label>
                    <textarea class="form-textarea" id="answerAnalysis" placeholder="请输入答案解析（选填）"></textarea>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="btn-group">
                <button class="btn-secondary" onclick="goBack()">取消</button>
                <button class="btn-primary" onclick="saveQuestion()">保存修改</button>
            </div>
        </div>
    </div>

    <script>
        let optionCount = 2;

        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        // 初始化页面
        function init() {
            const id = getUrlParam('id');
            if (id) {
                loadQuestionData(id);
            }
        }

        // 加载题目数据
        function loadQuestionData(id) {
            // 模拟数据，实际应从后端获取
            const mockData = {
                1: {
                    course: '计算机基础',
                    type: 'single',
                    difficulty: 'easy',
                    content: '计算机的CPU主要由哪两部分组成？',
                    options: [
                        { letter: 'A', text: '运算器和控制器', correct: true },
                        { letter: 'B', text: '存储器和运算器', correct: false },
                        { letter: 'C', text: '输入设备和输出设备', correct: false },
                        { letter: 'D', text: '主板和内存', correct: false }
                    ],
                    correctAnswer: 'A',
                    analysis: 'CPU（中央处理器）是计算机的核心部件，主要由运算器和控制器两部分组成。'
                }
            };

            const data = mockData[id] || mockData[1];
            
            // 填充表单
            document.getElementById('courseSelect').value = data.course;
            document.getElementById('questionType').value = data.type;
            document.getElementById('difficulty').value = data.difficulty;
            document.getElementById('questionContent').value = data.content;
            document.getElementById('correctAnswer').value = data.correctAnswer;
            document.getElementById('answerAnalysis').value = data.analysis;

            // 渲染选项
            renderOptions(data.options, data.type);
        }

        // 渲染选项
        function renderOptions(options, type) {
            const optionList = document.getElementById('optionList');
            optionCount = options.length;
            
            optionList.innerHTML = options.map((opt, index) => `
                <div class="option-item">
                    <input type="${type === 'single' ? 'radio' : 'checkbox'}" 
                           name="${type === 'single' ? 'correctAnswer' : 'correctAnswer[]'}" 
                           value="${opt.letter}" 
                           ${opt.correct ? 'checked' : ''}>
                    <input type="text" placeholder="选项 ${opt.letter}" value="${opt.text}">
                    <span class="btn-delete" onclick="deleteOption(this)">删除</span>
                </div>
            `).join('');
        }

        // 返回
        function goBack() {
            window.location.href = './教师端_题库.html';
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('iBodaoUser');
            window.location.href = './教学实训平台_登录.html';
        }

        // 菜单折叠
        function toggleMenu(element) {
            element.classList.toggle('collapsed');
            const menuItems = element.nextElementSibling;
            if (menuItems && menuItems.classList.contains('menu-items')) {
                menuItems.classList.toggle('collapsed');
            }
        }

        // 切换题型
        function changeQuestionType() {
            const type = document.getElementById('questionType').value;
            const optionsSection = document.getElementById('optionsSection');
            const optionList = document.getElementById('optionList');

            if (type === 'single' || type === 'multiple') {
                optionsSection.style.display = 'block';
                const inputs = optionList.querySelectorAll('input[type="radio"], input[type="checkbox"]');
                inputs.forEach(input => {
                    input.type = type === 'single' ? 'radio' : 'checkbox';
                    input.name = type === 'single' ? 'correctAnswer' : 'correctAnswer[]';
                });
            } else {
                optionsSection.style.display = 'none';
            }
        }

        // 添加选项
        function addOption() {
            optionCount++;
            const type = document.getElementById('questionType').value;
            const optionList = document.getElementById('optionList');
            const optionLetter = String.fromCharCode(64 + optionCount);

            const optionItem = document.createElement('div');
            optionItem.className = 'option-item';
            optionItem.innerHTML = `
                <input type="${type === 'single' ? 'radio' : 'checkbox'}" 
                       name="${type === 'single' ? 'correctAnswer' : 'correctAnswer[]'}" 
                       value="${optionLetter}">
                <input type="text" placeholder="选项 ${optionLetter}">
                <span class="btn-delete" onclick="deleteOption(this)">删除</span>
            `;
            optionList.appendChild(optionItem);
        }

        // 删除选项
        function deleteOption(element) {
            if (optionCount <= 2) {
                alert('至少需要保留两个选项');
                return;
            }
            element.parentElement.remove();
            optionCount--;
            const options = document.querySelectorAll('.option-item');
            options.forEach((opt, index) => {
                const letter = String.fromCharCode(65 + index);
                opt.querySelector('input[type="text"]').placeholder = `选项 ${letter}`;
                opt.querySelector('input[type="radio"], input[type="checkbox"]').value = letter;
            });
        }

        // 保存题目
        function saveQuestion() {
            const course = document.getElementById('courseSelect').value;
            const type = document.getElementById('questionType').value;
            const difficulty = document.getElementById('difficulty').value;
            const content = document.getElementById('questionContent').value;
            const correctAnswer = document.getElementById('correctAnswer').value;

            if (!course) {
                alert('请选择所属课程');
                return;
            }
            if (!content) {
                alert('请输入题目内容');
                return;
            }
            if (!correctAnswer) {
                alert('请输入正确答案');
                return;
            }

            alert('题目修改成功！');
            goBack();
        }

        // 页面加载时初始化
        window.onload = init;
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
</html>
