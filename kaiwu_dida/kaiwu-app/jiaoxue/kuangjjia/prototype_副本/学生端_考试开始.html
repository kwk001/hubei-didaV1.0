<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试开始 - 学生端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./nav-styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
                /* 有导航栏时的布局 */
        body.has-nav-sidebar {
            display: flex;
        }

        body.has-nav-sidebar .main-content {
            flex: 1;
            margin-left: 260px; /* 导航栏宽度 */
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 0;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .logo {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-group {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-title {
            padding: 12px 24px;
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            padding: 12px 24px 12px 48px;
            cursor: pointer;
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            transition: all 0.3s;
        }

        .menu-item:hover, .menu-item.active {
            background: #1890FF;
            color: #fff;
        }

        .header {
            height: 64px;
            background: #fff;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-text {
            background: none;
            border: none;
            color: #595959;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-text:hover {
            color: #1890ff;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #1f1f1f;
            margin: 0;
        }

        .exam-timer {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #fff;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            color: #ff4d4f;
        }

        .exam-container {
            display: flex;
            gap: 24px;
            height: calc(100vh - 200px);
        }

        .question-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .question-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            flex: 1;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .question-number {
            font-size: 16px;
            font-weight: 600;
            color: #1890ff;
        }

        .question-type {
            font-size: 13px;
            color: #8c8c8c;
            padding: 4px 12px;
            background: #f5f5f5;
            border-radius: 4px;
        }

        .question-source {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
            margin-left: 8px;
        }

        .question-source.normal {
            background: #e6f7ff;
            color: #1890ff;
            border: 1px solid #91d5ff;
        }

        .question-source.practice {
            background: #fff7e6;
            color: #fa8c16;
            border: 1px solid #ffd591;
        }

        /* 加工类 - 紫色 */
        .question-source.machining {
            background: #f9f0ff;
            color: #722ed1;
            border: 1px solid #d3adf7;
        }

        /* 检测类 - 青色 */
        .question-source.inspection {
            background: #e6fffb;
            color: #13c2c2;
            border: 1px solid #87e8de;
        }

        /* 设计类 - 绿色 */
        .question-source.design {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }

        /* 工艺类 - 橙色 */
        .question-source.process {
            background: #fff7e6;
            color: #fa8c16;
            border: 1px solid #ffd591;
        }

        /* 编程类 - 蓝色 */
        .question-source.programming {
            background: #e6f7ff;
            color: #1890ff;
            border: 1px solid #91d5ff;
        }

        .question-text {
            font-size: 16px;
            color: #1f1f1f;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .option-item:hover {
            border-color: #1890ff;
            background: #e6f7ff;
        }

        .option-item input[type="radio"] {
            display: none;
        }

        .option-label {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 14px;
            font-weight: 600;
            color: #595959;
        }

        .option-item input[type="radio"]:checked + .option-label {
            background: #1890ff;
            color: #fff;
        }

        .option-text {
            font-size: 14px;
            color: #1f1f1f;
        }

        .question-actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #1890ff;
            color: #fff;
        }

        .btn-default {
            background: #fff;
            color: #595959;
            border: 1px solid #d9d9d9;
        }

        .exam-sidebar {
            width: 280px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .sidebar-section {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #1f1f1f;
            margin-bottom: 16px;
        }

        .answer-sheet {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .answer-item {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
            background: #fff;
            color: #333;
        }

        .answer-item:hover {
            border-color: #1890ff;
            color: #1890ff;
            transform: scale(1.1);
        }

        .answer-item.answered {
            background: #52c41a;
            border-color: #52c41a;
            color: #fff;
        }

        .answer-item.current {
            background: #1890ff;
            border-color: #1890ff;
            color: #fff;
        }

        .btn-danger {
            background: #ff4d4f;
            color: #fff;
        }

        .btn-block {
            width: 100%;
            justify-content: center;
        }

        /* 图例样式 - 参考特殊_在线考试界面.html */
        .card-legend {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #666;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }


    </style>
</head>
<body>
    <div class="main-content">
        <div class="header">
            <div>首页 / 我的学习 / 考试</div>
            <div><i class="iconfont icon-xueshengguanli"></i> 学生：李明 | <button onclick="logout()" style="padding: 6px 16px; background: #FF4D4F; color: #fff; border: none; border-radius: 4px; cursor: pointer;">退出</button></div>
        </div>

        <div class="content-body">
            <!-- 顶部区域已隐藏 -->
            <div class="page-header" style="display: none;">
                <div class="header-left">
                    <button class="btn btn-text" onclick="goBack()">
                        <i class="iconfont icon-fanhui"></i> 返回课程
                    </button>
                    <h1 class="page-title" id="examTitle">考试</h1>
                </div>
                <div class="exam-timer">
                    <i class="iconfont icon-shijian"></i>
                    <span id="timer">30:00</span>
                </div>
            </div>

            <div class="exam-container">
                <div class="question-section">
                    <div class="question-card">
                        <div class="question-header">
                            <span class="question-number">第1题 / 共20题</span>
                            <div>
                                <span class="question-type">单选题</span>
                                <span class="question-source normal" id="questionSource">普通题目</span>
                            </div>
                        </div>
                        <div class="question-content">
                            <!-- 题目内容区域已隐藏 -->
                            <p class="question-text" style="display: none;">机械制图中，三视图是指哪三个视图？</p>
                            <div class="options-list">
                                <label class="option-item">
                                    <input type="radio" name="answer" value="A">
                                    <span class="option-label">A</span>
                                    <span class="option-text">主视图、俯视图、左视图</span>
                                </label>
                                <label class="option-item">
                                    <input type="radio" name="answer" value="B">
                                    <span class="option-label">B</span>
                                    <span class="option-text">主视图、俯视图、右视图</span>
                                </label>
                                <label class="option-item">
                                    <input type="radio" name="answer" value="C">
                                    <span class="option-label">C</span>
                                    <span class="option-text">前视图、俯视图、左视图</span>
                                </label>
                                <label class="option-item">
                                    <input type="radio" name="answer" value="D">
                                    <span class="option-label">D</span>
                                    <span class="option-text">主视图、仰视图、左视图</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="question-actions">
                        <button class="btn btn-default" onclick="prevQuestion()">
                            <i class="iconfont icon-shangyiye"></i> 上一题
                        </button>
                        <button class="btn btn-primary" onclick="nextQuestion()">
                            下一题 <i class="iconfont icon-xiayiye"></i>
                        </button>
                    </div>
                </div>

                <div class="exam-sidebar">
                    <!-- 答题卡 -->
                    <div class="sidebar-section">
                        <div class="section-title">题目导航</div>
                        <div class="answer-sheet" id="answerSheet">
                            <!-- 动态生成答题卡 -->
                        </div>
                        <div class="card-legend">
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #1890ff;"></div>
                                <span>当前题目</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #52c41a;"></div>
                                <span>已作答</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #fff; border: 1px solid #d9d9d9;"></div>
                                <span>未作答</span>
                            </div>
                        </div>
                    </div>

                    <!-- 提交按钮 -->
                    <button class="btn btn-danger btn-block" onclick="submitExam()">
                        <i class="iconfont icon-tijiao"></i> 提交试卷
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        window.onload = function() {
            const examName = getUrlParam('examName');
            if (examName) {
                document.getElementById('examTitle').textContent = examName;
            }
            startTimer();
            initQuestions();
        };

        function startTimer() {
            let minutes = 30;
            let seconds = 0;
            
            const timer = setInterval(() => {
                if (seconds === 0) {
                    if (minutes === 0) {
                        clearInterval(timer);
                        alert('考试时间到！');
                        submitExam();
                        return;
                    }
                    minutes--;
                    seconds = 59;
                } else {
                    seconds--;
                }
                
                const minStr = minutes.toString().padStart(2, '0');
                const secStr = seconds.toString().padStart(2, '0');
                document.getElementById('timer').textContent = minStr + ':' + secStr;
            }, 1000);
        }

        function goBack() {
            if (confirm('确定要退出考试吗？退出后已作答的题目将保存，但计时不会暂停。')) {
                window.location.href = './学生端_课程详情.html';
            }
        }

        function logout() {
            localStorage.removeItem('iBodaoUser');
            window.location.href = './教学实训平台_登录.html';
        }

        // 题目数据 - 包含普通题目和实训题目
        const questions = [
            {
                id: 1,

                answer: 'A'
            },
            {
                id: 2,
                type: '实操题',
                source: 'practice',
                practiceType: 'machining',
                sourceText: '加工类',
                question: '数控车床编程与操作：外圆车削加工',
                workOrder: {
                    number: 'WO-2024-001',
                    material: '传动轴毛坯',
                    specification: 'Φ55×200mm',
                    quantity: '1件',
                    operator: '张伟',
                    timeSlot: '2026-02-28 09:00-11:00'
                },
                processRoute: '轴类零件加工 | 8道工序',
                requirements: {
                    material: '45#钢',
                    blankSize: 'Φ55×120mm',
                    precision: 'IT7级',
                    roughness: 'Ra3.2',
                    description: '完成轴类零件的外圆车削加工，保证尺寸精度和表面质量要求。加工过程中注意刀具选择、切削参数设定和测量检验。'
                },
                processSteps: [
                    { id: 1, name: '下料', desc: '根据工艺要求，将原材料切割至指定长度', params: ['切割长度', '端面平整度'], tips: '使用锯床进行切割，确保端面平整，无毛刺。切割长度公差控制在±0.5mm以内。' },
                    { id: 2, name: '车端面', desc: '车削工件两端面，保证端面与轴线垂直', params: ['主轴转速', '进给速度', '端面粗糙度'], tips: '装夹时注意校正，车刀对准工件中心。端面车削后粗糙度应达到Ra3.2。' },
                    { id: 3, name: '钻中心孔', desc: '在工件两端钻中心孔，为后续加工定位', params: ['钻头直径', '钻孔深度', '主轴转速'], tips: '中心钻对准工件中心，钻孔深度适中，不宜过深。注意冷却液的使用。' },

                    rightHtml += `
                        <button class="btn btn-danger btn-block" onclick="submitExam()">

                }
                
                examSidebar.innerHTML = rightHtml;
                
                // 重新渲染答题卡
                updateAnswerSheet();
                
            } else {

                const labels = ['A', 'B', 'C', 'D'];
                optionsList.innerHTML = question.options.map((option, i) => `

                        <span class="option-label">${labels[i]}</span>
                        <span class="option-text">${option}</span>
                    </label>
                `).join('');

                // 恢复已选答案
                if (question.selectedAnswer) {
                    const radio = document.querySelector(`input[value="${question.selectedAnswer}"]`);
                    if (radio) radio.checked = true;
                }
                
                // 恢复右侧边栏默认内容（普通题目也显示工单信息）
                examSidebar.innerHTML = `
                    <!-- 工单信息 -->
                    <div class="sidebar-section">
                        <div class="section-title">📋 工单信息</div>
                        <div style="font-size: 13px; color: #595959;">
                            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F5F5F5;">
                                <span style="color: #999;">试卷名称</span>
                                <span style="color: #333; font-weight: 500;">数控车床中级技能鉴定</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F5F5F5;">
                                <span style="color: #999;">所属课程</span>
                                <span style="color: #333; font-weight: 500;">数控车床编程与操作</span>
                            </div>
                            <div style="padding: 8px 0; border-bottom: 1px solid #F5F5F5;">
                                <div style="color: #999; margin-bottom: 8px;">考试日期</div>
                                <div style="display: flex; flex-direction: column; gap: 4px;">
                                    <div style="color: #333; font-weight: 500;">2026-03-11</div>
                                    <div style="color: #333; font-weight: 500;">2026-03-12</div>
                                </div>
                            </div>
                            <div style="padding: 8px 0;">
                                <div style="color: #999; margin-bottom: 8px;">考试时间段</div>
                                <div style="display: flex; flex-direction: column; gap: 4px;">
                                    <div style="color: #333; font-weight: 500; font-size: 12px;">08:00-10:00</div>
                                    <div style="color: #333; font-weight: 500; font-size: 12px;">14:00-16:00</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="sidebar-section">
                        <div class="section-title">题目导航</div>
                        <div class="answer-sheet" id="answerSheet">
                            <!-- 动态生成答题卡 -->
                        </div>
                        <div class="card-legend">
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #1890ff;"></div>
                                <span>当前题目</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #52c41a;"></div>
                                <span>已作答</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background: #fff; border: 1px solid #d9d9d9;"></div>
                                <span>未作答</span>
                            </div>
                        </div>
                    </div>

                    <!-- 考试信息模块已隐藏 -->
                    <!--
                    <div class="sidebar-section">
                        <div class="section-title">考试信息</div>
                        <div style="font-size: 14px; color: #595959;" id="examInfo">
                            <div style="margin-bottom: 8px;">题目总数：<span id="totalQuestions">20</span>题</div>
                            <div style="margin-bottom: 8px;">普通题目：<span id="normalCount">3</span>题</div>
                            <div style="margin-bottom: 8px;">实训题目：<span id="practiceCount">2</span>题</div>
                            <div style="margin-bottom: 8px;">已作答：<span id="answeredCount">0</span>题</div>
                            <div>未作答：<span id="unansweredCount">5</span>题</div>
                        </div>
                    </div>
                    -->

                // 重新渲染答题卡
                updateAnswerSheet();
                // updateExamInfo(); // 考试信息模块已隐藏
            }

            // 更新答题卡当前题标记
            updateAnswerSheetCurrent(index);
        }
        
        // 处理文件上传
        function handleFileUpload(questionIndex, input) {
            const files = input.files;
            if (files.length > 0) {
                const uploadedFilesDiv = document.getElementById(`uploadedFiles${questionIndex}`);
                let filesHtml = '<div style="font-weight: 600; color: #333; margin-bottom: 8px;">已选择的文件：</div>';
                
                for (let i = 0; i < files.length; i++) {
                    filesHtml += `
                        <div style="padding: 8px 12px; background: #f5f5f5; border-radius: 4px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between;">
                            <span style="color: #333;"><i class="iconfont icon-file" style="margin-right: 8px; color: #1890ff;"></i>${files[i].name}</span>
                            <span style="color: #999; font-size: 12px;">${(files[i].size / 1024).toFixed(1)} KB</span>
                        </div>
                    `;
                }
                
                uploadedFilesDiv.innerHTML = filesHtml;
                
                // 标记题目为已作答
                questions[questionIndex].answered = true;
                questions[questionIndex].uploadedFiles = files;
                updateAnswerSheet();
                updateExamInfo();
                
                alert(`成功上传 ${files.length} 个文件！`);
            }
        }

        // 选择答案
        function selectAnswer(questionIndex, answer) {
            questions[questionIndex].selectedAnswer = answer;
            questions[questionIndex].answered = true;
            updateAnswerSheet();
            updateExamInfo();
        }

        // 更新考试信息统计
        function updateExamInfo() {
            const totalQuestions = questions.length;
            const normalCount = questions.filter(q => q.source === 'normal').length;
            const practiceCount = questions.filter(q => q.source === 'practice').length;
            const answeredCount = questions.filter(q => q.answered).length;
            const unansweredCount = totalQuestions - answeredCount;

            document.getElementById('totalQuestions').textContent = totalQuestions;
            document.getElementById('normalCount').textContent = normalCount;
            document.getElementById('practiceCount').textContent = practiceCount;
            document.getElementById('answeredCount').textContent = answeredCount;
            document.getElementById('unansweredCount').textContent = unansweredCount;
        }

        // 更新答题卡
        function updateAnswerSheet() {
            const answerSheet = document.querySelector('.answer-sheet');
            answerSheet.innerHTML = questions.map((q, i) => {
                return `
                <div class="answer-item ${q.answered ? 'answered' : ''} ${i === currentQuestionIndex ? 'current' : ''}" 
                     onclick="goToQuestion(${i})" 
                     title="${q.sourceText}">${i + 1}</div>
            `}).join('');
        }

        // 更新答题卡当前题标记
        function updateAnswerSheetCurrent(index) {
            const items = document.querySelectorAll('.answer-item');
            items.forEach((item, i) => {
                if (i === index) {
                    item.classList.add('current');
                } else {
                    item.classList.remove('current');
                }
            });
        }

        // 跳转到指定题目
        function goToQuestion(index) {
            currentQuestionIndex = index;
            renderQuestion(index);
        }

        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion(currentQuestionIndex);
            } else {
                alert('已经是第一题了');
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < totalQuestions - 1) {
                currentQuestionIndex++;
                renderQuestion(currentQuestionIndex);
            } else {
                alert('已经是最后一题了');
            }
        }

        function submitExam() {
            if (confirm('确定要提交试卷吗？提交后将无法修改答案。')) {
                alert('试卷已提交！');
                window.location.href = './学生端_考试结果.html';
            }
        }
        
        // 保存答案
        function saveAnswer() {
            alert('答案已保存！');
        }

        // 提交答案
        function submitAnswer() {
            if (confirm('确定要提交答案吗？')) {
                alert('答案已提交！');
                // 标记当前题目为已作答
                const currentQuestion = examData.questions[currentQuestionIndex];
                if (currentQuestion) {
                    currentQuestion.selectedAnswer = '已作答';
                    updateAnswerSheet();
                }
            }
        }

        // 保存设计内容
        function saveDesignContent() {
            const content = document.getElementById('designContent');
            if (content) {
                alert('设计内容已保存！');
            }
        }

        // 提交设计内容
        function submitDesignContent() {
            const content = document.getElementById('designContent');
            if (content && content.value.trim() === '') {
                alert('请填写设计说明后再提交！');
                return;
            }
            if (confirm('确定要提交设计内容吗？')) {
                alert('设计内容已提交！');
                // 标记当前题目为已作答
                const currentQuestion = examData.questions[currentQuestionIndex];
                if (currentQuestion) {
                    currentQuestion.selectedAnswer = '已作答';
                    updateAnswerSheet();
                }
            }
        }
        
        // 更新检测结果
        function updateCheckResult(index, value) {
            const currentQuestion = examData.questions[currentQuestionIndex];
            if (currentQuestion && currentQuestion.checkItems && currentQuestion.checkItems[index]) {
                currentQuestion.checkItems[index].result = value;
                // 如果有输入值，自动更新状态为待判定
                if (value && value.trim() !== '') {
                    currentQuestion.checkItems[index].status = 'pending';
                }
            }
        }
        
        // 更新检测判定
        function updateCheckVerdict(index, verdict) {
            const currentQuestion = examData.questions[currentQuestionIndex];
            if (currentQuestion && currentQuestion.checkItems && currentQuestion.checkItems[index]) {
                currentQuestion.checkItems[index].verdict = verdict;
                currentQuestion.checkItems[index].status = verdict;
                // 重新渲染以更新样式
                renderQuestion(currentQuestionIndex);
            }
        }
        
        // 保存检测结果
        function saveCheckResult() {
            const currentQuestion = examData.questions[currentQuestionIndex];
            if (currentQuestion && currentQuestion.checkItems) {
                const checkedCount = currentQuestion.checkItems.filter(item => item.result && item.result.trim() !== '').length;
                alert(`检测结果已保存！已完成 ${checkedCount}/8 项检测。`);
            }
        }
        
        // 提交检测结果
        function submitCheckResult() {
            const currentQuestion = examData.questions[currentQuestionIndex];
            if (currentQuestion && currentQuestion.checkItems) {
                const uncheckedItems = currentQuestion.checkItems.filter(item => !item.result || item.result.trim() === '');
                const unverdictItems = currentQuestion.checkItems.filter(item => item.verdict === 'pending');
                
                if (uncheckedItems.length > 0) {
                    alert(`还有 ${uncheckedItems.length} 项未填写检测结果，请完成后再提交！`);
                    return;
                }
                
                if (unverdictItems.length > 0) {
                    alert(`还有 ${unverdictItems.length} 项未进行合格判定，请完成后再提交！`);
                    return;
                }
                
                if (confirm('确定要提交检测结果吗？提交后将无法修改！')) {
                    const passCount = currentQuestion.checkItems.filter(item => item.verdict === 'pass').length;
                    const failCount = currentQuestion.checkItems.filter(item => item.verdict === 'fail').length;
                    alert(`检测结果已提交！\n合格：${passCount} 项\n不合格：${failCount} 项`);
                    
                    // 标记当前题目为已作答
                    currentQuestion.selectedAnswer = '已提交';
                    updateAnswerSheet();
                }
            }
        }
        
        // ===== 编程类专用函数 =====
        
        // 格式化代码
        function formatCode() {
            const editor = document.getElementById('codeEditor');
            if (editor) {
                let code = editor.value;
                // 简单的格式化：统一换行、去除多余空行
                code = code.replace(/\r\n/g, '\n').replace(/\n{3,}/g, '\n\n');
                editor.value = code;
                alert('代码已格式化！');
            }
        }
        
        // 清空代码
        function clearCode() {
            const editor = document.getElementById('codeEditor');
            if (editor && confirm('确定要清空代码吗？')) {
                editor.value = '';
            }
        }
        
        // 加载模板
        function loadTemplate() {
            const editor = document.getElementById('codeEditor');
            const language = document.getElementById('languageSelect')?.value || 'gcode';
            
            if (editor) {
                let template = '';
                if (language === 'gcode') {
                    template = `O0001 (数控车床加工程序)
(工件材料: 45#钢)
(毛坯尺寸: Φ55×85)

N10 G99 G21 G40 (初始化)
N20 T0101 (外圆粗车刀)
N30 S800 M03 (主轴正转)
N40 G00 X55.0 Z2.0 (快速定位)

(粗车循环)
N50 G71 U2.0 R0.5
N60 G71 P70 Q130 U0.5 W0.1 F0.2

N70 G00 X20.0
N80 G01 Z0 F0.1
N90 X24.0 Z-2.0 (倒角)
N100 Z-30.0
N110 X40.0
N120 Z-50.0
N130 X55.0

N140 G00 X100.0 Z100.0 (退刀)
N150 M30 (程序结束)`;
                } else {
                    template = `O0002 (宏程序示例)
(使用变量实现循环加工)

#1=50.0  (工件外径)
#2=30.0  (工件内径)
#3=2.0   (每次切削深度)

N90   G00 X[#2+#4+2] Z2.0
N100 END1

N110 G00 X100.0 Z100.0
N120 M30`;
                }
                editor.value = template;
                alert('模板已加载！');
            }
        }
        
        // 运行代码
        function runCode() {
            const editor = document.getElementById('codeEditor');
            const outputPanel = document.getElementById('outputPanel');
            const outputContent = document.getElementById('outputContent');
            
            if (editor && outputPanel && outputContent) {
                const code = editor.value.trim();
                if (!code) {
                    alert('请先输入代码！');
                    return;
                }
                
                // 显示运行结果面板
                outputPanel.style.display = 'block';
                
                // 模拟运行结果
                const lines = code.split('\n').length;
                const hasError = code.includes('XXX') || code.includes('ERROR');
                
                if (hasError) {
                    outputContent.innerHTML = `<span style="color: #FF6B6B;">❌ 编译错误</span>
────────────────────
<span style="color: #FF6B6B;">第 15 行: 语法错误 - 未知指令</span>
<span style="color: #FFA500;">警告: 缺少刀具补偿设置</span>

请检查代码后重试。`;
                } else {
                    outputContent.innerHTML = `<span style="color: #52C41A;">✓ 编译成功</span>
────────────────────
程序行数: ${lines} 行
预估加工时间: 8分 32秒
刀具路径: 已生成

<span style="color: #1890FF;">模拟运行中...</span>
G00 X55.0 Z2.0
G71 U2.0 R0.5
...
<span style="color: #52C41A;">✓ 程序验证通过，可以提交</span>`;
                }
            }
        }
        
        // 清空运行结果
        function clearOutput() {
            const outputPanel = document.getElementById('outputPanel');
            const outputContent = document.getElementById('outputContent');
            if (outputPanel && outputContent) {
                outputContent.innerHTML = '点击"运行代码"查看执行结果...';
                outputPanel.style.display = 'none';
            }
        }
        
        // 保存代码
        function saveCode() {
            const editor = document.getElementById('codeEditor');
            if (editor) {
                alert('代码已保存！');
            }
        }
        
        // 提交代码
        function submitCode() {
            const editor = document.getElementById('codeEditor');
            if (editor) {
                const code = editor.value.trim();
                if (!code) {
                    alert('请先输入代码后再提交！');
                    return;
                }
                if (confirm('确定要提交代码吗？')) {
                    alert('代码已提交！');
                    // 标记当前题目为已作答
                    const currentQuestion = examData.questions[currentQuestionIndex];
                    if (currentQuestion) {
                        currentQuestion.selectedAnswer = '已作答';
                        updateAnswerSheet();
                    }
                }
            }
        }
    </script>
