<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试结果 - 学生端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./nav-styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
                /* 有导航栏时的布局 */
        body.has-nav-sidebar {
            display: flex;
        }

        body.has-nav-sidebar .main-content {
            flex: 1;
            margin-left: 260px; /* 导航栏宽度 */
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 0;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .logo {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-group {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-title {
            padding: 12px 24px;
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            padding: 12px 24px 12px 48px;
            cursor: pointer;
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            transition: all 0.3s;
        }

        .menu-item:hover, .menu-item.active {
            background: #1890FF;
            color: #fff;
        }

        .header {
            height: 64px;
            background: #fff;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-text {
            background: none;
            border: none;
            color: #595959;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-text:hover {
            color: #1890ff;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #1f1f1f;
            margin: 0;
        }

        .result-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .score-card {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            display: flex;
            align-items: center;
            gap: 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .score-number {
            font-size: 36px;
            font-weight: 700;
        }

        .score-total {
            font-size: 16px;
            opacity: 0.8;
        }

        .score-info {
            flex: 1;
        }

        .result-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f1f1f;
            margin: 0 0 8px 0;
        }

        .result-desc {
            font-size: 14px;
            color: #8c8c8c;
            margin: 0 0 16px 0;
        }

        .result-tags {
            display: flex;
            gap: 8px;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
        }

        .tag-success {
            background: #f6ffed;
            color: #52c41a;
        }

        .tag-info {
            background: #e6f7ff;
            color: #1890ff;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.correct {
            background: #f6ffed;
            color: #52c41a;
        }

        .stat-icon.wrong {
            background: #fff2f0;
            color: #ff4d4f;
        }

        .stat-icon.time {
            background: #e6f7ff;
            color: #1890ff;
        }

        .stat-icon.accuracy {
            background: #f9f0ff;
            color: #722ed1;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #1f1f1f;
        }

        .stat-label {
            font-size: 13px;
            color: #8c8c8c;
        }

        .analysis-section {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f1f1f;
            margin: 0;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
        }

        .tab-btn {
            padding: 6px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            background: #fff;
            color: #595959;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            border-color: #1890ff;
            color: #1890ff;
        }

        .question-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .question-item {
            display: flex;
            gap: 16px;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        .question-item.wrong {
            background: #fff2f0;
            border-color: #ffccc7;
        }

        .question-item.correct {
            background: #f6ffed;
            border-color: #d9f7be;
        }

        .question-status {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .question-item.wrong .question-status {
            background: #ff4d4f;
            color: #fff;
        }

        .question-item.correct .question-status {
            background: #52c41a;
            color: #fff;
        }

        .question-content {
            flex: 1;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .question-number {
            font-size: 14px;
            font-weight: 600;
            color: #1890ff;
        }

        .question-type {
            font-size: 12px;
            color: #8c8c8c;
            padding: 2px 8px;
            background: #f5f5f5;
            border-radius: 4px;
        }

        .question-text {
            font-size: 14px;
            color: #1f1f1f;
            margin-bottom: 12px;
        }

        .answer-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .answer-row {
            display: flex;
            gap: 8px;
            font-size: 13px;
        }

        .label {
            color: #8c8c8c;
        }

        .value {
            font-weight: 500;
        }

        .value.wrong {
            color: #ff4d4f;
        }

        .value.correct {
            color: #52c41a;
        }

        .analysis-content {
            padding: 12px;
            background: #fff;
            border-radius: 6px;
        }

        .analysis-title {
            font-size: 13px;
            font-weight: 600;
            color: #1f1f1f;
            margin-bottom: 8px;
        }

        .analysis-text {
            font-size: 13px;
            color: #595959;
            line-height: 1.6;
            margin: 0;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #1890ff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        .btn-default {
            background: #fff;
            color: #595959;
            border: 1px solid #d9d9d9;
        }

        .btn-default:hover {
            border-color: #1890ff;
            color: #1890ff;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="header">
            <div>首页 / 我的学习 / 考试结果</div>
            <div><i class="iconfont icon-xueshengguanli"></i> 学生：李明 | <button onclick="logout()" style="padding: 6px 16px; background: #FF4D4F; color: #fff; border: none; border-radius: 4px; cursor: pointer;">退出</button></div>
        </div>

        <div class="content-body">
            <div class="page-header">
                <div class="header-left">
                    <button class="btn btn-text" onclick="goBack()">
                        <i class="iconfont icon-fanhui"></i> 返回课程
                    </button>
                    <h1 class="page-title" id="examTitle">考试结果</h1>
                </div>
            </div>

            <div class="result-container">
                <div class="score-card">
                    <div class="score-circle">
                        <span class="score-number">88</span>
                        <span class="score-total">/100</span>
                    </div>
                    <div class="score-info">
                        <h2 class="result-title">考试成绩</h2>
                        <p class="result-desc">恭喜你完成了考试！</p>
                        <div class="result-tags">
                            <span class="tag tag-success">及格</span>
                            <span class="tag tag-info">排名第3</span>
                        </div>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon correct">
                            <i class="iconfont icon-zhengque"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value">18</span>
                            <span class="stat-label">答对题数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon wrong">
                            <i class="iconfont icon-cuowu"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value">2</span>
                            <span class="stat-label">答错题数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon time">
                            <i class="iconfont icon-shijian"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value">25</span>
                            <span class="stat-label">用时(分钟)</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon accuracy">
                            <i class="iconfont icon-zhengquelv"></i>
                        </div>
                        <div class="stat-info">
                            <span class="stat-value">90%</span>
                            <span class="stat-label">正确率</span>
                        </div>
                    </div>
                </div>

                <div class="analysis-section">
                    <div class="section-header">
                        <h3 class="section-title">题目解析</h3>
                        <div class="filter-tabs">
                            <button class="tab-btn active" onclick="filterQuestions('all')">全部</button>
                            <button class="tab-btn" onclick="filterQuestions('wrong')">错题</button>
                            <button class="tab-btn" onclick="filterQuestions('correct')">对题</button>
                        </div>
                    </div>
                    
                    <div class="question-list">
                        <div class="question-item wrong">
                            <div class="question-status">
                                <i class="iconfont icon-cuowu"></i>
                            </div>
                            <div class="question-content">
                                <div class="question-header">
                                    <span class="question-number">第5题</span>
                                    <span class="question-type">单选题</span>
                                </div>
                                <p class="question-text">机械制图中，中心线用什么线型表示？</p>
                                <div class="answer-info">
                                    <div class="answer-row">
                                        <span class="label">你的答案：</span>
                                        <span class="value wrong">A. 实线</span>
                                    </div>
                                    <div class="answer-row">
                                        <span class="label">正确答案：</span>
                                        <span class="value correct">C. 点画线</span>
                                    </div>
                                </div>
                                <div class="analysis-content">
                                    <div class="analysis-title">解析</div>
                                    <p class="analysis-text">在机械制图中，中心线使用点画线表示，用于表示对称中心、轴线等。实线用于可见轮廓线，虚线用于不可见轮廓线。</p>
                                </div>
                            </div>
                        </div>

                        <div class="question-item correct">
                            <div class="question-status">
                                <i class="iconfont icon-zhengque"></i>
                            </div>
                            <div class="question-content">
                                <div class="question-header">
                                    <span class="question-number">第1题</span>
                                    <span class="question-type">单选题</span>
                                </div>
                                <p class="question-text">机械制图中，三视图是指哪三个视图？</p>
                                <div class="answer-info">
                                    <div class="answer-row">
                                        <span class="label">你的答案：</span>
                                        <span class="value correct">A. 主视图、俯视图、左视图</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-default" onclick="goBack()">
                        <i class="iconfont icon-fanhui"></i> 返回课程
                    </button>
                    <button class="btn btn-primary" onclick="retryExam()">
                        <i class="iconfont icon-zhongkao"></i> 重新考试
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        window.onload = function() {
            const examName = getUrlParam('examName');
            if (examName) {
                document.getElementById('examTitle').textContent = examName + ' - 结果';
            }
        };

        function goBack() {
            window.location.href = './学生端_课程详情.html';
        }

        function logout() {
            localStorage.removeItem('iBodaoUser');
            window.location.href = './教学实训平台_登录.html';
        }

        function filterQuestions(type) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const questions = document.querySelectorAll('.question-item');
            questions.forEach(q => {
                if (type === 'all') {
                    q.style.display = 'flex';
                } else if (type === 'wrong') {
                    q.style.display = q.classList.contains('wrong') ? 'flex' : 'none';
                } else if (type === 'correct') {
                    q.style.display = q.classList.contains('correct') ? 'flex' : 'none';
                }
            });
        }

        function retryExam() {
            if (confirm('确定要重新考试吗？')) {
                window.location.href = './学生端_考试开始.html';
            }
        }
    </script>
    <!-- 学生端导航组件加载器 -->
    <script src="./nav-loader-student.js"></script>
</body>
</html>
