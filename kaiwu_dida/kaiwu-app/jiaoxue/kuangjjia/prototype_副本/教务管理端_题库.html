<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; min-height: 100vh; }

        /* 页面特定样式 - 题目类型标签 */
        .type-tag { 
            display: inline-flex; 
            align-items: center;
            padding: 3px 10px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 500;
            border: 1px solid transparent;
        }
        .type-single { background: #E6F7FF; color: #1890FF; border-color: #91D5FF; }
        .type-multiple { background: #F6FFED; color: #52C41A; border-color: #B7EB8F; }
        .type-judge { background: #FFF7E6; color: #FA8C16; border-color: #FFD591; }
        .type-fill { background: #F9F0FF; color: #722ED1; border-color: #D3ADF7; }
        
        /* 难度标签 */
        .difficulty-tag { 
            display: inline-flex;
            align-items: center;
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 12px;
            font-weight: 500;
        }
        .difficulty-easy { background: #F6FFED; color: #52C41A; }
        .difficulty-medium { background: #FFF7E6; color: #FA8C16; }
        .difficulty-hard { background: #FFF1F0; color: #FF4D4F; }

        /* 批量操作栏 */
        .batch-operation-bar {
            background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(99,102,241,0.02) 100%);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .batch-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .batch-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #1e293b;
        }
        .batch-info {
            font-size: 13px;
            color: #64748b;
        }
        .batch-info strong {
            color: #6366f1;
            font-weight: 600;
        }
        .batch-right {
            display: flex;
            gap: 8px;
        }
        .btn-batch {
            padding: 6px 14px;
            border: 1px solid rgba(99,102,241,0.2);
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #64748b;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-batch:hover {
            border-color: #6366f1;
            color: #6366f1;
            background: rgba(99,102,241,0.04);
            transform: translateY(-1px);
        }
        .btn-batch.danger:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239,68,68,0.04);
        }

        /* 页面切换 */
        .page { display: none; }
        .page.active { display: block; }

        /* 筛选区域展开/收起按钮样式 */
        .filter-toggle {
            margin-left: auto;
            padding: 0;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #6366f1;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s ease;
        }

        .filter-toggle:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        .filter-toggle .toggle-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 12px;
            height: 12px;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .filter-toggle.expanded .toggle-icon {
            transform: rotate(180deg);
        }
        
        /* 页面样式覆盖 - 统一间距和布局 */
        .content-area {
            padding: 16px !important;
        }
        
        /* 表格分页容器 - 白色背景 */
        .table-section {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(99,102,241,0.06);
            overflow: hidden;
        }
        .table-section .data-table {
            border-radius: 0;
            box-shadow: none;
            border: none;
        }
        .table-section .pagination {
            border-top: 1px solid #F0F0F0;
            background: transparent;
            padding: 16px 0 0 0;
            margin-top: 16px;
        }
        
        /* 筛选条件模块间距调整 */
        .filter-section {
            margin-bottom: 16px !important;
            padding: 16px !important;
        }

        /* 只隐藏编辑和删除按钮，保留查看按钮 */
        .action-btns button:nth-child(2),
        .action-btns button:nth-child(3) {
            display: none !important;
        }
    </style>
</head>

                        '单选题': 'type-single',
                        '多选题': 'type-multiple',
                        '判断题': 'type-judge',
                        '填空题': 'type-fill'
                    }[val] || 'type-single';
                    return `<span class="type-tag ${typeClass}">${val}</span>`;
                }
            },
            {
                title: '难度',
                dataIndex: 'difficultyName',
                render: (val) => {
                    const diffClass = {
                        '简单': 'difficulty-easy',
                        '中等': 'difficulty-medium',
                        '困难': 'difficulty-hard'
                    }[val] || 'difficulty-easy';
                    return `<span class="difficulty-tag ${diffClass}">${val}</span>`;
                }
            },
            { title: '更新人', dataIndex: 'updater' },
            { title: '更新时间', dataIndex: 'updateTime' }
        ];

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化树状图
            TreeSidebar.render(treeData, {
                containerId: 'treeContent',
                onSelect: (nodeData) => {
                    console.log('选中节点:', nodeData);
                    filterByCategory(nodeData.id);
                }
            });

            // 初始化筛选组件
            FilterSection.init({
                containerId: 'filterRow',
                fields: filterFields,
                onSearch: (values) => {
                    console.log('筛选条件:', values);
                    filterBanks(values);
                },
                onReset: () => {
                    DataTable.setData(bankTableData);
                }
            });

            // 初始化题库表格
            DataTable.init({
                containerId: 'dataTable',
                columns: bankColumns,
                data: bankTableData,
                fixedFirstColumn: true,
                fixedLastColumn: true
            });

            // 初始化分页
            Pagination.init({
                containerId: 'pagination',
                total: bankTableData.length,
                pageSize: 10,
                current: 1,
                onChange: (page, pageSize) => {
                    console.log('页码变化:', page, pageSize);
                }
            });

            // 初始化题目表格
            DataTable.init({
                containerId: 'questionTable',
                columns: questionColumns,
                data: questionTableData,
                fixedFirstColumn: true,
                fixedLastColumn: true
            });

            // 初始化题目分页
            Pagination.init({
                containerId: 'questionPagination',
                total: questionTableData.length,
                pageSize: 10,
                current: 1
            });

            // 初始化菜单状态
            initMenuState();
        });

        // ==================== 菜单状态初始化 ====================
        function initMenuState() {
            const activeMenuItem = document.querySelector('.menu-item.active');
            const allMenuTitles = document.querySelectorAll('.menu-title');
            
            allMenuTitles.forEach(title => {
                const items = title.nextElementSibling;
                if (items && items.classList.contains('menu-items')) {
                    title.setAttribute('aria-expanded', 'false');
                    title.classList.add('collapsed');
                    items.setAttribute('hidden', '');
                }
            });
            
            if (activeMenuItem) {
                const menuItems = activeMenuItem.closest('.menu-items');
                if (menuItems) {
                    const menuTitle = menuItems.previousElementSibling;
                    if (menuTitle && menuTitle.classList.contains('menu-title')) {
                        menuTitle.setAttribute('aria-expanded', 'true');
                        menuTitle.classList.remove('collapsed');
                        menuItems.removeAttribute('hidden');
                    }
                }
            }
        }

        // ==================== 筛选功能 ====================
        function filterByCategory(categoryId) {
            const filtered = bankTableData.filter(item => {
                return item['data-category'].startsWith(categoryId);
            });
            DataTable.setData(filtered.length > 0 ? filtered : bankTableData);
        }

        function filterBanks(values) {
            let filtered = bankTableData;
            
            if (values.name) {
                filtered = filtered.filter(item => item.name.includes(values.name));
            }
            
            DataTable.setData(filtered);
        }

        // ==================== 全选功能 ====================
        function toggleSelectAllBanks() {
            const selectAll = document.getElementById('selectAllBanks').checked;
            const checkboxes = document.querySelectorAll('.bank-checkbox');
            checkboxes.forEach(cb => cb.checked = selectAll);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = document.querySelectorAll('.bank-checkbox:checked').length;
            document.getElementById('selectedCount').textContent = count;
        }

        // ==================== 批量操作 ====================
        function batchExport() {
            alert('批量导出功能开发中...');
        }

        function batchDelete() {
            const count = document.querySelectorAll('.bank-checkbox:checked').length;
            if (count === 0) {
                alert('请先选择要删除的题库');
                return;
            }
            if (confirm(`确定要删除选中的 ${count} 个题库吗？`)) {
                alert('批量删除成功');
            }
        }

        // ==================== 题库操作 ====================
        function viewBank(id) {
            const bank = bankTableData.find(b => b.id === id);
            if (bank) {
                document.getElementById('currentBankName').textContent = bank.name;
                document.getElementById('questionListTitle').textContent = bank.name + ' - 题目列表';
                document.getElementById('bankListPage').classList.remove('active');
                document.getElementById('questionListPage').classList.add('active');
            }
        }

        function editBank(id) {
            alert('编辑题库 ID: ' + id);
        }

        function deleteBank(id) {
            if (confirm('确定要删除该题库吗？')) {
                alert('删除成功');
            }
        }

        function backToBankList() {
            document.getElementById('questionListPage').classList.remove('active');
            document.getElementById('bankListPage').classList.add('active');
        }

        // ==================== 题目操作 ====================
        function viewQuestion(id) {
            alert('查看题目 ID: ' + id);
        }

        function editQuestion(id) {
            alert('编辑题目 ID: ' + id);
        }

        function deleteQuestion(id) {
            if (confirm('确定要删除该题目吗？')) {
                alert('删除成功');
            }
        }

        function searchQuestions() {
            alert('搜索题目');
        }

        function resetQuestionFilter() {
            document.getElementById('questionTypeFilter').value = '';
            document.getElementById('questionDifficultyFilter').value = '';
            document.getElementById('questionSearch').value = '';
        }

        // ==================== 退出登录 ====================
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = './login.html';
            }
        }
    </script>
    <!-- 导航加载器 - 动态加载现代化导航组件 -->
    <script src="./nav-loader-new.js"></script>
    <script src="./user-menu-component.js"></script>
</body>
</html>
