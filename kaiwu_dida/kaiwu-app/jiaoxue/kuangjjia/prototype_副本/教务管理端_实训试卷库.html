<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训任务库 - 教务管理端</title>

    <link rel="stylesheet" href="./common.css">
    <link rel="stylesheet" href="./components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #F5F7FA; min-height: 100vh; }

        /* 页面特定样式 - 实训类型标签 */
        .training-type-tag { 
            display: inline-flex; 
            align-items: center;
            padding: 3px 10px; 
            border-radius: 12px; 
            font-size: 11px; 
            font-weight: 500;
            border: 1px solid transparent;
        }
        .type-project { background: #E6F7FF; color: #1890FF; border-color: #91D5FF; }
        .type-skill { background: #F6FFED; color: #52C41A; border-color: #B7EB8F; }
        .type-comprehensive { background: #FFF7E6; color: #FA8C16; border-color: #FFD591; }
        .type-assessment { background: #F9F0FF; color: #722ED1; border-color: #D3ADF7; }
        
        /* 难度标签 */
        .difficulty-tag { 
            display: inline-flex;
            align-items: center;
            padding: 2px 8px; 
            border-radius: 4px; 
            font-size: 12px;
            font-weight: 500;
        }
        .difficulty-easy { background: #F6FFED; color: #52C41A; }
        .difficulty-medium { background: #FFF7E6; color: #FA8C16; }
        .difficulty-hard { background: #FFF1F0; color: #FF4D4F; }

        /* 状态标签 */
        .status-tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-published { background: #F6FFED; color: #52C41A; }
        .status-draft { background: #FFF7E6; color: #FA8C16; }

        /* 批量操作栏 */
        .batch-operation-bar {
            background: linear-gradient(135deg, rgba(99,102,241,0.08) 0%, rgba(99,102,241,0.02) 100%);
            border: 1px solid rgba(99,102,241,0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .batch-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .batch-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 14px;
            color: #1e293b;
        }
        .batch-info {
            font-size: 13px;
            color: #64748b;
        }
        .batch-info strong {
            color: #6366f1;
            font-weight: 600;
        }
        .batch-right {
            display: flex;
            gap: 8px;
        }
        .btn-batch {
            padding: 6px 14px;
            border: 1px solid rgba(99,102,241,0.2);
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #64748b;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-batch:hover {
            border-color: #6366f1;
            color: #6366f1;
            background: rgba(99,102,241,0.04);
            transform: translateY(-1px);
        }
        .btn-batch.danger:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239,68,68,0.04);
        }

        /* 页面切换 */
        .page { display: none; }
        .page.active { display: block; }

        /* 筛选区域展开/收起按钮样式 */
        .filter-toggle {
            margin-left: auto;
            padding: 0;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #6366f1;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s ease;
        }

        .filter-toggle:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        .filter-toggle .toggle-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 12px;
            height: 12px;
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .filter-toggle.expanded .toggle-icon {
            transform: rotate(180deg);
        }

        /* 页面样式覆盖 - 统一间距和布局 */
        .content-area {
            padding: 16px !important;
        }

        /* 表格分页容器 - 白色背景 */
        .table-section {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(99,102,241,0.06);
            overflow: hidden;
        }
        .table-section .data-table {
            border-radius: 0;
            box-shadow: none;
            border: none;
        }
        .table-section .pagination {
            border-top: 1px solid #F0F0F0;
            background: transparent;
            padding: 16px 0 0 0;
            margin-top: 16px;
        }

        /* 筛选条件模块间距调整 */
        .filter-section {
            margin-bottom: 16px !important;
            padding: 16px !important;
        }
    </style>
</head>

                <!-- 批量操作栏 -->
                <div class="batch-operation-bar" style="display: none;">

        // ==================== 菜单状态初始化 ====================
        function initMenuState() {
            const activeMenuItem = document.querySelector('.menu-item.active');
            const allMenuTitles = document.querySelectorAll('.menu-title');
            
            allMenuTitles.forEach(title => {
                const items = title.nextElementSibling;
                if (items && items.classList.contains('menu-items')) {
                    title.setAttribute('aria-expanded', 'false');
                    title.classList.add('collapsed');
                    items.setAttribute('hidden', '');
                }
            });
            
            if (activeMenuItem) {
                const menuItems = activeMenuItem.closest('.menu-items');
                if (menuItems) {
                    const menuTitle = menuItems.previousElementSibling;
                    if (menuTitle && menuTitle.classList.contains('menu-title')) {
                        menuTitle.setAttribute('aria-expanded', 'true');
                        menuTitle.classList.remove('collapsed');
                        menuItems.removeAttribute('hidden');
                    }
                }
            }
        }

        // ==================== 筛选功能 ====================
        function filterByCategory(categoryId) {
            const filtered = trainingTableData.filter(item => {
                return item['data-category'].startsWith(categoryId);
            });
            DataTable.setData(filtered.length > 0 ? filtered : trainingTableData);
        }

            let filtered = trainingTableData;
            
            if (values.name) {
                filtered = filtered.filter(item => item.name.includes(values.name));
            }
            if (values.type) {
                filtered = filtered.filter(item => item.typeCode === values.type);
            }
            if (values.difficulty) {
                filtered = filtered.filter(item => item.difficultyCode === values.difficulty);
            }
            
            DataTable.setData(filtered);
        }

        // ==================== 全选功能 ====================
        function toggleSelectAllTraining() {
            const selectAll = document.getElementById('selectAllTraining').checked;
            const checkboxes = document.querySelectorAll('.training-checkbox');
            checkboxes.forEach(cb => cb.checked = selectAll);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = document.querySelectorAll('.training-checkbox:checked').length;
            document.getElementById('selectedCount').textContent = count;
        }

        // ==================== 批量操作 ====================
        function batchExport() {
            alert('批量导出功能开发中...');
        }

        function batchAssign() {
            const count = document.querySelectorAll('.training-checkbox:checked').length;
            if (count === 0) {
                alert('请先选择要分配的实训试卷');
                return;
            }
            alert(`批量分配 ${count} 个实训试卷成功`);
        }

        function batchDelete() {
            const count = document.querySelectorAll('.training-checkbox:checked').length;
            if (count === 0) {
                alert('请先选择要删除的实训试卷');
                return;
            }
            if (confirm(`确定要删除选中的 ${count} 个实训试卷吗？`)) {
                alert('批量删除成功');
            }
        }

        // ==================== 实训试卷操作 ====================
        function viewTraining(id) {
            alert('查看实训试卷 ID: ' + id);
        }

        function editTraining(id) {
            alert('编辑实训试卷 ID: ' + id);
        }

        function deleteTraining(id) {
            if (confirm('确定要删除该实训试卷吗？')) {
                alert('删除成功');
            }
        }

        // ==================== 退出登录 ====================
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = './login.html';
            }
        }
