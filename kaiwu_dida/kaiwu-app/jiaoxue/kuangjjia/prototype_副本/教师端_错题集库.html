<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错题集库 - 教师端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <!-- 引入 Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F5F5;
            display: flex;
            height: 100vh;
            color: #333;
        }

        /* 扁平化主标题样式 */
        .page-title {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid #E0E0E0;
        }

        .user-info { display: flex; align-items: center; gap: 20px; }
        .user-info span { color: #666; font-size: 14px; }

        /* 主内容区 */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .breadcrumb {
            font-size: 14px;
            color: #666;
        }

        .logout-btn {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover {
            color: #1890FF;
        }

        /* 内容区域 - 教务端风格 */
        .content-body {
            padding: 20px;
            background: #F0F2F5;
            min-height: calc(100vh - 60px);
        }

        /* 左右分栏布局 */
        .error-collection-layout {
            display: flex;
            gap: 20px;
            height: calc(100vh - 140px);
        }

        /* 左侧树状图区域 - 视频教材页风格 */
        .tree-sidebar {
            width: 280px;
            background: #fff;
            border-right: 1px solid #E8E8E8;
            display: flex;
            flex-direction: column;
        }
        .tree-header {
            padding: 16px 20px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tree-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .tree-actions {
            display: flex;
            gap: 8px;
        }
        .tree-btn {
            padding: 4px 10px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: #666;
        }
        .tree-btn:hover {
            border-color: #1890FF;
            color: #1890FF;
        }
        .tree-search {
            padding: 12px 16px;
            border-bottom: 1px solid #F0F0F0;
        }
        .tree-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
        }
        .tree-search input:focus {
            outline: none;
            border-color: #1890FF;
        }
        .tree-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }
        
        /* 树状图样式 - 视频教材页风格 */
        .tree-node {
            user-select: none;
        }
        .tree-node-content {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tree-node-content:hover {
            background: #F5F7FA;
        }
        .tree-node-content.active {
            background: #E6F7FF;
            color: #1890FF;
        }
        .tree-toggle {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
            font-size: 12px;
            color: #999;
            transition: transform 0.2s;
        }
        .tree-toggle.expanded {
            transform: rotate(90deg);
        }
        .tree-icon {
            margin-right: 8px;
            font-size: 16px;
        }
        .tree-label {
            font-size: 14px;
            flex: 1;
        }
        .tree-count {
            font-size: 12px;
            color: #999;
            background: #F5F5F5;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .tree-children {
            display: none;
        }
        .tree-children.expanded {
            display: block;
        }
        
        /* 层级缩进 */
        .tree-level-1 .tree-node-content { padding-left: 20px; }
        .tree-level-2 .tree-node-content { padding-left: 44px; }

        /* 右侧内容区域 */
        .content-main {
            flex: 1;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* 统计卡片 - 简洁风格 */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #E8E8E8;
        }
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .stat-icon.blue { background: #E6F7FF; color: #1890FF; }
        .stat-icon.green { background: #F6FFED; color: #52C41A; }
        .stat-icon.orange { background: #FFF7E6; color: #FA8C16; }
        .stat-icon.purple { background: #F9F0FF; color: #722ED1; }
        .stat-content {
            flex: 1;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: #262626;
            line-height: 1;
        }
        .stat-label {
            font-size: 14px;
            color: #8C8C8C;
            margin-top: 4px;
        }

        /* 搜索筛选区 - 简洁风格 */
        .search-filter-card {
            background: #fff;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border: 1px solid #E8E8E8;
        }
        .search-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }
        .search-row:last-child {
            margin-bottom: 0;
        }
        .search-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
        }
        .search-input:focus {
            outline: none;
            border-color: #1890FF;
        }
        .filter-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-label {
            font-size: 14px;
            color: #666;
            white-space: nowrap;
        }
        .filter-select {
            padding: 10px 16px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
            background: #fff;
            cursor: pointer;
            min-width: 140px;
        }
        .filter-select:focus {
            outline: none;
            border-color: #1890FF;
        }
        .btn-search {
            padding: 10px 24px;
            background: #1890FF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-search:hover {
            background: #40A9FF;
        }
        .btn-reset {
            padding: 10px 20px;
            background: #fff;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }
        .btn-reset:hover {
            border-color: #1890FF;
            color: #1890FF;
        }

        /* 分页 - 简洁风格 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-top: 16px;
            padding: 12px 16px;
            background: #fff;
            border-top: 1px solid #F0F0F0;
        }
        .pagination-btn {
            padding: 6px 12px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #666;
            min-width: 32px;
            text-align: center;
        }
        .pagination-btn:hover:not(:disabled) {
            border-color: #1890FF;
            color: #1890FF;
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #F5F5F5;
        }
        .pagination-btn.active {
            background: #1890FF;
            color: #fff;
            border-color: #1890FF;
        }
        .pagination-info {
            font-size: 13px;
            color: #666;
            margin: 0 12px;
        }

        /* 扁平化主标题样式 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: #fff;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #E0E0E0;
            transition: all 0.2s;
        }
        .stat-card:hover {
            border-color: #1976D2;
            background: #FAFAFA;
        }
        .stat-icon {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        .stat-icon.blue { 
            background: #E3F2FD; 
            color: #1976D2; 
        }
        .stat-icon.green { 
            background: #E8F5E9; 
            color: #388E3C; 
        }
        .stat-icon.orange { 
            background: #FFF3E0; 
            color: #F57C00; 
        }
        .stat-info h3 { 
            font-size: 13px; 
            color: #757575; 
            font-weight: normal;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat-info .number { 
            font-size: 32px; 
            font-weight: 700; 
            color: #333;
        }
        
        /* 扁平化搜索区域 */
        .search-area {
            background: #fff;
            padding: 20px 24px;
            margin-bottom: 20px;
            border: 1px solid #E0E0E0;
        }
        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-item label { 
            color: #555; 
            font-size: 13px; 
            font-weight: 500;
        }
        .form-item input, .form-item select {
            padding: 10px 14px;
            border: 1px solid #D0D0D0;
            font-size: 14px;
            min-width: 200px;
            background: #fff;
        }
        .form-item input:focus, .form-item select:focus {
            outline: none;
            border-color: #1976D2;
        }
        .search-btn, .reset-btn {
            padding: 10px 24px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            margin-top: 19px;
        }
        .search-btn { 
            background: #1976D2; 
            color: #fff; 
        }
        .search-btn:hover { 
            background: #1565C0; 
        }
        .reset-btn { 
            background: #fff; 
            color: #555; 
            border: 1px solid #D0D0D0; 
        }
        .reset-btn:hover { 
            border-color: #1976D2; 
            color: #1976D2; 
        }
        
        /* Tab标签 - 简洁风格 */
        .tab-container {
            background: #fff;
            margin-bottom: 20px;
            border: 1px solid #E8E8E8;
            border-radius: 8px;
        }
        .tab-header {
            display: flex;
            border-bottom: 1px solid #E8E8E8;
            background: #FAFAFA;
            border-radius: 8px 8px 0 0;
        }
        .tab-item {
            padding: 12px 24px;
            font-size: 14px;
            color: #666;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }
        .tab-item:hover {
            color: #1890FF;
        }
        .tab-item.active {
            color: #1890FF;
            border-bottom-color: #1890FF;
            font-weight: 500;
            background: #fff;
        }
        .tab-item .tab-badge {
            background: #F0F0F0;
            color: #666;
            padding: 2px 8px;
            font-size: 12px;
            border-radius: 10px;
            margin-left: 4px;
        }
        .tab-item.active .tab-badge {
            background: #1890FF;
            color: #fff;
        }
        .tab-content {
            display: none;
            padding: 20px;
        }
        .tab-content.active {
            display: block;
        }

        /* 表格区域 - 简洁风格 */
        .table-container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
            border: 1px solid #E8E8E8;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
        }
        th {
            background: #FAFAFA;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #E8E8E8;
        }
        td {
            color: #666;
            border-bottom: 1px solid #F0F0F0;
        }
        tbody tr:hover {
            background: #F5F7FA;
        }
        tbody tr:hover td:first-child {
            background: #F5F7FA !important;
        }
        tbody tr:hover td:last-child {
            background: #F5F7FA !important;
        }
        tbody tr:last-child td {
            border-bottom: none;
        }
        
        .question-content {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* 题型标签 - 简洁风格 */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
        }
        .tag-blue { background: #E6F7FF; color: #1890FF; }
        .tag-green { background: #F6FFED; color: #52C41A; }
        .tag-orange { background: #FFF7E6; color: #FA8C16; }
        .tag-purple { background: #F9F0FF; color: #722ED1; }
        .tag-cyan { background: #E6FFFB; color: #13C2C2; }
        
        /* 错误率进度条 - 简洁风格 */
        .error-rate {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .rate-bar {
            width: 60px;
            height: 8px;
            background: #F0F0F0;
            border-radius: 4px;
            overflow: hidden;
        }
        .rate-fill {
            height: 100%;
            border-radius: 4px;
        }
        .rate-fill.high { background: #FF4D4F; }
        .rate-fill.medium { background: #FAAD14; }
        .rate-fill.low { background: #52C41A; }
        .error-rate span {
            font-size: 13px;
            color: #666;
        }
        
        /* 操作按钮 - 简洁风格 */
        .action-btns {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            padding: 6px 12px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            border-radius: 4px;
            background: transparent;
            color: #1890FF;
        }
        .action-btn:hover {
            background: #E6F7FF;
        }
        .action-btn.link {
            background: #fff;
            color: #1890FF;
            border: 1px solid #D9D9D9;
        }
        .action-btn.link:hover {
            background: #E6F7FF;
            border-color: #1890FF;
            color: #1890FF;
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(24,144,255,0.15);
        }
        
        /* 扁平化分页 */
        .pagination {
            padding: 16px 24px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #E0E0E0;
            background: #FAFAFA;
        }
        .page-btn {
            padding: 8px 16px;
            border: 1px solid #D0D0D0;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            color: #555;
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) { 
            border-color: #1976D2; 
            color: #1976D2;
            background: #E3F2FD;
        }
        .page-btn:disabled { 
            opacity: 0.5; 
            cursor: not-allowed;
            background: #EEEEEE;
        }
        .page-btn.active { 
            background: #1976D2; 
            color: #fff; 
            border-color: #1976D2;
        }
        .page-info { 
            color: #757575; 
            font-size: 13px;
            margin-right: 12px;
        }
        .page-info span {
            color: #1976D2;
            font-weight: 600;
        }
    
        /* 菜单图标宽度修复 */
        .menu-item .iconfont {
            width: 20px;
            min-width: 20px;
            text-align: center;
            margin-right: 8px;
            font-size: 16px;
            display: inline-block;
            flex-shrink: 0;
        }

        /* ===== 统计卡片增强样式 ===== */
        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card-enhanced {
            background: #fff;
            border-radius: 20px;
            padding: 28px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(8, 145, 178, 0.08);
            border: 1px solid rgba(8, 145, 178, 0.1);
            transition: all 0.3s ease;
        }
        .stat-card-enhanced:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(8, 145, 178, 0.15);
        }
        .stat-card-enhanced.primary { border-left: 4px solid #0891B2; }
        .stat-card-enhanced.warning { border-left: 4px solid #F97316; }
        .stat-card-enhanced.success { border-left: 4px solid #22C55E; }
        .stat-icon-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }
        .stat-card-enhanced.primary .stat-icon-wrapper {
            background: linear-gradient(135deg, #E0F2FE 0%, #BAE6FD 100%);
            color: #0891B2;
        }
        .stat-card-enhanced.warning .stat-icon-wrapper {
            background: linear-gradient(135deg, #FFEDD5 0%, #FED7AA 100%);
            color: #F97316;
        }
        .stat-card-enhanced.success .stat-icon-wrapper {
            background: linear-gradient(135deg, #DCFCE7 0%, #BBF7D0 100%);
            color: #22C55E;
        }
        .stat-content {
            flex: 1;
            z-index: 1;
        }
        .stat-value {
            font-family: 'Poppins', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #0F172A;
            line-height: 1;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 14px;
            color: #64748B;
            font-weight: 500;
            margin-bottom: 12px;
        }
        .stat-trend {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .stat-trend.up {
            background: rgba(34, 197, 94, 0.1);
            color: #22C55E;
        }
        .stat-trend.down {
            background: rgba(249, 115, 22, 0.1);
            color: #F97316;
        }
        .stat-trend small {
            font-weight: 400;
            opacity: 0.7;
        }
        .stat-decoration {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            opacity: 0.05;
        }
        .stat-card-enhanced.primary .stat-decoration {
            background: #0891B2;
        }
        .stat-card-enhanced.warning .stat-decoration {
            background: #F97316;
        }
        .stat-card-enhanced.success .stat-decoration {
            background: #22C55E;
        }

        /* ===== Tab标签增强样式 ===== */
        .tabs-enhanced {
            margin-bottom: 24px;
        }
        .tab-header-bg {
            display: flex;
            gap: 16px;
            background: linear-gradient(135deg, #F8FAFC 0%, #F1F5F9 100%);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(8, 145, 178, 0.1);
        }
        .tab-item-enhanced {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 28px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            border: 2px solid transparent;
        }
        .tab-item-enhanced:hover {
            background: rgba(8, 145, 178, 0.05);
        }
        .tab-item-enhanced.active {
            background: #fff;
            border-color: #0891B2;
            box-shadow: 0 4px 20px rgba(8, 145, 178, 0.15);
        }
        .tab-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, #E0F2FE 0%, #BAE6FD 100%);
            color: #0891B2;

        // 渲染树状图
        function renderTree() {
            const container = document.getElementById('treeContent');
            container.innerHTML = treeData.map(major => `
                <div class="tree-node">
                    <div class="tree-node-content" onclick="toggleTreeNode(this)">
                        <span class="tree-toggle">▼</span>
                        <span class="tree-icon">📁</span>
                        <span class="tree-label">${major.name}</span>
                    </div>
                    <div class="tree-children expanded">
                        ${major.children.map(course => `
                            <div class="tree-node">
                                <div class="tree-node-content tree-level-1" onclick="selectCourse(this, '${course.name}')">
                                    <span class="tree-icon">📄</span>
                                    <span class="tree-label">${course.name}</span>
                                    <span class="tree-count">${course.count}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        // 树状图展开/收起
        function toggleTreeNode(element) {
            const children = element.nextElementSibling;
            const toggle = element.querySelector('.tree-toggle');
            if (children && children.classList.contains('tree-children')) {
                const isExpanded = children.classList.contains('expanded');
                if (isExpanded) {
                    children.classList.remove('expanded');
                    toggle.classList.remove('expanded');
                    toggle.textContent = '▶';
                } else {
                    children.classList.add('expanded');
                    toggle.classList.add('expanded');
                    toggle.textContent = '▼';
                }
            }
        }

        // 选择课程
        function selectCourse(element, courseName) {
            // 移除所有选中状态
            document.querySelectorAll('.tree-node-content').forEach(node => {
                node.classList.remove('active');
            });
            // 添加选中状态
            element.classList.add('active');
            // 更新筛选条件并搜索
            const activeTab = document.querySelector('.tab-item.active');
            if (activeTab && activeTab.textContent.includes('普通试卷')) {
                document.getElementById('normalCourseName').value = courseName;
                searchNormal();
            } else {
                document.getElementById('trainingCourseName').value = courseName;
                searchTraining();
            }
        }

        // 展开所有
        function expandAll() {
            document.querySelectorAll('.tree-children').forEach(el => el.classList.add('expanded'));
            document.querySelectorAll('.tree-toggle').forEach(el => {
                el.classList.add('expanded');
                el.textContent = '▼';
            });
        }

        // 收起所有
        function collapseAll() {
            document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('expanded'));
            document.querySelectorAll('.tree-toggle').forEach(el => {
                el.classList.remove('expanded');
                el.textContent = '▶';
            });
        }

        // 搜索树状图
        function searchTree() {
            const keyword = document.getElementById('treeSearch').value.toLowerCase();
            const nodes = document.querySelectorAll('.tree-node');
            
            nodes.forEach(node => {
                const label = node.querySelector('.tree-label');
                if (label) {
                    const text = label.textContent.toLowerCase();
                    if (keyword && text.includes(keyword)) {
                        node.style.display = 'block';
                        // 展开父节点
                        const parent = node.closest('.tree-children');
                        if (parent) {
                            parent.classList.add('expanded');
                            const toggle = parent.previousElementSibling?.querySelector('.tree-toggle');
                            if (toggle) {
                                toggle.classList.add('expanded');
                                toggle.textContent = '▼';
                            }
                        }
                    } else if (keyword) {
                        node.style.display = 'none';
                    } else {
                        node.style.display = 'block';
                    }
                }
            });
        }
