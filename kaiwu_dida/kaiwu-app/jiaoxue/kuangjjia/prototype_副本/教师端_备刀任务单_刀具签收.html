<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刀具签收 - 教学实训平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #F0F2F5;
            color: #333;
        }
        
        /* 页面容器 */
        .page-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* 侧边栏 */
        .sidebar {
            width: 220px;
            background: #001529;
            color: #fff;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-header h2 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .sidebar-menu {
            padding: 10px 0;
        }
        
        .menu-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.7);
        }
        
        .menu-item:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        
        .menu-item.active {
            background: #1890FF;
            color: #fff;
        }
        
        .menu-item i {
            width: 20px;
            text-align: center;
        }
        
        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: 220px;
            padding: 20px;
        }
        
        /* 顶部导航 */
        .top-nav {
            background: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
        }
        
        .breadcrumb a {
            color: #1890FF;
            text-decoration: none;
        }
        
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        
        .breadcrumb .separator {
            color: #999;
        }
        
        /* 内容卡片 */
        .content-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
        }
        
        .card-header {
            padding: 20px;
            border-bottom: 1px solid #F0F0F0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .card-body {
            padding: 20px;
        }
        
        /* 信息网格 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .info-label {
            font-size: 13px;
            color: #666;
        }
        
        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        /* 表格样式 */
        .table-container {
            overflow-x: auto;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #F0F0F0;
            font-size: 13px;
        }
        
        .data-table th {
            background: #FAFAFA;
            font-weight: 600;
            color: #333;
        }
        
        .data-table tbody tr:hover {
            background: #F5F5F5;
        }
        
        .data-table tbody tr.selected {
            background: #E6F7FF;
        }
        
        /* 复选框 */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .checkbox-wrapper input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        /* 状态标签 */
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-delivering {
            background: #F6FFED;
            color: #52C41A;
            border: 1px solid #52C41A;
        }
        
        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: #1890FF;
            box-shadow: 0 0 0 2px rgba(24,144,255,0.2);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: #1890FF;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #40A9FF;
        }
        
        .btn-success {
            background: #52C41A;
            color: #fff;
        }
        
        .btn-success:hover {
            background: #73D13D;
        }
        
        .btn-default {
            background: #fff;
            color: #666;
            border: 1px solid #D9D9D9;
        }
        
        .btn-default:hover {
            color: #1890FF;
            border-color: #1890FF;
        }
        
        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 底部操作栏 */
        .action-footer {
            position: fixed;
            bottom: 0;
            left: 220px;
            right: 0;
            background: #fff;
            padding: 15px 20px;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            z-index: 100;
        }
        
        /* 提示信息 */
        .alert-info {
            background: #E6F7FF;
            border: 1px solid #91D5FF;
            color: #1890FF;
            padding: 12px 16px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* 签名区域 */
        .signature-area {
            border: 2px dashed #D9D9D9;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: #FAFAFA;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .signature-area:hover {
            border-color: #1890FF;
            background: #F0F7FF;
        }
        
        .signature-area i {
            font-size: 48px;
            color: #999;
            margin-bottom: 12px;
        }
        
        .signature-area p {
            color: #666;
            font-size: 14px;
        }
        
        .signature-area.has-signature {
            border-style: solid;
            border-color: #52C41A;
            background: #F6FFED;
        }
        
        .signature-area.has-signature i {
            color: #52C41A;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>教学实训平台</h2>
            </div>
            <nav class="sidebar-menu">
                <div class="menu-item">
                    <i class="fas fa-home"></i>
                    <span>首页</span>
                </div>
                <div class="menu-item">
                    <i class="fas fa-clipboard-list"></i>
                    <span>生产工单</span>
                </div>
                <div class="menu-item active">
                    <i class="fas fa-tools"></i>
                    <span>备刀任务单</span>
                </div>
                <div class="menu-item" onclick="window.location.href='./教师端_刀具报废与申领.html'">
                    <i class="fas fa-recycle"></i>
                    <span>刀具报废与申领</span>
                </div>
                <div class="menu-item" onclick="window.location.href='./教师端_刀具库存管理.html'">
                    <i class="fas fa-box"></i>
                    <span>刀具库存</span>
                </div>
                <div class="menu-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>统计分析</span>
                </div>
            </nav>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部导航 -->
            <div class="top-nav">
                <div class="breadcrumb">
                    <a href="#">首页</a>
                    <span class="separator">/</span>
                    <a href="./教师端_备刀任务单.html">备刀任务单</a>
                    <span class="separator">/</span>
                    <span>刀具签收</span>
                </div>
            </div>
            
            <!-- 任务信息 -->
            <div class="content-card">
                <div class="card-header">
                    <div class="card-title">任务信息</div>
                </div>
                <div class="card-body">
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">生产工单号</div>
                            <div class="info-value">WO2025011502</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">需求数量</div>
                            <div class="info-value">4</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">配送数量</div>
                            <div class="info-value">4</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">待签收数量</div>
                            <div class="info-value">4</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">状态</div>
                            <div class="info-value"><span class="status-tag status-delivering">待签收</span></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 待签收刀具列表 -->
            <div class="content-card">
                <div class="card-header">
                    <div class="card-title">待签收刀具列表</div>
                </div>
                <div class="card-body">
                    <div class="alert-info">
                        <i class="fas fa-info-circle"></i>
                        <span>请核对刀具数量和质量，确认无误后进行签收</span>
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 50px;">
                                        <div class="checkbox-wrapper">
                                            <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                                        </div>
                                    </th>
                                    <th>序号</th>
                                    <th>刀具编码</th>
                                    <th>刀具名称</th>
                                    <th>规格型号</th>
                                    <th>单位</th>
                                    <th>配送数量</th>
                                    <th>签收数量</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>
                                        <div class="checkbox-wrapper">
                                            <input type="checkbox" class="item-checkbox" onchange="updateSelectAll()">
                                        </div>
                                    </td>
                                    <td>1</td>
                                    <td>T001-001</td>
                                    <td>外圆车刀</td>
                                    <td>20×20mm</td>
                                    <td>把</td>
                                    <td>1</td>
                                    <td>
                                        <input type="number" class="form-input" style="width: 70px; font-size: 12px; padding: 4px 8px;" value="1" min="0" max="1" onchange="onReceiveQtyChange(this)">
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <div class="checkbox-wrapper">
                                            <input type="checkbox" class="item-checkbox" onchange="updateSelectAll()">
                                        </div>
                                    </td>
                                    <td>2</td>
                                    <td>T001-002</td>
                                    <td>外圆车刀</td>
                                    <td>20×20mm</td>
                                    <td>把</td>
                                    <td>1</td>
                                    <td>
                                        <input type="number" class="form-input" style="width: 70px; font-size: 12px; padding: 4px 8px;" value="1" min="0" max="1" onchange="onReceiveQtyChange(this)">
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <div class="checkbox-wrapper">
                                            <input type="checkbox" class="item-checkbox" onchange="updateSelectAll()">
                                        </div>
                                    </td>
                                    <td>3</td>
                                    <td>T001-003</td>
                                    <td>外圆车刀</td>
                                    <td>20×20mm</td>
                                    <td>把</td>
                                    <td>1</td>
                                    <td>
                                        <input type="number" class="form-input" style="width: 70px; font-size: 12px; padding: 4px 8px;" value="1" min="0" max="1" onchange="onReceiveQtyChange(this)">
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <div class="checkbox-wrapper">
                                            <input type="checkbox" class="item-checkbox" onchange="updateSelectAll()">
                                        </div>
                                    </td>
                                    <td>4</td>
                                    <td>T001-004</td>
                                    <td>外圆车刀</td>
                                    <td>20×20mm</td>
                                    <td>把</td>
                                    <td>1</td>
                                    <td>
                                        <input type="number" class="form-input" style="width: 70px; font-size: 12px; padding: 4px 8px;" value="1" min="0" max="1" onchange="onReceiveQtyChange(this)">
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
            <!-- 签收信息 -->
            <div class="content-card">
                <div class="card-header">
                    <div class="card-title">签收信息</div>
                </div>
                <div class="card-body">
                    <div class="info-grid" style="grid-template-columns: repeat(2, 1fr); margin-bottom: 20px;">
                        <div class="form-group">
                            <label class="form-label">签收时间 <span style="color: #FF4D4F;">*</span></label>
                            <input type="datetime-local" class="form-input" value="2026-03-04T09:00">
                        </div>
                        <div class="form-group">
                            <label class="form-label">签收人 <span style="color: #FF4D4F;">*</span></label>
                            <input type="text" class="form-input" value="张三" placeholder="请输入签收人姓名">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">备注</label>
                        <textarea class="form-textarea" placeholder="请输入备注信息（可选）"></textarea>
                    </div>
                </div>
            </div>
            
            <!-- 底部操作栏 -->
            <div class="action-footer">
                <a href="./教师端_备刀任务单.html" class="btn btn-default">
                    <i class="fas fa-times"></i>
                    取消
                </a>
                <button class="btn btn-success" onclick="submitSignReceive()">
                    <i class="fas fa-check"></i>
                    确认签收
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // 全选/取消全选
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.item-checkbox');
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
            updateRowStyle();
        }
        
        // 更新全选状态
        function updateSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.item-checkbox');
            const checkedBoxes = document.querySelectorAll('.item-checkbox:checked');
            selectAll.checked = checkboxes.length === checkedBoxes.length;
            updateRowStyle();
        }
        
        // 更新行样式
        function updateRowStyle() {
            const rows = document.querySelectorAll('.data-table tbody tr');
            rows.forEach(row => {
                const checkbox = row.querySelector('.item-checkbox');
                if (checkbox && checkbox.checked) {
                    row.classList.add('selected');
                } else {
                    row.classList.remove('selected');
                }
            });
        }
        
        // 签收数量变化
        function onReceiveQtyChange(input) {
            const row = input.closest('tr');
            const checkbox = row.querySelector('.item-checkbox');
            if (input.value && parseInt(input.value) >= 0 && !checkbox.checked) {
                checkbox.checked = true;
                updateSelectAll();
            }
        }
        
        // 显示签名弹窗（模拟）
        function showSignatureModal() {
            const signatureArea = document.getElementById('signatureArea');
            if (confirm('请在弹出的签名板上完成签名')) {
                signatureArea.classList.add('has-signature');
                signatureArea.innerHTML = `
                    <i class="fas fa-check-circle"></i>
                    <p style="color: #52C41A; font-weight: 500;">签名已完成</p>
                `;
            }
        }
        
        // 提交签收
        function submitSignReceive() {
            const checkedBoxes = document.querySelectorAll('.item-checkbox:checked');
            if (checkedBoxes.length === 0) {
                alert('请至少选择一把刀具');
                return;
            }
            
            // 检查签收数量
            let allQtyValid = true;
            let totalDelivered = 0;
            let totalReceived = 0;
            const receiveInfo = [];
            
            checkedBoxes.forEach(checkbox => {
                const row = checkbox.closest('tr');
                const qtyInput = row.querySelector('input[type="number"]');
                const toolCode = row.cells[2].textContent;
                const deliveredQty = 1;
                const receiveQty = parseInt(qtyInput.value) || 0;
                
                if (receiveQty < 0 || receiveQty > deliveredQty) {
                    allQtyValid = false;
                } else {
                    totalDelivered += deliveredQty;
                    totalReceived += receiveQty;
                    receiveInfo.push(`${toolCode} (配送${deliveredQty}把/签收${receiveQty}把)`);
                }
            });
            
            if (!allQtyValid) {
                alert('签收数量不能为负数，且不能超过配送数量');
                return;
            }
            
            const signer = document.querySelector('input[placeholder="请输入签收人姓名"]').value;
            if (!signer) {
                alert('请输入签收人姓名');
                return;
            }
            
            const confirmMsg = `确认签收以下 ${checkedBoxes.length} 把刀具？\n配送总计: ${totalDelivered}把\n签收总计: ${totalReceived}把\n\n${receiveInfo.join('\n')}`;
            if (confirm(confirmMsg)) {
                alert('刀具签收成功！状态已更新为"使用中"。');
                window.location.href = './教师端_备刀任务单.html';
            }
        }
    </script>
</body>
</html>
