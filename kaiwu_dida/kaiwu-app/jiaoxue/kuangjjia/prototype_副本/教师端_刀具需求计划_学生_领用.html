<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刀具领用 - 学生端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .page-header {
            background: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-title::before {
            content: '';
            width: 4px;
            height: 18px;
            background: #1890FF;
            border-radius: 2px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-default { background: #fff; color: #666; border: 1px solid #D9D9D9; }
        .btn-default:hover { border-color: #1890FF; color: #1890FF; }
        .btn-primary { background: #1890FF; color: #fff; }
        .btn-primary:hover { background: #40A9FF; }
        .btn-success { background: #52C41A; color: #fff; }
        .btn-success:hover { background: #73D13D; }
        
        .content-body {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
        }
        
        .info-card {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #E8E8E8;
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #F0F0F0;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }
        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .info-label {
            font-size: 12px;
            color: #999;
        }
        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }
        
        .table-container {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #E8E8E8;
            overflow: hidden;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            background: #FAFAFA;
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #E8E8E8;
        }
        .data-table td {
            padding: 12px 16px;
            font-size: 13px;
            color: #666;
            border-bottom: 1px solid #F0F0F0;
        }
        .data-table tbody tr:hover { background: #F6FFFE; }
        
        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-item label {
            font-size: 13px;
            color: #666;
        }
        .form-item input,
        .form-item select {
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 13px;
        }
        
        .checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        .toolbar-bottom {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #E8E8E8;
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
    

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="page-header">
            <div class="page-title">刀具领用</div>
            <button class="btn btn-default" onclick="window.location.href='./教师端_刀具需求计划_学生.html'">
                <i class="iconfont icon-fanhui"></i> 返回
            </button>
        </div>
        
        <div class="content-body">
            <!-- 工单信息 -->
            <div class="info-card">
                <div class="card-title">工单信息</div>
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">生产工单</span>
                        <span class="info-value">WO2025011501</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">产品名称</span>
                        <span class="info-value">轴类零件A</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">计划产量</span>
                        <span class="info-value">100件</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">需求日期</span>
                        <span class="info-value">2025-01-20 08:00</span>
                    </div>
                </div>
            </div>
            
            <!-- 刀具清单 -->
            <div class="info-card">
                <div class="card-title">刀具领用清单</div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" class="checkbox"></th>
                                <th>工序</th>
                                <th>设备</th>
                                <th>刀具编码</th>
                                <th>刀具名称</th>
                                <th>规格</th>
                                <th>需求数量</th>
                                <th>库存</th>
                                <th>领用数量</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><input type="checkbox" class="checkbox" checked></td>
                                <td>粗车</td>
                                <td>C001</td>
                                <td>T010</td>
                                <td>外圆车刀</td>
                                <td>20×20mm</td>
                                <td>2</td>
                                <td>15</td>
                                <td>
                                    <input type="number" value="2" style="width: 60px; padding: 4px 8px; border: 1px solid #D9D9D9; border-radius: 4px;">
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="checkbox" checked></td>
                                <td>精车</td>
                                <td>C001</td>
                                <td>T012</td>
                                <td>精车刀</td>
                                <td>16×16mm</td>
                                <td>1</td>
                                <td>8</td>
                                <td>
                                    <input type="number" value="1" style="width: 60px; padding: 4px 8px; border: 1px solid #D9D9D9; border-radius: 4px;">
                                </td>
                            </tr>
                            <tr>
                                <td><input type="checkbox" class="checkbox" checked></td>
                                <td>铣槽</td>
                                <td>M001</td>
                                <td>T001</td>
                                <td>立铣刀</td>
                                <td>Φ10mm</td>
                                <td>2</td>
                                <td>50</td>
                                <td>
                                    <input type="number" value="2" style="width: 60px; padding: 4px 8px; border: 1px solid #D9D9D9; border-radius: 4px;">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="toolbar-bottom">
                    <button class="btn btn-default" onclick="window.location.href='./教师端_刀具需求计划_学生.html'">取消</button>
                    <button class="btn btn-success" onclick="alert('领用申请已提交！'); window.location.href='./教师端_刀具需求计划_学生.html'">
                        <i class="iconfont icon-check"></i> 确认领用
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu(element) {
            element.classList.toggle('collapsed');
            const menuItems = element.nextElementSibling;
            if (menuItems) {
                menuItems.classList.toggle('collapsed');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            const activeMenuItem = document.querySelector('.menu-item.active');
            if (activeMenuItem) {
                const menuItems = activeMenuItem.closest('.menu-items');
                if (menuItems) {
                    const menuTitle = menuItems.previousElementSibling;
                    if (menuTitle && menuTitle.classList.contains('menu-title')) {
                        menuTitle.classList.remove('collapsed');
                        menuItems.classList.remove('collapsed');
                    }
                }
            }
        });
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
</html>
