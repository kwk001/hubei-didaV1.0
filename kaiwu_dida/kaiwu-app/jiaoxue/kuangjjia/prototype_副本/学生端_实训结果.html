<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实训结果 - 学生端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
<link rel="stylesheet" href="./common.css?v=2">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #F5F7FA;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        
        
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .logo {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-group {
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .menu-title {
            padding: 12px 24px;
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-items {
            display: flex;
            flex-direction: column;
        }

        .menu-item {
            padding: 12px 24px 12px 48px;
            cursor: pointer;
            color: rgba(255,255,255,0.65);
            font-size: 14px;
            transition: all 0.3s;
        }

        .menu-item:hover, .menu-item.active {
            background: #1890FF;
            color: #fff;
        }

        .header {
            height: 64px;
            background: #fff;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn-text {
            background: none;
            border: none;
            color: #595959;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-text:hover {
            color: #1890ff;
        }

        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #1f1f1f;
            margin: 0;
        }

        .result-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .score-card {
            background: #fff;
            border-radius: 12px;
            padding: 32px;
            display: flex;
            align-items: center;
            gap: 32px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .score-number {
            font-size: 36px;
            font-weight: 700;
        }

        .score-total {
            font-size: 16px;
            opacity: 0.8;
        }

        .score-info {
            flex: 1;
        }

        .result-title {
            font-size: 24px;
            font-weight: 600;
            color: #1f1f1f;
            margin: 0 0 8px 0;
        }

        .result-desc {
            font-size: 14px;
            color: #8c8c8c;
            margin: 0 0 16px 0;
        }

        .result-tags {
            display: flex;
            gap: 8px;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
        }

        .tag-success {
            background: #f6ffed;
            color: #52c41a;
        }

        .tag-info {
            background: #e6f7ff;
            color: #1890ff;
        }

        .evaluation-section {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .section-header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f1f1f;
            margin: 0;
        }

        .evaluation-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .evaluation-item {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .evaluation-name {
            width: 120px;
            font-size: 14px;
            color: #595959;
            flex-shrink: 0;
        }

        .evaluation-score {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .score-bar {
            flex: 1;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            background: #1890ff;
            border-radius: 4px;
            transition: width 0.3s;
        }

        .score-value {
            width: 60px;
            text-align: right;
            font-size: 14px;
            font-weight: 600;
            color: #1890ff;
        }

        .comment-section {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .comment-card {
            padding: 20px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .teacher-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .teacher-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1890ff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .teacher-name {
            font-size: 14px;
            font-weight: 600;
            color: #1f1f1f;
        }

        .comment-time {
            font-size: 12px;
            color: #8c8c8c;
        }

        .comment-content {
            font-size: 14px;
            color: #595959;
            line-height: 1.6;
            margin: 0;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #1890ff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        .btn-default {
            background: #fff;
            color: #595959;
            border: 1px solid #d9d9d9;
        }

        .btn-default:hover {
            border-color: #1890ff;
            color: #1890ff;
        }
    </style>
</head>
<body>
    <!-- 侧边栏导航 -->
<div class="main-content">
        <div class="header">
            <div>首页 / 我的学习 / 实训结果</div>
            <div><i class="iconfont icon-xueshengguanli"></i> 学生：李明 | <button onclick="logout()" style="padding: 6px 16px; background: #FF4D4F; color: #fff; border: none; border-radius: 4px; cursor: pointer;">退出</button></div>
        </div>

        <div class="content-body">
            <div class="page-header">
                <div class="header-left">
                    <button class="btn btn-text" onclick="goBack()">
                        <i class="iconfont icon-fanhui"></i> 返回课程
                    </button>
                    <h1 class="page-title" id="trainingTitle">实训结果</h1>
                </div>
            </div>

            <div class="result-container">
                <div class="score-card">
                    <div class="score-circle">
                        <span class="score-number">90</span>
                        <span class="score-total">/100</span>
                    </div>
                    <div class="score-info">
                        <h2 class="result-title">实训成绩</h2>
                        <p class="result-desc">恭喜你完成了实训任务！</p>
                        <div class="result-tags">
                            <span class="tag tag-success">优秀</span>
                            <span class="tag tag-info">排名第2</span>
                        </div>
                    </div>
                </div>

                <div class="evaluation-section">
                    <div class="section-header">
                        <h3 class="section-title">评分详情</h3>
                    </div>
                    <div class="evaluation-list">
                        <div class="evaluation-item">
                            <div class="evaluation-name">三视图正确性</div>
                            <div class="evaluation-score">
                                <div class="score-bar">
                                    <div class="score-fill" style="width: 95%"></div>
                                </div>
                                <span class="score-value">28/30</span>
                            </div>
                        </div>
                        <div class="evaluation-item">
                            <div class="evaluation-name">投影关系</div>
                            <div class="evaluation-score">
                                <div class="score-bar">
                                    <div class="score-fill" style="width: 100%"></div>
                                </div>
                                <span class="score-value">25/25</span>
                            </div>
                        </div>
                        <div class="evaluation-item">
                            <div class="evaluation-name">线型规范</div>
                            <div class="evaluation-score">
                                <div class="score-bar">
                                    <div class="score-fill" style="width: 90%"></div>
                                </div>
                                <span class="score-value">18/20</span>
                            </div>
                        </div>
                        <div class="evaluation-item">
                            <div class="evaluation-name">尺寸标注</div>
                            <div class="evaluation-score">
                                <div class="score-bar">
                                    <div class="score-fill" style="width: 85%"></div>
                                </div>
                                <span class="score-value">17/20</span>
                            </div>
                        </div>
                        <div class="evaluation-item">
                            <div class="evaluation-name">图纸整洁度</div>
                            <div class="evaluation-score">
                                <div class="score-bar">
                                    <div class="score-fill" style="width: 100%"></div>
                                </div>
                                <span class="score-value">5/5</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="comment-section">
                    <div class="section-header">
                        <h3 class="section-title">教师评语</h3>
                    </div>
                    <div class="comment-card">
                        <div class="comment-header">
                            <div class="teacher-info">
                                <div class="teacher-avatar">👨‍🏫</div>
                                <div class="teacher-name">王老师</div>
                            </div>
                            <span class="comment-time">2024-01-15 14:30</span>
                        </div>
                        <p class="comment-content">
                            整体完成度很高，三视图的投影关系处理得很好。建议在尺寸标注时注意标注的规范性，部分尺寸的标注位置可以优化。继续保持！
                        </p>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-default" onclick="goBack()">
                        <i class="iconfont icon-fanhui"></i> 返回课程
                    </button>
                    <button class="btn btn-primary" onclick="viewWork()">
                        <i class="iconfont icon-chakan"></i> 查看作品
                    </button>
                    <button class="btn btn-default" onclick="retryTraining()">
                        <i class="iconfont icon-zhongkao"></i> 重新实训
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        window.onload = function() {
            const trainingName = getUrlParam('trainingName');
            if (trainingName) {
                document.getElementById('trainingTitle').textContent = trainingName + ' - 结果';
            }
        };

        function goBack() {
            window.location.href = './学生端_课程详情.html';
        }

        function logout() {
            localStorage.removeItem('iBodaoUser');
            window.location.href = './教学实训平台_登录.html';
        }

        function viewWork() {
            alert('查看实训作品');
        }

        function retryTraining() {
            if (confirm('确定要重新进行实训吗？')) {
                window.location.href = './学生端_实训开始.html';
            }</script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-student.js"></script>
</body>
</html>
