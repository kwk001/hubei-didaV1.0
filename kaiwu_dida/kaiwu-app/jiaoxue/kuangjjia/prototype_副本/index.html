<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学实训平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            transition: all 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="max-w-4xl w-full">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-white mb-4">
                <i class="fas fa-graduation-cap mr-3"></i>教学实训平台
            </h1>
            <p class="text-white/80 text-lg">请选择要进入的系统</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 教师端 -->
            <a href="教学实训平台_教师端.html" class="card bg-white rounded-2xl p-8 text-center cursor-pointer">
                <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-chalkboard-teacher text-3xl text-blue-600"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">教师端</h2>
                <p class="text-gray-500 text-sm">实训任务、试卷管理、学生管理</p>
                <div class="mt-4 text-blue-600">
                    <span class="text-sm">进入系统 <i class="fas fa-arrow-right ml-1"></i></span>
                </div>
            </a>

            <!-- 学生端 -->
            <a href="教学实训平台_学生端.html" class="card bg-white rounded-2xl p-8 text-center cursor-pointer">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-user-graduate text-3xl text-green-600"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">学生端</h2>
                <p class="text-gray-500 text-sm">我的课程、考试、实训任务</p>
                <div class="mt-4 text-green-600">
                    <span class="text-sm">进入系统 <i class="fas fa-arrow-right ml-1"></i></span>
                </div>
            </a>

            <!-- 教务管理端 -->
            <a href="教学实训平台_教务管理端.html" class="card bg-white rounded-2xl p-8 text-center cursor-pointer">
                <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-cog text-3xl text-purple-600"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800 mb-2">教务管理端</h2>
                <p class="text-gray-500 text-sm">课程管理、班级管理、教师管理</p>
                <div class="mt-4 text-purple-600">
                    <span class="text-sm">进入系统 <i class="fas fa-arrow-right ml-1"></i></span>
                </div>
            </a>
        </div>

        <div class="text-center mt-12">
            <a href="教学实训平台_登录.html" class="inline-flex items-center px-6 py-3 bg-white/20 hover:bg-white/30 text-white rounded-full transition-all">
                <i class="fas fa-sign-in-alt mr-2"></i>
                统一登录入口
            </a>
        </div>

        <div class="text-center mt-8 text-white/60 text-sm">
            <p>© 2025 教学实训平台 - 原型系统</p>
        </div>
    </div>
</body>
</html>
