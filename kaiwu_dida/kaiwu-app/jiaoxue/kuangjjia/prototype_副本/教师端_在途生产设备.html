<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在途生产设备 - 教师端</title>
    <link rel="stylesheet" href="https://at.alicdn.com/t/c/font_5124072_s39q5gmh59a.css">
    <link rel="stylesheet" href="./common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: #F5F7FA; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }

        /* 主内容区 */

        .content {
            flex: 1;
            overflow: auto;
            padding: 20px;
        }
        
        /* 筛选栏 */
        .filter-bar {
            background: #fff;
            padding: 16px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .filter-row {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-item label {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
        }
        .filter-item input,
        .filter-item select {
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 13px;
            min-width: 140px;
        }
        .filter-btns {
            display: flex;
            gap: 8px;
            margin-left: auto;
        }
        
        /* 按钮样式 */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: #1890FF;
            color: #fff;
        }
        .btn-primary:hover { background: #40A9FF; }
        .btn-success {
            background: #52C41A;
            color: #fff;
        }
        .btn-success:hover { background: #73D13D; }
        .btn-warning {
            background: #FA8C16;
            color: #fff;
        }
        .btn-warning:hover { background: #FFA940; }
        .btn-danger {
            background: #FF4D4F;
            color: #fff;
        }
        .btn-danger:hover { background: #FF7875; }
        .btn-default {
            background: #fff;
            color: #666;
            border: 1px solid #D9D9D9;
        }
        .btn-default:hover {
            border-color: #1890FF;
            color: #1890FF;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 工具栏 */
        .toolbar {
            background: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .toolbar-left {
            display: flex;
            gap: 8px;
        }
        .toolbar-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        /* 表格 */
        .table-container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            background: #FAFAFA;
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #E8E8E8;
            white-space: nowrap;
        }
        .data-table td {
            padding: 12px 16px;
            font-size: 13px;
            color: #666;
            border-bottom: 1px solid #F0F0F0;
        }
        .data-table tbody tr:hover {
            background: #F6FFFE;
        }
        .data-table tbody tr.selected {
            background: #E6F7FF;
        }
        
        /* 复选框 */
        .checkbox {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        
        /* 状态标签 */
        .status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-idle {
            background: #F0F5FF;
            color: #1890FF;
            border: 1px solid #ADC6FF;
        }
        .status-running {
            background: #F6FFED;
            color: #52C41A;
            border: 1px solid #B7EB8F;
        }
        .status-fault {
            background: #FFF2F0;
            color: #FF4D4F;
            border: 1px solid #FFA39E;
        }
        .status-offline {
            background: #F5F5F5;
            color: #999;
            border: 1px solid #D9D9D9;
        }
        
        /* 工单状态标签 */
        .order-status-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .order-status-pending {
            background: #FFF7E6;
            color: #FA8C16;
            border: 1px solid #FFD591;
        }
        .order-status-processing {
            background: #F6FFED;
            color: #52C41A;
            border: 1px solid #B7EB8F;
        }
        .order-status-completed {
            background: #F9F0FF;
            color: #722ED1;
            border: 1px solid #D3ADF7;
        }
        
        /* 设备状态 */
        .device-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .device-status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .device-idle::before { background: #1890FF; }
        .device-running::before { background: #52C41A; }
        .device-fault::before { background: #FF4D4F; }
        .device-offline::before { background: #999; }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 16px 20px;
            gap: 8px;
        }
        .pagination-btn {
            padding: 6px 12px;
            border: 1px solid #D9D9D9;
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .pagination-btn:hover {
            border-color: #1890FF;
            color: #1890FF;
        }
        .pagination-btn.active {
            background: #1890FF;
            color: #fff;
            border-color: #1890FF;
        }
        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #fff;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow: auto;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #E8E8E8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        .modal-close {
            font-size: 20px;
            color: #999;
            cursor: pointer;
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: #666;
        }
        .modal-body {
            padding: 20px;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid #E8E8E8;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        
        /* 表单 */
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-item {
            flex: 1;
        }
        .form-item label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }
        .form-item input,
        .form-item select,
        .form-item textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #D9D9D9;
            border-radius: 4px;
            font-size: 13px;
        }
        .form-item input:focus,
        .form-item select:focus,
        .form-item textarea:focus {
            border-color: #1890FF;
            outline: none;
        }
        
        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #fff;
            padding: 16px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 13px;
            color: #666;
        }
        .stat-card.primary .stat-value { color: #1890FF; }
        .stat-card.success .stat-value { color: #52C41A; }
        .stat-card.warning .stat-value { color: #FA8C16; }
        .stat-card.danger .stat-value { color: #FF4D4F; }
        
        /* 菜单图标宽度修复 */
        .menu-item .iconfont {
            width: 20px;
            min-width: 20px;
            text-align: center;
            margin-right: 8px;
            font-size: 16px;
            display: inline-block;
            flex-shrink: 0;
        }
        
        /* 标签页样式 */
        .tab-container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .tab-header {
            display: flex;
            border-bottom: 1px solid #E8E8E8;
        }
        .tab-item {
            padding: 12px 24px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }
        .tab-item:hover {
            color: #1890FF;
        }
        .tab-item.active {
            color: #1890FF;
            border-bottom-color: #1890FF;
            background: #F6FFED;
        }
        .tab-content {
            padding: 20px;
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .filter-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .filter-btns {
                margin-left: 0;
                margin-top: 8px;
            }
            .form-row {
                flex-direction: column;
            }
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .tab-item {
                padding: 10px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航容器 - 由通用加载器动态加载 -->
    <div id="nav-container"></div>
<div class="main-content">
        <div class="header">
            <div>首页 / 生产管理 / 在途生产设备</div>
            <div>👤 教师：张老师 | <button class="btn btn-danger" onclick="logout()">退出</button></div>
        </div>
        
        <div class="content">
            <!-- 统计卡片 -->
            <div class="stats-row">
                <div class="stat-card primary">
                    <div class="stat-value" id="totalDevices">0</div>
                    <div class="stat-label">设备总数</div>
                </div>
                <div class="stat-card success">
                    <div class="stat-value" id="runningDevices">0</div>
                    <div class="stat-label">运行中</div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-value" id="faultDevices">0</div>
                    <div class="stat-label">故障中</div>
                </div>
                <div class="stat-card danger">
                    <div class="stat-value" id="offlineDevices">0</div>
                    <div class="stat-label">离线</div>
                </div>
            </div>
            
            <!-- 标签页 -->
            <div class="tab-container">
                <div class="tab-header">
                    <div class="tab-item active" onclick="switchTab('all')">所有设备</div>
                    <div class="tab-item" onclick="switchTab('fault')">故障设备</div>
                </div>
                
                <!-- 所有设备标签页 -->
                <div class="tab-content" id="all-tab">
                    <!-- 筛选栏 -->
                    <div class="filter-bar">
                        <div class="filter-row">
                            <div class="filter-item">
                                <label>设备名称</label>
                                <input type="text" id="filterDeviceName" placeholder="请输入设备名称">
                            </div>
                            <div class="filter-item">
                                <label>设备状态</label>
                                <select id="filterDeviceStatus">
                                    <option value="">全部</option>
                                    <option value="idle">待机</option>
                                    <option value="running">运行中</option>
                                    <option value="fault">故障中</option>
                                    <option value="offline">离线</option>
                                </select>
                            </div>
                            <div class="filter-item">
                                <label>所属区域</label>
                                <select id="filterArea">
                                    <option value="">全部</option>
                                    <option value="A区">A区</option>
                                    <option value="B区">B区</option>
                                    <option value="C区">C区</option>
                                </select>
                            </div>
                            <div class="filter-item">
                                <label>所属工序</label>
                                <select id="filterProcess">
                                    <option value="">全部</option>
                                    <option value="车削">车削</option>
                                    <option value="铣削">铣削</option>
                                    <option value="磨削">磨削</option>
                                    <option value="装配">装配</option>
                                </select>
                            </div>
                            <div class="filter-item">
                                <label>工单状态</label>
                                <select id="filterOrderStatus">
                                    <option value="">全部</option>
                                    <option value="pending">待生产</option>
                                    <option value="processing">生产中</option>
                                    <option value="completed">已完成</option>
                                </select>
                            </div>
                            <div class="filter-btns">
                                <button class="btn btn-primary" onclick="searchDevices">🔍 查询</button>
                                <button class="btn btn-default" onclick="resetFilter">重置</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 工具栏 -->
                    <div class="toolbar">
                        <div class="toolbar-left">
                            <button class="btn btn-primary" onclick="refreshDevices">🔄 刷新设备状态</button>
                        </div>
                        <div class="toolbar-right">
                            <span style="font-size: 13px; color: #666;">共 <span id="totalRecords">0</span> 条记录</span>
                        </div>
                    </div>
                    
                    <!-- 数据表格 -->
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" class="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                                    <th>设备名称</th>
                                    <th>规格型号</th>
                                    <th>设备状态</th>
                                    <th>所属区域</th>
                                    <th>所属工序</th>
                                    <th>生产工单</th>
                                    <th>工单状态</th>
                                    <th>产品名称</th>
                                    <th>规格型号</th>
                                    <th>学生</th>
                                    <th style="width: 120px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="deviceTableBody">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                        
                        <!-- 分页 -->
                        <div class="pagination">
                            <button class="pagination-btn" onclick="changePage(-1)" id="prevPage">上一页</button>
                            <div id="pageNumbers"></div>
                            <button class="pagination-btn" onclick="changePage(1)" id="nextPage">下一页</button>
                        </div>
                    </div>
                </div>
                
                <!-- 故障设备标签页 -->
                <div class="tab-content" id="fault-tab" style="display: none;">
                    <!-- 筛选栏 -->
                    <div class="filter-bar">
                        <div class="filter-row">
                            <div class="filter-item">
                                <label>设备名称</label>
                                <input type="text" id="filterFaultDeviceName" placeholder="请输入设备名称">
                            </div>
                            <div class="filter-item">
                                <label>所属区域</label>
                                <select id="filterFaultArea">
                                    <option value="">全部</option>
                                    <option value="A区">A区</option>
                                    <option value="B区">B区</option>
                                    <option value="C区">C区</option>
                                </select>
                            </div>
                            <div class="filter-btns">
                                <button class="btn btn-primary" onclick="searchFaultDevices">🔍 查询</button>
                                <button class="btn btn-default" onclick="resetFaultFilter">重置</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 工具栏 -->
                    <div class="toolbar">
                        <div class="toolbar-left">
                            <button class="btn btn-primary" onclick="refreshDevices">🔄 刷新设备状态</button>
                        </div>
                        <div class="toolbar-right">
                            <span style="font-size: 13px; color: #666;">共 <span id="faultRecords">0</span> 条记录</span>
                        </div>
                    </div>
                    
                    <!-- 数据表格 -->
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" class="checkbox" id="selectAllFault" onchange="toggleSelectAllFault()"></th>
                                    <th>设备名称</th>
                                    <th>规格型号</th>
                                    <th>设备状态</th>
                                    <th>所属区域</th>
                                    <th style="width: 120px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="faultDeviceTableBody">
                                <!-- 动态生成 -->
                            </tbody>
                        </table>
                        
                        <!-- 分页 -->
                        <div class="pagination">
                            <button class="pagination-btn" onclick="changeFaultPage(-1)" id="prevFaultPage">上一页</button>
                            <div id="faultPageNumbers"></div>
                            <button class="pagination-btn" onclick="changeFaultPage(1)" id="nextFaultPage">下一页</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 更换设备弹窗 -->
    <div class="modal" id="changeDeviceModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">🔄 更换设备</span>
                <button class="modal-close" onclick="closeModal('changeDeviceModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-row">
                    <div class="form-item">
                        <label>当前设备</label>
                        <input type="text" id="currentDevice" readonly>
                    </div>
                    <div class="form-item">
                        <label>当前状态</label>
                        <input type="text" id="currentStatus" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-item">
                        <label>生产工单</label>
                        <input type="text" id="currentOrder" readonly>
                    </div>
                    <div class="form-item">
                        <label>产品名称</label>
                        <input type="text" id="currentProduct" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-item">
                        <label>可更换设备 <span style="color: #FF4D4F;">*</span></label>
                        <select id="newDevice" required>
                            <option value="">请选择空闲设备</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-item">
                        <label>更换原因</label>
                        <textarea id="changeReason" rows="3" placeholder="请输入更换设备的原因"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-default" onclick="closeModal('changeDeviceModal')">取消</button>
                <button class="btn btn-primary" onclick="confirmChangeDevice">确认更换</button>
            </div>
        </div>
    </div>

                productName: '',
                productSpec: '',
                student: ''
            }
        ];
        
        // 页面加载时初始化
        window.onload = function() {
            initPage();
        };
        
        // 初始化页面
        function initPage() {
            // 加载设备数据
            loadDevices();
            
            // 绑定事件
            bindEvents();
        }
        
        // 绑定事件
        function bindEvents() {
            // 筛选表单事件
            document.getElementById('filterDeviceName').addEventListener('keyup', function(e) {
                if (e.key === 'Enter') {
                    searchDevices();
                }
            });
        }
        
        // 加载设备数据
        function loadDevices() {
            // 模拟从后端获取数据
            deviceData = [...mockDevices];
            
            // 更新统计数据
            updateStats();
            
            // 渲染表格
            renderDeviceTable();
            
            // 渲染故障设备表格
            renderFaultDeviceTable();
        }
        
        // 更新统计数据
        function updateStats() {
            const total = deviceData.length;
            const running = deviceData.filter(d => d.status === 'running').length;
            const fault = deviceData.filter(d => d.status === 'fault').length;
            const offline = deviceData.filter(d => d.status === 'offline').length;
            
            document.getElementById('totalDevices').textContent = total;
            document.getElementById('runningDevices').textContent = running;
            document.getElementById('faultDevices').textContent = fault;
            document.getElementById('offlineDevices').textContent = offline;
            document.getElementById('totalRecords').textContent = total;
        }
        
        // 渲染设备表格
        function renderDeviceTable() {
            const tbody = document.getElementById('deviceTableBody');
            tbody.innerHTML = '';
            
            // 筛选数据
            const filteredData = filterDevices();
            
            // 分页处理
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageData = filteredData.slice(startIndex, endIndex);
            
            // 渲染数据
            pageData.forEach(device => {
                const row = document.createElement('tr');
                
                // 复选框
                const checkboxCell = document.createElement('td');
                checkboxCell.innerHTML = `<input type="checkbox" class="checkbox" onchange="toggleSelect(this, ${device.id})">`;
                row.appendChild(checkboxCell);
                
                // 设备名称
                const nameCell = document.createElement('td');
                nameCell.textContent = device.name;
                row.appendChild(nameCell);
                
                // 规格型号
                const specCell = document.createElement('td');
                specCell.textContent = device.spec;
                row.appendChild(specCell);
                
                // 设备状态
                const statusCell = document.createElement('td');
                const statusMap = {
                    idle: { text: '待机', class: 'status-idle' },
                    running: { text: '运行中', class: 'status-running' },
                    fault: { text: '故障中', class: 'status-fault' },
                    offline: { text: '离线', class: 'status-offline' }
                };
                const statusInfo = statusMap[device.status] || { text: '未知', class: 'status-offline' };
                statusCell.innerHTML = `<span class="status-tag ${statusInfo.class}">${statusInfo.text}</span>`;
                row.appendChild(statusCell);
                
                // 所属区域
                const areaCell = document.createElement('td');
                areaCell.textContent = device.area;
                row.appendChild(areaCell);
                
                // 所属工序
                const processCell = document.createElement('td');
                processCell.textContent = device.process;
                row.appendChild(processCell);
                
                // 生产工单
                const orderCell = document.createElement('td');
                orderCell.textContent = device.orderNo || '-';
                row.appendChild(orderCell);
                
                // 工单状态
                const orderStatusCell = document.createElement('td');
                if (device.orderStatus) {
                    const orderStatusMap = {
                        pending: { text: '待生产', class: 'order-status-pending' },
                        processing: { text: '生产中', class: 'order-status-processing' },
                        completed: { text: '已完成', class: 'order-status-completed' }
                    };
                    const orderStatusInfo = orderStatusMap[device.orderStatus] || { text: '未知', class: 'order-status-pending' };
                    orderStatusCell.innerHTML = `<span class="order-status-tag ${orderStatusInfo.class}">${orderStatusInfo.text}</span>`;
                } else {
                    orderStatusCell.textContent = '-';
                }
                row.appendChild(orderStatusCell);
                
                // 产品名称
                const productCell = document.createElement('td');
                productCell.textContent = device.productName || '-';
                row.appendChild(productCell);
                
                // 规格型号
                const productSpecCell = document.createElement('td');
                productSpecCell.textContent = device.productSpec || '-';
                row.appendChild(productSpecCell);
                
                // 学生
                const studentCell = document.createElement('td');
                studentCell.textContent = device.student || '-';
                row.appendChild(studentCell);
                
                // 操作
                const actionCell = document.createElement('td');
                if (device.status === 'fault' && device.orderNo) {
                    actionCell.innerHTML = `<button class="btn btn-primary" onclick="showChangeDeviceModal(${device.id})"><i class="iconfont icon-genggai"></i>更换设备</button>`;
                } else {
                    actionCell.innerHTML = '<span style="color: #999; font-size: 12px;">无操作</span>';
                }
                row.appendChild(actionCell);
                
                tbody.appendChild(row);
            });
            
            // 渲染分页
            renderPagination(filteredData.length);
        }
        
        // 筛选设备
        function filterDevices() {
            const deviceName = document.getElementById('filterDeviceName').value.toLowerCase();
            const deviceStatus = document.getElementById('filterDeviceStatus').value;
            const area = document.getElementById('filterArea').value;
            const process = document.getElementById('filterProcess').value;
            
            return deviceData.filter(device => {
                return (
                    (deviceName === '' || device.name.toLowerCase().includes(deviceName)) &&
                    (deviceStatus === '' || device.status === deviceStatus) &&
                    (area === '' || device.area === area) &&
                    (process === '' || device.process === process)
                );
            });
        }
        
        // 渲染分页
        function renderPagination(total) {
            const pageNumbers = document.getElementById('pageNumbers');
            pageNumbers.innerHTML = '';
            
            const totalPages = Math.ceil(total / pageSize);
            
            // 显示页码
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderDeviceTable();
                };
                pageNumbers.appendChild(pageBtn);
            }
            
            // 禁用上一页/下一页按钮
            document.getElementById('prevPage').disabled = currentPage === 1;
            document.getElementById('nextPage').disabled = currentPage === totalPages;
        }
        
        // 切换页面
        function changePage(direction) {
            const filteredData = filterDevices();
            const totalPages = Math.ceil(filteredData.length / pageSize);
            
            if (direction === -1 && currentPage > 1) {
                currentPage--;
            } else if (direction === 1 && currentPage < totalPages) {
                currentPage++;
            }
            
            renderDeviceTable();
        }
        
        // 搜索设备
        function searchDevices() {
            currentPage = 1;
            renderDeviceTable();
        }
        
        // 重置筛选
        function resetFilter() {
            document.getElementById('filterDeviceName').value = '';
            document.getElementById('filterDeviceStatus').value = '';
            document.getElementById('filterArea').value = '';
            document.getElementById('filterProcess').value = '';
            
            currentPage = 1;
            renderDeviceTable();
        }
        
        // 刷新设备状态
        function refreshDevices() {
            // 模拟刷新数据
            loadDevices();
            
            // 显示刷新成功提示
            alert('设备状态已刷新');
        }
        
        // 显示更换设备弹窗
        function showChangeDeviceModal(deviceId) {
            selectedDeviceId = deviceId;
            const device = deviceData.find(d => d.id === deviceId);
            
            if (!device) return;
            
            // 填充表单数据
            document.getElementById('currentDevice').value = device.name;
            
            const statusMap = {
                idle: '待机',
                running: '运行中',
                fault: '故障中',
                offline: '离线'
            };
            document.getElementById('currentStatus').value = statusMap[device.status] || '未知';
            document.getElementById('currentOrder').value = device.orderNo;
            document.getElementById('currentProduct').value = device.productName;
            
            // 加载可用设备
            loadAvailableDevices(device.process);
            
            // 显示弹窗
            document.getElementById('changeDeviceModal').classList.add('active');
        }
        
        // 加载可用设备
        function loadAvailableDevices(process) {
            const select = document.getElementById('newDevice');
            select.innerHTML = '<option value="">请选择空闲设备</option>';
            
            // 筛选同工序的空闲设备
            const availableDevices = deviceData.filter(d => d.process === process && d.status === 'idle');
            
            availableDevices.forEach(device => {
                const option = document.createElement('option');
                option.value = device.id;
                option.textContent = `${device.name} (${device.spec})`;
                select.appendChild(option);
            });
        }
        
        // 确认更换设备
        function confirmChangeDevice() {
            const newDeviceId = document.getElementById('newDevice').value;
            const reason = document.getElementById('changeReason').value;
            
            if (!newDeviceId) {
                alert('请选择要更换的设备');
                return;
            }
            
            // 模拟更换设备
            const oldDevice = deviceData.find(d => d.id === selectedDeviceId);
            const newDevice = deviceData.find(d => d.id === parseInt(newDeviceId));
            
            if (oldDevice && newDevice) {
                // 转移生产数据
                newDevice.orderNo = oldDevice.orderNo;
                newDevice.orderStatus = oldDevice.orderStatus;
                newDevice.productName = oldDevice.productName;
                newDevice.productSpec = oldDevice.productSpec;
                newDevice.student = oldDevice.student;
                newDevice.status = 'running';
                
                // 清空旧设备数据
                oldDevice.orderNo = '';
                oldDevice.orderStatus = '';
                oldDevice.productName = '';
                oldDevice.productSpec = '';
                oldDevice.student = '';
                oldDevice.status = 'fault';
                
                // 重新渲染表格
                loadDevices();
                
                // 关闭弹窗
                closeModal('changeDeviceModal');
                
                // 显示成功提示
                alert(`设备更换成功！\n旧设备：${oldDevice.name}\n新设备：${newDevice.name}`);
            }
        }
        
        // 关闭弹窗
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            
            // 重置表单
            if (modalId === 'changeDeviceModal') {
                document.getElementById('newDevice').value = '';
                document.getElementById('changeReason').value = '';
            }
        }
        
        // 切换全选
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.data-table tbody input[type="checkbox"]');
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
        }
        
        // 切换单选
        function toggleSelect(checkbox, deviceId) {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.data-table tbody input[type="checkbox"]');
            const checkedBoxes = document.querySelectorAll('.data-table tbody input[type="checkbox"]:checked');
            
            selectAll.checked = checkboxes.length === checkedBoxes.length;
        }
        
        // 标签页切换
        function switchTab(tabName) {
            // 切换标签页样式
            const tabItems = document.querySelectorAll('.tab-item');
            tabItems.forEach(item => {
                if (item.textContent.trim() === (tabName === 'all' ? '所有设备' : '故障设备')) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
            
            // 切换内容
            const tabs = ['all', 'fault'];
            tabs.forEach(tab => {
                document.getElementById(`${tab}-tab`).style.display = tab === tabName ? 'block' : 'none';
            });
        }
        
        // 渲染故障设备表格
        function renderFaultDeviceTable() {
            const tbody = document.getElementById('faultDeviceTableBody');
            tbody.innerHTML = '';
            
            // 筛选故障设备
            const faultDevices = filterFaultDevices();
            
            // 分页处理
            const startIndex = (currentFaultPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageData = faultDevices.slice(startIndex, endIndex);
            
            // 渲染数据
            pageData.forEach(device => {
                const row = document.createElement('tr');
                
                // 复选框
                const checkboxCell = document.createElement('td');
                checkboxCell.innerHTML = `<input type="checkbox" class="checkbox" onchange="toggleSelect(this, ${device.id})">`;
                row.appendChild(checkboxCell);
                
                // 设备名称
                const nameCell = document.createElement('td');
                nameCell.textContent = device.name;
                row.appendChild(nameCell);
                
                // 规格型号
                const specCell = document.createElement('td');
                specCell.textContent = device.spec;
                row.appendChild(specCell);
                
                // 设备状态
                const statusCell = document.createElement('td');
                statusCell.innerHTML = `<span class="status-tag status-fault">故障中</span>`;
                row.appendChild(statusCell);
                
                // 所属区域
                const areaCell = document.createElement('td');
                areaCell.textContent = device.area;
                row.appendChild(areaCell);
                
                // 操作
                const actionCell = document.createElement('td');
                if (device.orderNo) {
                    actionCell.innerHTML = `<button class="btn btn-primary" onclick="showChangeDeviceModal(${device.id})"><i class="iconfont icon-genggai"></i>更换设备</button>`;
                } else {
                    actionCell.innerHTML = '<span style="color: #999; font-size: 12px;">无操作</span>';
                }
                row.appendChild(actionCell);
                
                tbody.appendChild(row);
            });
            
            // 更新记录数
            document.getElementById('faultRecords').textContent = faultDevices.length;
            
            // 渲染分页
            renderFaultPagination(faultDevices.length);
        }
        
        // 筛选故障设备
        function filterFaultDevices() {
            const deviceName = document.getElementById('filterFaultDeviceName').value.toLowerCase();
            const area = document.getElementById('filterFaultArea').value;
            
            return deviceData.filter(device => {
                return (
                    device.status === 'fault' &&
                    (deviceName === '' || device.name.toLowerCase().includes(deviceName)) &&
                    (area === '' || device.area === area)
                );
            });
        }
        
        // 渲染故障设备分页
        function renderFaultPagination(total) {
            const pageNumbers = document.getElementById('faultPageNumbers');
            pageNumbers.innerHTML = '';
            
            const totalPages = Math.ceil(total / pageSize);
            
            // 显示页码
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `pagination-btn ${i === currentFaultPage ? 'active' : ''}`;
                pageBtn.textContent = i;
                pageBtn.onclick = () => {
                    currentFaultPage = i;
                    renderFaultDeviceTable();
                };
                pageNumbers.appendChild(pageBtn);
            }
            
            // 禁用上一页/下一页按钮
            document.getElementById('prevFaultPage').disabled = currentFaultPage === 1;
            document.getElementById('nextFaultPage').disabled = currentFaultPage === totalPages;
        }
        
        // 切换故障设备页面
        function changeFaultPage(direction) {
            const faultDevices = filterFaultDevices();
            const totalPages = Math.ceil(faultDevices.length / pageSize);
            
            if (direction === -1 && currentFaultPage > 1) {
                currentFaultPage--;
            } else if (direction === 1 && currentFaultPage < totalPages) {
                currentFaultPage++;
            }
            
            renderFaultDeviceTable();
        }
        
        // 搜索故障设备
        function searchFaultDevices() {
            currentFaultPage = 1;
            renderFaultDeviceTable();
        }
        
        // 重置故障设备筛选
        function resetFaultFilter() {
            document.getElementById('filterFaultDeviceName').value = '';
            document.getElementById('filterFaultArea').value = '';
            
            currentFaultPage = 1;
            renderFaultDeviceTable();
        }
        
        // 切换故障设备全选
        function toggleSelectAllFault() {
            const selectAll = document.getElementById('selectAllFault');
            const checkboxes = document.querySelectorAll('#faultDeviceTableBody input[type="checkbox"]');
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                window.location.href = './教学实训平台_登录.html';
            }
        }
        
        // 切换菜单
        function toggleMenu(element) {
            const menuItems = element.nextElementSibling;
            const isExpanded = menuItems.style.display === 'block';
            menuItems.style.display = isExpanded ? 'none' : 'block';
        }
    </script>
    <!-- 导航组件加载器 -->
    <script src="./nav-loader-universal.js" data-nav-type="teacher"></script>
</body>
